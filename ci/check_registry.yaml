{
  "schema_version": "0.2",
  "policy": {
    "selection_rule": "impacted checks plus transitive dependency closure",
    "unknown_impact": "full audit",
    "unmapped_impact": "full audit",
    "full_audit_parallelism": 4,
    "boundaries": [
      "local change != global re-audit",
      "receipt preservation != repeated execution",
      "validation != truth",
      "CI pass != theorem authority",
      "selection optimization != authority expansion",
      "sharding != authority expansion",
      "central scheduling != validator weakening"
    ]
  },
  "known_paths": [
    ".github/**",
    "ci/**",
    "docs/**",
    "README.md",
    "ROADMAP.md",
    "LICENSE*",
    "CITATION.cff",
    "Makefile",
    "scripts/**",
    "runtime/**",
    "tests/**",
    "examples/**",
    "src/**",
    "specs/**",
    "contracts/**",
    "validators/**",
    "validation_cases/**",
    "manifests/**",
    "packets/**",
    "chain_indexes/**",
    "formal/**",
    "memoryos/**",
    "tools/**",
    "lakefile.toml",
    "lake-manifest.json",
    "lean-toolchain",
    "pyproject.toml",
    "requirements*.txt"
  ],
  "full_audit_paths": [
    "ci/check_registry.yaml",
    "scripts/select_impacted_checks.py",
    "scripts/run_ci_check.py",
    "scripts/build_audit_summary.py",
    "scripts/build_full_audit_selection_v0_2.py",
    "scripts/check_workflow_consolidation_integrity.py",
    "scripts/run_all_governance_full_checks_v0_1.py",
    "scripts/run_all_governance_shard_v0_2.py",
    "scripts/run_full_governance_shard_ci_v0_2.py",
    "scripts/run_pr_entry_check_v0_4.py",
    "tests/test_ci_audit_selector_v0_1.py",
    "tests/test_governance_sharding_v0_2.py",
    "tests/test_pr_entry_check_v0_4.py",
    ".github/workflows/all_governance_validation.yml",
    ".github/workflows/all_governance_sharded_v0_2.yml",
    ".github/workflows/pr-governance-gate.yml",
    ".github/WORKFLOW_INDEX.md",
    "Makefile"
  ],
  "checks": {
    "workflow-integrity": {
      "name": "Workflow consolidation integrity",
      "runner": "python",
      "command": "python3 scripts/check_workflow_consolidation_integrity.py",
      "group": "static",
      "tier": "critical",
      "paths": [
        ".github/**",
        "docs/**",
        "README.md",
        "ROADMAP.md",
        "scripts/check_workflow_consolidation_integrity.py"
      ],
      "depends_on": [],
      "timeout_minutes": 5,
      "pr_required": true,
      "full_audit_member": true
    },
    "ci-audit-tests": {
      "name": "CI audit fast gate self-test",
      "runner": "python",
      "command": "python3 tests/test_ci_audit_selector_v0_1.py",
      "group": "static",
      "tier": "critical",
      "paths": [
        "ci/check_registry.yaml",
        "scripts/select_impacted_checks.py",
        "scripts/run_ci_check.py",
        "scripts/build_audit_summary.py",
        "scripts/check_workflow_consolidation_integrity.py",
        "tests/test_ci_audit_selector_v0_1.py",
        ".github/workflows/pr-governance-gate.yml"
      ],
      "depends_on": [],
      "timeout_minutes": 5,
      "pr_required": true,
      "full_audit_member": true
    },
    "governance-shard-tests": {
      "name": "Governance shard partition self-test",
      "runner": "python",
      "command": "python3 tests/test_governance_sharding_v0_2.py",
      "group": "static",
      "tier": "critical",
      "paths": [
        "scripts/run_all_governance_full_checks_v0_1.py",
        "scripts/run_all_governance_shard_v0_2.py",
        "scripts/run_full_governance_shard_ci_v0_2.py",
        "scripts/build_full_audit_selection_v0_2.py",
        "tests/test_governance_sharding_v0_2.py",
        "ci/check_registry.yaml",
        ".github/workflows/all_governance_sharded_v0_2.yml"
      ],
      "depends_on": [],
      "timeout_minutes": 5,
      "pr_required": true,
      "full_audit_member": true
    },
    "pr-entry-tests": {
      "name": "Migrated PR entry self-test",
      "runner": "python",
      "command": "python3 tests/test_pr_entry_check_v0_4.py",
      "group": "static",
      "tier": "critical",
      "paths": [
        "scripts/run_pr_entry_check_v0_4.py",
        "tests/test_pr_entry_check_v0_4.py",
        "ci/check_registry.yaml",
        ".github/workflows/memoryos-json-governance.yml",
        ".github/workflows/qi-process-tensor-review.yml",
        ".github/workflows/kustring_runtime_finality_v0_2.yml"
      ],
      "depends_on": [],
      "timeout_minutes": 5,
      "pr_required": true,
      "full_audit_member": true
    },
    "core-governance": {
      "name": "Core governance validation",
      "runner": "python",
      "command": "python3 scripts/run_core_governance_full_checks_v0_1.py",
      "group": "core",
      "tier": "critical",
      "paths": [
        ".github/workflows/core_governance_validation.yml",
        "scripts/run_core_governance_full_checks_v0_1.py",
        "scripts/validate_emptiness_*.py",
        "scripts/validate_kuos_emptiness_*.py",
        "scripts/validate_mandala_*.py",
        "scripts/validate_bodhisattva_*.py",
        "scripts/validate_paramita_*.py",
        "scripts/validate_dukkha_*.py",
        "scripts/validate_formal_invariant_*.py",
        "scripts/validate_super_relativity_*.py",
        "scripts/validate_invariant_*.py",
        "scripts/check_invariant_*.py",
        "specs/**",
        "validation_cases/**",
        "packets/**",
        "chain_indexes/**",
        "formal/KUOS/CoreGovernance/**"
      ],
      "depends_on": [],
      "timeout_minutes": 20,
      "pr_required": true,
      "full_audit_member": true
    },
    "regge-zero": {
      "name": "Regge Zero governance validation",
      "runner": "python",
      "command": "python3 scripts/run_regge_zero_governance_checks_v0_1.py",
      "group": "governance-subsystem",
      "tier": "critical",
      "paths": [
        ".github/workflows/regge_zero_governance_validation.yml",
        "docs/REGGE_ZERO_GOVERNANCE*.md",
        "contracts/kuos_regge_zero_governance_contract_v0_1.yaml",
        "validation_cases/regge_zero_governance_validation_cases_v0_1.yaml",
        "validators/*regge_zero_governance*.py",
        "scripts/run_regge_zero_governance_checks_v0_1.py",
        "tests/test_regge_zero_governance_validator_v0_1.py",
        "formal/ReggeZeroGovernance.lean",
        "manifests/regge_zero_governance_*.json",
        "packets/regge_zero_governance_*.yaml",
        "chain_indexes/regge_zero_governance_*.yaml"
      ],
      "depends_on": [],
      "timeout_minutes": 15,
      "pr_required": true,
      "full_audit_member": true
    },
    "memoryos-json": {
      "name": "MemoryOS JSON governance",
      "runner": "python",
      "command": "python3 scripts/run_pr_entry_check_v0_4.py --check-id memoryos-json",
      "group": "governance-subsystem",
      "tier": "critical",
      "paths": [
        ".github/workflows/memoryos-json-governance.yml",
        "memoryos/**/*.json",
        "memoryos/**/*.md",
        "tools/memoryos/**/*.py",
        "scripts/run_pr_entry_check_v0_4.py"
      ],
      "depends_on": [],
      "timeout_minutes": 15,
      "pr_required": true,
      "full_audit_member": true
    },
    "qi-process-review": {
      "name": "Qi process tensor review",
      "runner": "python",
      "command": "python3 scripts/run_pr_entry_check_v0_4.py --check-id qi-process-review",
      "group": "qi-subsystem",
      "tier": "integration",
      "paths": [
        ".github/workflows/qi-process-tensor-review.yml",
        "runtime/kuuos_runtime_daemon_qi_*.py",
        "runtime/kuuos_causal_world_model_*_v14_0.py",
        "scripts/*qi_*",
        "scripts/*causal_world_model*_v14_0.py",
        "docs/qi_*.md",
        "docs/KUUOS_CAUSAL_WORLD_MODEL_OS_v14_0.md",
        "examples/qi_process_tensor_v0_1/**",
        "manifests/qi_*.json",
        "manifests/kuuos_causal_world_model_v14_0.json",
        "packets/qi_*.json",
        "scripts/run_pr_entry_check_v0_4.py"
      ],
      "depends_on": [],
      "pr_supersedes": ["runtime-full"],
      "timeout_minutes": 20,
      "pr_required": true,
      "full_audit_member": true
    },
    "kustring-finality": {
      "name": "KuString runtime finality",
      "runner": "python",
      "command": "python3 scripts/run_pr_entry_check_v0_4.py --check-id kustring-finality",
      "group": "runtime-subsystem",
      "tier": "integration",
      "paths": [
        ".github/workflows/kustring_runtime_finality_v0_2.yml",
        "examples/kustring_runtime_v0_2.py",
        "tests/test_kustring_runtime_v0_2.py",
        "specs/kustring_runtime_packets_v0_2.json",
        "scripts/*kustring_runtime*_v0_2.py",
        "docs/KUSTRING_RUNTIME_*_v0_2.md",
        "docs/kustring_runtime_finality_ci_ledger_v0_2.md",
        "scripts/run_pr_entry_check_v0_4.py"
      ],
      "depends_on": [],
      "pr_supersedes": ["runtime-full"],
      "timeout_minutes": 15,
      "pr_required": true,
      "full_audit_member": true
    },
    "decision-os": {
      "name": "DecisionOS cumulative validation",
      "runner": "python",
      "command": "python3 scripts/run_decision_os_full_checks.py",
      "group": "os-subsystem",
      "tier": "integration",
      "paths": [
        ".github/workflows/decision-os-validation.yml",
        "docs/KUUOS_DECISION_OS_*.md",
        "docs/KUUOS_DECISIONOS_*.md",
        "manifests/kuuos_decision_os_*.json",
        "manifests/kuuos_decisionos_*.json",
        "runtime/*decision_os*.py",
        "runtime/*decisionos*.py",
        "runtime/**/*decision_os*.py",
        "runtime/**/*decisionos*.py",
        "scripts/check_decision_os_*.py",
        "scripts/check_decisionos_*.py",
        "scripts/run_decision_os_full_checks.py",
        "formal/KUOS/DecisionOS/**"
      ],
      "depends_on": [],
      "pr_supersedes": ["runtime-full"],
      "timeout_minutes": 20,
      "pr_required": true,
      "full_audit_member": true
    },
    "evidence-cycle": {
      "name": "Evidence Cycle OS cumulative validation",
      "runner": "python",
      "command": "python3 scripts/run_evidence_cycle_os_full_checks.py",
      "group": "os-subsystem",
      "tier": "integration",
      "paths": [
        ".github/workflows/evidence-cycle-os-validation.yml",
        "docs/KUUOS_ACT_OS_*.md",
        "docs/KUUOS_ACTOS_*.md",
        "docs/KUUOS_OBSERVE_OS_*.md",
        "docs/KUUOS_OBSERVEOS_*.md",
        "docs/KUUOS_VERIFY_OS_*.md",
        "docs/KUUOS_VERIFYOS_*.md",
        "docs/KUUOS_LEARN_OS_*.md",
        "docs/KUUOS_LEARNOS_*.md",
        "manifests/kuuos_act_os_*.json",
        "manifests/kuuos_actos_*.json",
        "manifests/kuuos_observe_os_*.json",
        "manifests/kuuos_observeos_*.json",
        "manifests/kuuos_verify_os_*.json",
        "manifests/kuuos_verifyos_*.json",
        "manifests/kuuos_learn_os_*.json",
        "manifests/kuuos_learnos_*.json",
        "runtime/*act_os*.py",
        "runtime/*actos*.py",
        "runtime/*observe_os*.py",
        "runtime/*observeos*.py",
        "runtime/*verify_os*.py",
        "runtime/*verifyos*.py",
        "runtime/*learn_os*.py",
        "runtime/*learnos*.py",
        "scripts/check_act_os_*.py",
        "scripts/check_actos_*.py",
        "scripts/check_observe_os_*.py",
        "scripts/check_observeos_*.py",
        "scripts/check_verify_os_*.py",
        "scripts/check_verifyos_*.py",
        "scripts/check_learn_os_*.py",
        "scripts/check_learnos_*.py",
        "scripts/run_evidence_cycle_os_full_checks.py",
        "formal/KUOS/ActOS/**",
        "formal/KUOS/ObserveOS/**",
        "formal/KUOS/VerifyOS/**",
        "formal/KUOS/LearnOS/**"
      ],
      "depends_on": [],
      "pr_supersedes": ["runtime-full"],
      "timeout_minutes": 30,
      "pr_required": true,
      "full_audit_member": true
    },
    "plan-os": {
      "name": "PlanOS cumulative validation",
      "runner": "python",
      "command": "python3 scripts/run_plan_os_full_checks.py",
      "group": "os-subsystem",
      "tier": "integration",
      "paths": [
        ".github/workflows/plan-os-validation.yml",
        "docs/KUUOS_PLAN_OS_*.md",
        "docs/KUUOS_PLANOS_*.md",
        "manifests/kuuos_plan_os_*.json",
        "manifests/kuuos_planos_*.json",
        "runtime/*plan_os*.py",
        "runtime/*planos*.py",
        "scripts/check_plan_os_*.py",
        "scripts/check_planos_*.py",
        "scripts/run_plan_os_full_checks.py",
        "formal/KUOS/PlanOS/**"
      ],
      "depends_on": [],
      "pr_supersedes": ["runtime-full"],
      "timeout_minutes": 30,
      "pr_required": true,
      "full_audit_member": true
    },
    "runtime-full": {
      "name": "Cumulative KuuOS runtime regression",
      "runner": "python",
      "command": "python3 scripts/run_kuuos_runtime_full_check_v0_55.py",
      "group": "runtime",
      "tier": "integration",
      "paths": [
        ".github/workflows/kuuos_runtime_full_check.yml",
        "runtime/**",
        "tests/**",
        "examples/**",
        "src/**",
        "scripts/check_kuuos_*.py",
        "scripts/check_world_*.py",
        "scripts/run_kuuos_runtime_full_check_*.py",
        "manifests/**"
      ],
      "depends_on": [],
      "timeout_minutes": 30,
      "pr_required": true,
      "full_audit_member": true
    },
    "lean-formal": {
      "name": "Strict Lean formal validation",
      "runner": "lean",
      "command": "lake -KleanArgs=-DwarningAsError=true -KleanArgs=-DsorryAsError=true build KuuOSFormal",
      "group": "formal",
      "tier": "critical",
      "paths": [
        ".github/workflows/lean-formal-validation.yml",
        "formal/**",
        "lean-toolchain",
        "lakefile.toml",
        "lake-manifest.json"
      ],
      "depends_on": [],
      "timeout_minutes": 30,
      "pr_required": true,
      "full_audit_member": true
    },
    "full-governance": {
      "name": "Repository-wide governance audit",
      "runner": "python-sharded",
      "command": "python3 scripts/run_all_governance_shard_v0_2.py --index {index} --count {count} --output artifacts/governance-shards/{index}/summary.json",
      "shard_count": 8,
      "group": "full-audit",
      "tier": "audit",
      "paths": [
        "scripts/run_all_governance_full_checks_v0_1.py",
        "scripts/run_all_governance_shard_v0_2.py",
        "tests/test_governance_sharding_v0_2.py"
      ],
      "depends_on": ["workflow-integrity"],
      "supersedes": ["core-governance"],
      "timeout_minutes": 30,
      "pr_required": false,
      "full_audit_member": true
    }
  }
}
