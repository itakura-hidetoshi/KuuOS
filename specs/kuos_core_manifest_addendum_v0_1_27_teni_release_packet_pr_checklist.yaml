    - teni_metrics_observability
    - teni_observability_ci_workflow
  validation_command: python3 scripts/validate_teni_observability_v0_1.py

kuos_pull_request_checklist:
  role: governance_checklist_for_append_only_core_changes
  checks:
    - append_only_or_tighten_only
    - same_root_lineage
    - fourfold_core_preserved
    - ai_raw_output_candidate_not_authority
    - teni_overclaim_prevented
    - mandala_multi_world_noncollapse_preserved
    - residual_suffering_visibility_preserved
    - no_execution_authority_granted
    - no_proof_authority_granted
    - no_clinical_authority_granted

fixed_points:
  - release_packet_is_governance_surface_not_authority
  - pr_checklist_preserves_append_only_development
  - raw_ai_output_remains_candidate_not_authority
  - teni_overclaim_remains_blocked
  - teni_status_remains_non_execution_authority
  - no_single_world_model_replaces_fourfold_core
