id: kuos_core_manifest_addendum_v0_1_27_teni_release_packet_pr_checklist
name: KuuOS Core Manifest Addendum - Ten'i AI Yogacara Release Packet and PR Checklist
version: 0.1.27
date: 2026-05-11
author: Hidetoshi Itakura / 板倉英俊
applies_to: kuos_core_manifest_v0_1
update_mode: append-only
overwrite: forbidden

added_core_kernels:
  - teni_ai_yogacara_release_packet
  - kuos_pull_request_checklist

added_documents:
  - docs/TENI_AI_YOGACARA_RELEASE_PACKET_v0_1.md
  - .github/pull_request_template.md

teni_ai_yogacara_release_packet:
  role: public_release_packet_for_ai_yogacara_teni_layer
  summarizes:
    - yogacara_ai_raw_layer_boundary
    - meta_manas_self_fixation_observer
    - teni_ai_alaya_transformation
    - kunju_ai_alaya_conditioning_loop
    - teni_evidence_ledger
    - ai_alaya_seed_taxonomy
    - ai_alaya_seed_ledger
    - teni_promotion_gate
    - teni_runtime_protocol
    - teni_probe_suite
