id: kuos_core_manifest_v0_1
name: KuuOS / 空OS Core Manifest
version: 0.1.13-multi-world-mandala-architecture
date: 2026-05-11
author: Hidetoshi Itakura / 板倉英俊
repository: https://github.com/itakura-hidetoshi/KuuOS
license: All-Rights-Reserved

root_core:
  - 空 / emptiness
  - 縁起 / dependent_origination
  - 二諦 gap / two_truths_gap
  - 中道 / middle_way

two_truths_terms:
  paramartha_satya: 勝義諦
  samvrti_satya: 世俗諦

core_kernel_order:
  - emptiness_kernel
  - dependent_origination_kernel
  - dependent_origination_vibration
  - physical_quantum_qi_path_integral
  - two_truths_gap
  - effective_world_surface
  - samvrti_qi_layer
  - indranet_gauge_qi_flow
  - quantum_thermodynamic_yinyang_frame
  - wuxing_functional_differentiation
  - extended_m_theory_inclusion_membrane
  - mandala_inclusion_gate
  - multi_world_mandala_architecture
  - mandala_world_arrangement
  - middle_way_bridge
  - fourfold_core_gate

qi_generation_chain:
  source: dependent_origination_vibration
  physical_kernel: physical_quantum_qi_path_integral
  carrier: indranet_gauge_connection
  stabilized_by: four_d_mass_gap
  surface: samvrti_satya_effective_world_surface
  expression: samvrti_qi_layer
  polarity_frame: quantum_thermodynamic_yinyang_frame
  functional_phase: wuxing_functional_differentiation
  formula: qi_as_readable_flow_pattern_of_dependent_origination_vibration

physical_quantum_qi_path_integral:
  role: physics_facing_model_of_qi
  reads: weighted_histories_of_relational_flow
  output: effective_qi_flow_observable
  not: ultimate_substance

samvrti_qi_layer:
  location: samvrti_satya_effective_world_surface
  role: effective_flow_state_layer
  not: ultimate_substance
  tracks:
    - flow
    - circulation
    - activation
    - stagnation
    - recovery
    - coupling
    - coherence

indranet_gauge_qi_flow:
  role: gauge_theoretic_carrier_of_qi_flow
  not: mere_graph
  objects:
    - local_frames
    - connection
    - transport
    - curvature
    - holonomy
    - gluing
    - obstruction_visibility

quantum_thermodynamic_yinyang_frame:
  role: local_polarity_frame_of_qi_flow
  not: fixed_global_label
  depends_on:
    - context
    - observer
    - scale
    - thermal_regime
    - record_surface
  yin_tracks:
    - latent_coherence
    - recovery_reservoir
    - entropy_buffering
    - thermal_acceptance
    - stabilization
  yang_tracks:
    - excitation
    - work_output
    - measurement_record
    - active_transition
    - manifest_flow

wuxing_functional_differentiation:
  role: functional_phase_differentiation_of_yinyang_qi_flow
  wood: expansion_growth_branching_initiation
  fire: activation_expression_excitation_visibility
  earth: mediation_grounding_integration_center_stabilization
  metal: structure_boundary_refinement_contraction
  water: storage_recovery_depth_cooling_reserve
  not: fixed_substance_taxonomy

extended_m_theory_inclusion_membrane:
  role: layer_membrane_gauge_inclusion_architecture
  layers: local_world_surfaces
  membranes: boundary_interfaces
  branes: transport_surfaces
  gauge_connections: qi_and_meaning_transport
  obstructions: failed_gluing_or_conflict
  inclusion: non_collapsing_coexistence

mandala_inclusion_gate:
  role: operational_gate_for_inclusion
  checks:
    - center_check
    - layer_check
    - membrane_check
    - gate_check
    - obstruction_check
    - inclusion_check
  outputs:
    - PASS
    - HOLD
    - REPAIR
    - QUARANTINE
    - FAIL

multi_world_mandala_architecture:
  role: inclusive_arrangement_of_multiple_world_models
  center: fourfold_core_not_any_single_world
  worlds: multiple_world_models
  membranes: boundaries_between_worlds
  gates: transition_protocols_between_worlds
  qi_flows: local_and_cross_world_flow
  yinyang_frames: local_polarity_frames
  wuxing_phases: local_functional_phase_readings
  obstructions: visible_cross_world_gluing_failures
  inclusion: non_collapsing_coexistence

mandala_world_arrangement:
  role: stable_inclusive_arrangement
  center: fourfold_core
  rings: layers_and_sheaves
  gates: transition_protocols
  boundaries: membranes_and_governance_barriers
  surrounding_figures: modules_and_local_worlds

physics_gap_bridge:
  superstring_theory_of_emptiness: relational_vibration
  four_d_mass_gap: nonzero_effective_world_gap
  super_relativity_theory: observer_record_scale_realization

release_policy:
  lineage: append-only
  update_mode: additive-only-and-tighten-only
  overwrite: forbidden
  same_root_required: true
  public_visibility_is_license: false

public_core_documents:
  - README.md
  - LICENSE
  - COPYRIGHT.md
