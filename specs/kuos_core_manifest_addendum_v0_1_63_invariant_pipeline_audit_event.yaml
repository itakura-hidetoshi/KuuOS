id: kuos_core_manifest_addendum_v0_1_63_invariant_pipeline_audit_event
name: KuuOS Core Manifest Addendum - Invariant Pipeline Audit Event
version: 0.1.63
date: 2026-05-11
author: Hidetoshi Itakura / 板倉英俊
applies_to: kuos_core_manifest_v0_1
update_mode: append-only
overwrite: forbidden

added_documents:
  - docs/INVARIANT_GOVERNANCE_PIPELINE_AUDIT_EVENT_v0_1.md
  - scripts/validate_invariant_pipeline_audit_event_v0_1.py

updated_documents:
  - examples/invariant_governance_pipeline_minimal.py
  - Makefile
  - scripts/run_core_governance_full_checks_v0_1.py
  - .github/workflows/all_governance_validation.yml

audit_event:
  role: record_surface_for_invariant_governance_pipeline_decisions
  generator: examples/invariant_governance_pipeline_minimal.py::make_audit_event
  validator: scripts/validate_invariant_pipeline_audit_event_v0_1.py
  required_fields:
    - event_id
    - timestamp
    - pipeline_version
    - transformation_axis
    - required_invariants
    - required_invariant_names
    - violated_invariants
    - matrix_status
    - gate_status
    - gate_closed
    - required_repair_route
    - execution_authority_granted
    - proof_authority_granted
    - clinical_authority_granted
    - truth_authority_granted
    - teni_authority_granted
    - evidence_status
    - audit_lineage_status
    - reason
    - notes
  non_authority_fields:
    execution_authority_granted: false
    proof_authority_granted: false
    clinical_authority_granted: false
    truth_authority_granted: false
    teni_authority_granted: false

validation:
  make_target: invariant-pipeline-checks
  command: python3 scripts/validate_invariant_pipeline_audit_event_v0_1.py
  included_in: scripts/run_core_governance_full_checks_v0_1.py

fixed_points:
  - invariant_pipeline_audit_event_is_record_surface_not_authority
  - audit_event_records_matrix_and_gate_status
  - audit_event_preserves_required_and_violated_invariants
  - audit_event_non_authority_fields_must_remain_false
  - audit_event_does_not_replace_evidence_worm_archive_or_runtime_governance
