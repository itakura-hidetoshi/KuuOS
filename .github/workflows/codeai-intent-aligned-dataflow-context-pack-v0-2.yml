name: CodeAI Intent-Aligned Dataflow Context Pack v0.2

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "runtime/kuuos_codeai_intent_aligned_dataflow_context_pack_schema_v0_2.py"
      - "runtime/kuuos_codeai_intent_aligned_dataflow_context_pack_checks_v0_2.py"
      - "runtime/kuuos_codeai_intent_aligned_dataflow_context_pack_v0_2.py"
      - "scripts/build_codeai_intent_aligned_dataflow_context_pack_fixture_v0_2.py"
      - "scripts/project_codeai_intent_aligned_dataflow_context_pack_fixture_v0_2.py"
      - "scripts/check_codeai_intent_aligned_dataflow_context_pack_v0_2.py"
      - "tests/test_kuuos_codeai_intent_aligned_dataflow_context_pack_v0_2.py"
      - "examples/codeai_intent_aligned_dataflow_context_pack_v0_2.json"
      - "manifests/kuuos_codeai_intent_aligned_dataflow_context_pack_v0_2.json"
      - "docs/KUUOS_CODEAI_INTENT_ALIGNED_DATAFLOW_CONTEXT_PACK_v0_2.md"
      - "formal/KUOS/CodeAI/IntentAlignedDataflowContextPackV0_2.lean"
      - "formal/KuuOSCodeAIIntentAlignedDataflowContextPackV0_2.lean"
      - "runtime/kuuos_codeai_selective_repository_semantic_context_pack_v0_1.py"
      - "tests/test_kuuos_codeai_selective_repository_semantic_context_pack_v0_1.py"
      - "runtime/kuuos_codeai_temporal_holdout_replay_corpus_v0_1.py"
      - "tests/test_kuuos_codeai_temporal_holdout_replay_corpus_v0_1.py"
      - "lakefile.toml"
      - "lake-manifest.json"
      - "lean-toolchain"
      - ".github/workflows/codeai-intent-aligned-dataflow-context-pack-v0-2.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  MATHLIB_NO_CACHE_ON_UPDATE: '1'

jobs:
  validate:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python surfaces
        run: >-
          python3 -m compileall -q
          runtime/kuuos_codeai_intent_aligned_dataflow_context_pack_schema_v0_2.py
          runtime/kuuos_codeai_intent_aligned_dataflow_context_pack_checks_v0_2.py
          runtime/kuuos_codeai_intent_aligned_dataflow_context_pack_v0_2.py
          scripts/build_codeai_intent_aligned_dataflow_context_pack_fixture_v0_2.py
          scripts/project_codeai_intent_aligned_dataflow_context_pack_fixture_v0_2.py
          scripts/check_codeai_intent_aligned_dataflow_context_pack_v0_2.py
          tests/test_kuuos_codeai_intent_aligned_dataflow_context_pack_v0_2.py
      - name: Validate machine-readable artifacts
        shell: bash
        run: |
          set -euo pipefail
          python3 -m json.tool \
            examples/codeai_intent_aligned_dataflow_context_pack_v0_2.json \
            > /dev/null
          python3 -m json.tool \
            manifests/kuuos_codeai_intent_aligned_dataflow_context_pack_v0_2.json \
            > /dev/null
      - name: Check intent-aligned dataflow context pack
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=. python3 \
            scripts/check_codeai_intent_aligned_dataflow_context_pack_v0_2.py \
            2>&1 | tee codeai-intent-aligned-dataflow-context-pack-v0-2.log
      - name: Run context and holdout regression tests
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=. python3 -m unittest \
            tests.test_kuuos_codeai_intent_aligned_dataflow_context_pack_v0_2 \
            tests.test_kuuos_codeai_selective_repository_semantic_context_pack_v0_1 \
            tests.test_kuuos_codeai_temporal_holdout_replay_corpus_v0_1 \
            2>&1 | tee codeai-intent-aligned-dataflow-context-pack-v0-2-tests.log
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify committed dependency manifest is canonical
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Strictly compile intent-aligned context formal root
        shell: bash
        run: |
          set -euo pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true \
            build KuuOSCodeAIIntentAlignedDataflowContextPackV0_2 \
            2>&1 | tee codeai-intent-aligned-dataflow-context-pack-v0-2-lean.log
      - name: Strictly compile repository formal baseline
        shell: bash
        run: |
          set -euo pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true \
            build KuuOSFormal \
            2>&1 | tee codeai-intent-aligned-dataflow-context-pack-v0-2-lean-root.log
      - name: Upload diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: codeai-intent-aligned-dataflow-context-pack-v0-2-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            codeai-intent-aligned-dataflow-context-pack-v0-2.log
            codeai-intent-aligned-dataflow-context-pack-v0-2-tests.log
            codeai-intent-aligned-dataflow-context-pack-v0-2-lean.log
            codeai-intent-aligned-dataflow-context-pack-v0-2-lean-root.log
          if-no-files-found: warn
          retention-days: 14
