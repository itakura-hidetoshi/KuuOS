name: Physical Quantum Qi Runtime Validation

on:
  workflow_dispatch:
  push:
    paths:
      - 'docs/PHYSICAL_QUANTUM_QI_RUNTIME_*.md'
      - 'specs/physical_quantum_qi_runtime_contract_v0_1.json'
      - 'examples/physical_quantum_qi_runtime_packet_v0_1.json'
      - 'validation_cases/physical_quantum_qi_runtime_validation_cases_v0_1.json'
      - 'scripts/validate_physical_quantum_qi_runtime_contract_v0_1.py'
      - 'Makefile'
      - '.github/workflows/physical_quantum_qi_runtime_validation.yml'
  pull_request:
    paths:
      - 'docs/PHYSICAL_QUANTUM_QI_RUNTIME_*.md'
      - 'specs/physical_quantum_qi_runtime_contract_v0_1.json'
      - 'examples/physical_quantum_qi_runtime_packet_v0_1.json'
      - 'validation_cases/physical_quantum_qi_runtime_validation_cases_v0_1.json'
      - 'scripts/validate_physical_quantum_qi_runtime_contract_v0_1.py'
      - 'Makefile'
      - '.github/workflows/physical_quantum_qi_runtime_validation.yml'

jobs:
  validate-physical-quantum-qi-runtime:
    name: Validate Physical Quantum Qi runtime contract
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Show Qi runtime validation surface
        run: |
          python3 --version
          echo "Contract: docs/PHYSICAL_QUANTUM_QI_RUNTIME_CONTRACT_v0_1.md"
          echo "Index: docs/PHYSICAL_QUANTUM_QI_RUNTIME_INDEX_v0_1.md"
          echo "Spec: specs/physical_quantum_qi_runtime_contract_v0_1.json"
          echo "Example: examples/physical_quantum_qi_runtime_packet_v0_1.json"
          echo "Cases: validation_cases/physical_quantum_qi_runtime_validation_cases_v0_1.json"
          echo "Validator: scripts/validate_physical_quantum_qi_runtime_contract_v0_1.py"

      - name: Run Physical Quantum Qi runtime checks
        run: make physical-quantum-qi-runtime-checks
