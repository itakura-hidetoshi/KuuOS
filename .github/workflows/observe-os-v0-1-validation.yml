name: ObserveOS v0.1 Validation

on:
  push:
    paths:
      - "docs/KUUOS_OBSERVE_OS_EFFECT_GROUNDED_OBSERVATION_v0_1.md"
      - "manifests/kuuos_observe_os_effect_grounded_observation_v0_1.json"
      - "runtime/kuuos_observe_os_types_v0_1.py"
      - "runtime/kuuos_observe_os_kernel_v0_1.py"
      - "runtime/kuuos_observe_os_store_v0_1.py"
      - "runtime/kuuos_observe_os_fixture_v0_1.py"
      - "runtime/v01_observe_os_effect_grounded_observation.py"
      - "scripts/check_observe_os_effect_grounded_observation_v0_1.py"
      - "scripts/run_kuuos_runtime_full_check_v0_1.py"
      - "formal/KUOS/ObserveOS/EffectGroundedObservationV0_1.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/observe-os-v0-1-validation.yml"
  pull_request:
    paths:
      - "docs/KUUOS_OBSERVE_OS_EFFECT_GROUNDED_OBSERVATION_v0_1.md"
      - "manifests/kuuos_observe_os_effect_grounded_observation_v0_1.json"
      - "runtime/kuuos_observe_os_types_v0_1.py"
      - "runtime/kuuos_observe_os_kernel_v0_1.py"
      - "runtime/kuuos_observe_os_store_v0_1.py"
      - "runtime/kuuos_observe_os_fixture_v0_1.py"
      - "runtime/v01_observe_os_effect_grounded_observation.py"
      - "scripts/check_observe_os_effect_grounded_observation_v0_1.py"
      - "scripts/run_kuuos_runtime_full_check_v0_1.py"
      - "formal/KUOS/ObserveOS/EffectGroundedObservationV0_1.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/observe-os-v0-1-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile ObserveOS runtime
        run: python -m compileall -q runtime scripts/check_observe_os_effect_grounded_observation_v0_1.py
      - name: Validate ObserveOS effect-grounded observation
        run: python -m runtime.v01_observe_os_effect_grounded_observation > observe-os-v01.log 2>&1
      - name: Validate ObserveOS check entry point
        run: python scripts/check_observe_os_effect_grounded_observation_v0_1.py >> observe-os-v01.log 2>&1
      - name: Upload ObserveOS validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: observe-os-v01-log
          path: observe-os-v01.log
