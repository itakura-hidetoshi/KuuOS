name: DecisionOS Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'docs/KUUOS_DECISION_OS_*.md'
      - 'docs/KUUOS_DECISIONOS_*.md'
      - 'manifests/kuuos_decision_os_*.json'
      - 'manifests/kuuos_decisionos_*.json'
      - 'runtime/**/*decision_os*.py'
      - 'runtime/**/*decisionos*.py'
      - 'scripts/check_decision_os_*.py'
      - 'scripts/check_decisionos_*.py'
      - 'scripts/run_decision_os_full_checks.py'
      - 'formal/KUOS/DecisionOS/**'
      - 'formal/KUOS.lean'
      - '.github/workflows/decision-os-validation.yml'

permissions:
  contents: read

concurrency:
  group: decision-os-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: DecisionOS cumulative validation
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile validation surfaces
        run: python3 -m compileall -q runtime scripts/run_decision_os_full_checks.py
      - name: Run cumulative checks
        env:
          PYTHONPATH: .
          PYTHONUNBUFFERED: '1'
        run: python3 scripts/run_decision_os_full_checks.py 2>&1 | tee decision-os-validation.log
      - name: Upload validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decision-os-validation-log-${{ github.run_id }}-${{ github.run_attempt }}
          path: decision-os-validation.log
          if-no-files-found: warn
          retention-days: 14
