name: KuuOS Qi Process Tensor Downstream Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'runtime/kuuos_queue_dispatcher_v0_1.py'
      - 'runtime/kuuos_queue_worker_v0_1.py'
      - 'runtime/kuuos_action_router_v0_1.py'
      - 'runtime/kuuos_task_board_processor_v0_1.py'
      - 'tests/test_qi_process_tensor_downstream_v0_1.py'
      - '.github/workflows/kuuos_qi_process_tensor_downstream_validation.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 -m unittest tests.test_qi_process_tensor_downstream_v0_1
