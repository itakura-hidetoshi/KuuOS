name: LearnOS Vacuum Expectation Verification Future-Only v0.3

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "formal/KuuOSLearnOSV0_3.lean"
      - "formal/KuuOSFormal.lean"
      - "formal/KUOS/LearnOS/VacuumExpectationVerificationFutureOnlyDeltaV0_3.lean"
      - "formal/KUOS/VerifyOS/VacuumExpectationCommitVerificationReceiptV0_3.lean"
      - "formal/KUOS/LearnOS/FutureOnlyEvidenceLearningV0_1.lean"
      - "docs/KUUOS_LEARNOS_VACUUM_EXPECTATION_VERIFICATION_FUTURE_ONLY_DELTA_v0_3.md"
      - "manifests/kuuos_learnos_vacuum_expectation_verification_future_only_delta_v0_3.json"
      - "scripts/check_learnos_vacuum_expectation_verification_future_only_delta_v0_3.py"
      - "scripts/run_kuuos_runtime_full_check_v0_51.py"
      - ".github/workflows/learnos-vacuum-expectation-verification-future-only-v0-3.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check LearnOS v0.3 registration
        run: python3 scripts/check_learnos_vacuum_expectation_verification_future_only_delta_v0_3.py
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify committed manifest is canonical
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Compile LearnOS v0.3 module
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KUOS.LearnOS.VacuumExpectationVerificationFutureOnlyDeltaV0_3
      - name: Compile aggregate KuuOS formal root
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KuuOSFormal
