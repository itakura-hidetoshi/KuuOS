name: Cooperative Host Adapter v0.17 Validation

on:
  push:
    paths:
      - "runtime/kuuos_cooperative_host_adapter*_v0_17.py"
      - "runtime/v017_host_adapter_*.py"
      - "formal/KUOS/OpenHorizon/CooperativeHostAdapterV0_17.lean"
      - "docs/KUUOS_COOPERATIVE_HOST_ADAPTER_v0_17.md"
      - ".github/workflows/cooperative-host-adapter-v0-17-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_cooperative_host_adapter*_v0_17.py"
      - "runtime/v017_host_adapter_*.py"
      - "formal/KUOS/OpenHorizon/CooperativeHostAdapterV0_17.lean"
      - "docs/KUUOS_COOPERATIVE_HOST_ADAPTER_v0_17.md"
      - ".github/workflows/cooperative-host-adapter-v0-17-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile v0.17 runtime
        run: python -m compileall -q runtime
      - name: Run cooperative host adapter kernel
        id: kernel
        continue-on-error: true
        run: python -m runtime.v017_host_adapter_all > cooperative-host-adapter-v017.log 2>&1
      - name: Check v0.17 Lean surface when available
        id: lean
        continue-on-error: true
        run: |
          if command -v lake >/dev/null 2>&1 && { [ -f lakefile.lean ] || [ -f lakefile.toml ]; }; then
            lake env lean formal/KUOS/OpenHorizon/CooperativeHostAdapterV0_17.lean >> cooperative-host-adapter-v017.log 2>&1
          else
            echo "SKIP: repository Lean environment unavailable on this runner" >> cooperative-host-adapter-v017.log
          fi
      - name: Upload v0.17 validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cooperative-host-adapter-v017-log
          path: cooperative-host-adapter-v017.log
      - name: Report v0.17 failure
        if: steps.kernel.outcome == 'failure' || steps.lean.outcome == 'failure'
        run: |
          cat cooperative-host-adapter-v017.log
          exit 1
