name: WORLD v0.56 Araki Hessian Physical Realization

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'formal/KUOS/WORLD/KuuVacuumArakiHessianPhysicalRealizationV0_56.lean'
      - 'formal/KuuOSFormalV0_56.lean'
      - 'formal/KuuOSFormal.lean'
      - 'lakefile.toml'
      - '.github/workflows/world-v056-araki-hessian-physical-realization.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify committed manifest is canonical
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Compile WORLD v0.56 root
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KuuOSFormalV0_56
      - name: Compile aggregate formal root
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KuuOSFormal
