name: Temporary re-observation bundle apply

on:
  push:
    branches:
      - codeai/autonomous-git-effect-reobservation-v0-1
    paths:
      - ".github/workflows/reobs-bundle-apply-temp.yml"
      - ".tmp/reobs-bundle.b64"

permissions:
  contents: write

concurrency:
  group: reobs-bundle-apply-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Apply sealed bundle
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f .tmp/reobs-bundle.b64 ]]; then
            echo "bundle not present; bootstrap workflow commit only"
            exit 0
          fi
          base64 -d .tmp/reobs-bundle.b64 > /tmp/reobs-bundle.tar.gz
          echo "9833d45b62a305ad1b60d689ea164c14c3f3c547272879ff0f8c59a0b8a82a2f  /tmp/reobs-bundle.tar.gz" | sha256sum -c -
          tar -xzf /tmp/reobs-bundle.tar.gz
          rm -f .tmp/reobs-bundle.b64 .github/workflows/reobs-bundle-apply-temp.yml
          PYTHONDONTWRITEBYTECODE=1 python3 -B -m compileall -q \
            runtime/kuuos_codeai_autonomous_git_effect_reobservation_v0_1.py \
            scripts/check_codeai_autonomous_git_effect_reobservation_v0_1.py \
            tests/test_kuuos_codeai_autonomous_git_effect_reobservation_v0_1.py
          PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. python3 -B \
            scripts/check_codeai_autonomous_git_effect_reobservation_v0_1.py
          PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. python3 -B -m unittest \
            tests.test_kuuos_codeai_autonomous_git_effect_reobservation_v0_1
          python3 -m json.tool examples/codeai_autonomous_git_effect_reobservation_v0_1.json > /dev/null
          python3 -m json.tool manifests/kuuos_codeai_autonomous_git_effect_reobservation_v0_1.json > /dev/null
          find runtime scripts tests -type d -name __pycache__ -prune -exec rm -rf {} +
          git diff --check
          git config user.name "KuuOS CodeAI"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "add autonomous Git effect re-observation"
          git push origin HEAD:codeai/autonomous-git-effect-reobservation-v0-1
