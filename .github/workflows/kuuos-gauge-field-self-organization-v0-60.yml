name: KuuOS Gauge-Field Self-Organization v0.60

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'runtime/kuuos_gauge_field_self_organization_types_v0_60.py'
      - 'runtime/kuuos_discrete_gauge_connection_v0_60.py'
      - 'runtime/kuuos_gauge_field_self_organization_v0_60.py'
      - 'tests/test_kuuos_gauge_field_*_v0_60.py'
      - 'scripts/check_kuuos_gauge_field_self_organization_v0_60.py'
      - 'docs/KUUOS_GAUGE_FIELD_SELF_ORGANIZATION_v0_60.md'
      - 'manifests/kuuos_gauge_field_self_organization_v0_60.json'
      - 'formal/KUOS/WORLD/KuuOSGaugeFieldSelfOrganizationV0_60.lean'
      - 'formal/KuuOSFormalV0_60.lean'
      - 'formal/KUOS.lean'
      - 'formal/KuuOSFormal.lean'
      - 'lakefile.toml'
      - '.github/workflows/kuuos-gauge-field-self-organization-v0-60.yml'
  pull_request:
    paths:
      - 'runtime/kuuos_gauge_field_self_organization_types_v0_60.py'
      - 'runtime/kuuos_discrete_gauge_connection_v0_60.py'
      - 'runtime/kuuos_gauge_field_self_organization_v0_60.py'
      - 'tests/test_kuuos_gauge_field_*_v0_60.py'
      - 'scripts/check_kuuos_gauge_field_self_organization_v0_60.py'
      - 'docs/KUUOS_GAUGE_FIELD_SELF_ORGANIZATION_v0_60.md'
      - 'manifests/kuuos_gauge_field_self_organization_v0_60.json'
      - 'formal/KUOS/WORLD/KuuOSGaugeFieldSelfOrganizationV0_60.lean'
      - 'formal/KuuOSFormalV0_60.lean'
      - 'formal/KUOS.lean'
      - 'formal/KuuOSFormal.lean'
      - 'lakefile.toml'
      - '.github/workflows/kuuos-gauge-field-self-organization-v0-60.yml'

permissions:
  contents: read

concurrency:
  group: kuuos-gauge-v060-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  MATHLIB_NO_CACHE_ON_UPDATE: '1'

jobs:
  gauge-field-v060:
    name: Gauge-field v0.60 runtime and Lean
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile runtime and validator
        run: >-
          python3 -m compileall -q
          runtime/kuuos_gauge_field_self_organization_types_v0_60.py
          runtime/kuuos_discrete_gauge_connection_v0_60.py
          runtime/kuuos_gauge_field_self_organization_v0_60.py
          tests/test_kuuos_gauge_field_self_organization_v0_60.py
          tests/test_kuuos_gauge_field_fixed_connection_v0_60.py
          tests/test_kuuos_gauge_field_fixed_domain_v0_60.py
          scripts/check_kuuos_gauge_field_self_organization_v0_60.py
      - name: Run gauge-field runtime validation
        run: PYTHONPATH=. python3 scripts/check_kuuos_gauge_field_self_organization_v0_60.py
      - name: Verify canonical registration
        shell: bash
        run: |
          grep -Fq 'import KUOS.WORLD.KuuOSGaugeFieldSelfOrganizationV0_60' formal/KUOS.lean
          grep -Fq 'import KUOS.WORLD.KuuOSGaugeFieldSelfOrganizationV0_60' formal/KuuOSFormal.lean
          grep -Fq '"KuuOSFormalV0_60"' lakefile.toml
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify committed manifest is canonical
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Build v0.60 formal root
        shell: bash
        run: |
          set -o pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true \
            build KuuOSFormalV0_60 2>&1 | tee gauge-v060-build.log
      - name: Build aggregate formal root
        shell: bash
        run: |
          set -o pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true \
            build KuuOSFormal 2>&1 | tee aggregate-formal-build.log
      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kuuos-gauge-field-v060-diagnostics
          path: |
            gauge-v060-build.log
            aggregate-formal-build.log
          if-no-files-found: ignore
