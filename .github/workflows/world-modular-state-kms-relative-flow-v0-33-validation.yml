name: WORLD Modular State KMS Relative Flow v0.33 Validation

on:
  push:
    paths:
      - "formal/KUOS/WORLD/ModularStateKMSRelativeFlowBridgeV0_33.lean"
      - "formal/KUOS.lean"
      - "runtime/kuuos_world_modular_state_kms_relative_flow_bridge_*_v0_33.py"
      - "scripts/check_world_modular_state_kms_relative_flow_bridge_v0_33.py"
      - "manifests/world_modular_state_kms_relative_flow_bridge_v0_33.json"
      - "docs/KU_WORLD_MODULAR_STATE_KMS_RELATIVE_FLOW_BRIDGE_v0_33.md"
      - "scripts/run_kuuos_runtime_full_check_v0_1.py"
      - ".github/workflows/world-modular-state-kms-relative-flow-v0-33-validation.yml"
  pull_request:
    paths:
      - "formal/KUOS/WORLD/ModularStateKMSRelativeFlowBridgeV0_33.lean"
      - "formal/KUOS.lean"
      - "runtime/kuuos_world_modular_state_kms_relative_flow_bridge_*_v0_33.py"
      - "scripts/check_world_modular_state_kms_relative_flow_bridge_v0_33.py"
      - "manifests/world_modular_state_kms_relative_flow_bridge_v0_33.json"
      - "docs/KU_WORLD_MODULAR_STATE_KMS_RELATIVE_FLOW_BRIDGE_v0_33.md"
      - "scripts/run_kuuos_runtime_full_check_v0_1.py"
      - ".github/workflows/world-modular-state-kms-relative-flow-v0-33-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile v0.33 runtime
        run: python -m py_compile runtime/kuuos_world_modular_state_kms_relative_flow_bridge_core_v0_33.py runtime/kuuos_world_modular_state_kms_relative_flow_bridge_runtime_v0_33.py scripts/check_world_modular_state_kms_relative_flow_bridge_v0_33.py
      - name: Run v0.33 checks
        run: python scripts/check_world_modular_state_kms_relative_flow_bridge_v0_33.py
