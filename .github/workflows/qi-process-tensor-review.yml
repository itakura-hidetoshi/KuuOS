name: Qi Process Tensor Review Checks

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'runtime/kuuos_runtime_daemon_qi_*.py'
      - 'runtime/kuuos_causal_world_model_*_v14_0.py'
      - 'scripts/*qi_*'
      - 'scripts/*causal_world_model*_v14_0.py'
      - 'docs/qi_*.md'
      - 'docs/KUUOS_CAUSAL_WORLD_MODEL_OS_v14_0.md'
      - 'examples/qi_process_tensor_v0_1/**'
      - 'manifests/qi_*.json'
      - 'manifests/kuuos_causal_world_model_v14_0.json'
      - 'packets/qi_*.json'
      - '.github/workflows/qi-process-tensor-review.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 scripts/run_pr_entry_check_v0_4.py --check-id qi-process-review --output-root .out/checks
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qi-process-review-${{ github.run_id }}
          path: .out/checks/qi-process-review
          if-no-files-found: warn
