name: Qi Process Tensor Review Checks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'runtime/kuuos_runtime_daemon_qi_process_tensor_*.py'
      - 'runtime/kuuos_runtime_daemon_qi_actuation_license_gate_v0_1.py'
      - 'runtime/kuuos_runtime_daemon_qi_dry_run_probe_simulator_v0_1.py'
      - 'runtime/kuuos_runtime_daemon_qi_counterfactual_probe_lattice_v0_1.py'
      - 'scripts/*qi_process_tensor*'
      - 'scripts/*qi_persistent_supervisor*'
      - 'scripts/*qi_license*'
      - 'scripts/*qi_actuation*'
      - 'scripts/*qi_dry_run*'
      - 'scripts/*qi_cf*'
      - 'scripts/qi_supervisorctl_v0_1.py'
      - 'docs/qi_persistent_supervisor_operator_runbook_v0_1.md'
      - 'docs/qi_dry_run_probe_simulator_addendum_note_v0_1.md'
      - 'docs/qi_cf_probe_lattice_addendum_note_v0_1.md'
      - 'examples/qi_process_tensor_v0_1/**'
      - 'manifests/qi_process_tensor_review_bundle_manifest_v0_1.json'
      - 'manifests/qi_dry_run_probe_simulator_addendum_v0_1.json'
      - 'manifests/qi_cf_probe_lattice_addendum_v0_1.json'
      - 'packets/qi_process_tensor_review_phase_boundary_packet_v0_1.json'
      - '.github/workflows/qi-process-tensor-review.yml'

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  qi-process-tensor-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Qi process tensor review check suite
        run: |
          mkdir -p .out/qi-supervisor
          python scripts/run_qi_process_tensor_review_checks_v0_1.py \
            --write-json .out/qi-supervisor/process_tensor_review_check_suite.json

      - name: Run Qi CF lattice check suite
        run: |
          python scripts/run_qi_cf_lattice_checks_v0_1.py

      - name: Upload Qi process tensor review suite result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qi-process-tensor-review-check-suite
          path: .out/qi-supervisor/process_tensor_review_check_suite.json
          if-no-files-found: warn
