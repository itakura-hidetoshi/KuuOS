name: WORLD Kū Vacuum Central Reference State v0.54 direct macOS

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'formal/KUOS/WORLD/KuuVacuumCentralReferenceStateBridgeV0_54.lean'
      - 'formal/KuuOSFormalV0_54.lean'
      - 'formal/KuuOSFormal.lean'
      - 'lakefile.toml'
      - 'docs/KU_WORLD_KUU_VACUUM_CENTRAL_REFERENCE_STATE_v0_54.md'
      - 'manifests/world_kuu_vacuum_central_reference_state_v0_54.json'
      - 'scripts/check_world_kuu_vacuum_central_reference_state_v0_54.py'
      - 'scripts/run_kuuos_runtime_full_check_v0_54.py'
      - '.github/workflows/world-kuu-vacuum-central-reference-state-v0-54.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile v0.54 Python validation
        run: |
          python -m compileall -q \
            scripts/check_world_kuu_vacuum_central_reference_state_v0_54.py \
            scripts/run_kuuos_runtime_full_check_v0_54.py
      - name: Run v0.54 static validation
        run: python3 scripts/check_world_kuu_vacuum_central_reference_state_v0_54.py
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify committed manifest is canonical
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Compile WORLD v0.54 root
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KuuOSFormalV0_54
      - name: Compile aggregate formal root
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KuuOSFormal
