jobs:
  validate-physical-quantum-qi-deepening:
    name: Validate Physical Quantum Qi v0.2 deepening
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Show Qi deepening validation surface
        run: |
          python3 --version
          echo "Equation document: docs/PHYSICAL_QUANTUM_QI_EQUATIONS_v0_2.md"
          echo "SK/FV action: docs/PHYSICAL_QUANTUM_QI_SKFV_ACTION_v0_2A.md"
          echo "Ward/leak identity: docs/PHYSICAL_QUANTUM_QI_WARD_LEAK_IDENTITY_v0_2B.md"
          echo "DPI recoverability: docs/PHYSICAL_QUANTUM_QI_DPI_RECOVERABILITY_v0_2C.md"
          echo "IndraNet gauge transport: docs/PHYSICAL_QUANTUM_QI_INDRANET_GAUGE_TRANSPORT_v0_2D.md"
          echo "Qi non-Markov memory: docs/PHYSICAL_QUANTUM_QI_NON_MARKOV_MEMORY_v0_2E.md"
          echo "Qi Process Tensor autonomy: docs/KUUOS_QI_PROCESS_TENSOR_CONVENTIONAL_AUTONOMY_v0_2G.md"
          echo "Qi Process Tensor release-chain docs: docs/KUUOS_QI_PROCESS_TENSOR_RELEASE_CHAIN_v0_2FG.md"
          echo "Contract: specs/physical_quantum_qi_deepening_contract_v0_2.json"
          echo "Example: examples/physical_quantum_qi_deepening_packet_v0_2.json"
          echo "Equation packet: examples/physical_quantum_qi_equation_packet_v0_2.json"
          echo "DPI packet: examples/physical_quantum_qi_dpi_recoverability_packet_v0_2C.json"
          echo "IndraNet packet: examples/physical_quantum_qi_indranet_gauge_transport_packet_v0_2D.json"
          echo "Qi non-Markov memory packet: examples/physical_quantum_qi_non_markov_memory_packet_v0_2E.json"
          echo "Qi Process Tensor packet: examples/physical_quantum_qi_process_tensor_packet_v0_2F.json"
          echo "Qi Process Tensor autonomy packet: examples/kuuos_qi_process_tensor_conventional_autonomy_packet_v0_2G.json"
          echo "Phase runtime: src/physical_quantum_qi_phase_runtime_v0_2.py"
          echo "OS bridge runtime: src/physical_quantum_qi_os_bridge_v0_2.py"
          echo "Memory record runtime: src/physical_quantum_qi_memory_record_v0_2.py"
          echo "IndraNet transport runtime: src/physical_quantum_qi_indranet_transport_runtime_v0_2D.py"
          echo "IndraNet PlanOS handoff runtime: src/physical_quantum_qi_indranet_planos_handoff_v0_2D.py"
          echo "Qi Process Tensor runtime: src/physical_quantum_qi_process_tensor_runtime_v0_2F.py"
          echo "Qi non-Markov memory validator: scripts/validate_physical_quantum_qi_non_markov_memory_v0_2E.py"
          echo "Qi Process Tensor validator: scripts/validate_physical_quantum_qi_process_tensor_v0_2F.py"
          echo "Qi Process Tensor autonomy validator: scripts/validate_kuuos_qi_process_tensor_conventional_autonomy_v0_2G.py"
          echo "Qi Process Tensor release-chain docs validator: scripts/validate_qi_process_tensor_release_chain_docs_v0_2FG.py"
          echo "Qi Process Tensor release-chain validator: scripts/validate_qi_process_tensor_release_chain_v0_2FG.py"
          echo "Qi non-Markov memory regression tests: tests/test_physical_quantum_qi_non_markov_memory_v0_2E.py"
          echo "Qi Process Tensor regression tests: tests/test_physical_quantum_qi_process_tensor_v0_2F.py"
          echo "Qi Process Tensor autonomy regression tests: tests/test_kuuos_qi_process_tensor_conventional_autonomy_v0_2G.py"
          echo "Phase demo: examples/run_physical_quantum_qi_phase_demo_v0_2.py"
          echo "IndraNet PlanOS handoff demo: examples/run_physical_quantum_qi_indranet_planos_handoff_demo_v0_2D.py"
          echo "Manifest: manifests/physical_quantum_qi_deepening_manifest_v0_2.json"
          echo "Release packet: packets/physical_quantum_qi_deepening_release_packet_v0_2.json"
          echo "Finality packet: packets/physical_quantum_qi_deepening_finality_packet_v0_2.json"
          echo "Release closure packet: packets/physical_quantum_qi_deepening_release_closure_packet_v0_2.json"
          echo "Validated baseline packet: packets/physical_quantum_qi_deepening_validated_baseline_packet_v0_2.json"
          echo "Baseline established final packet: packets/physical_quantum_qi_deepening_baseline_established_final_packet_v0_2.json"
          echo "Chain index: chain_indexes/physical_quantum_qi_deepening_chain_index_v0_2.json"
          echo "Modules: SK/FV action v0.2A, Ward/leak v0.2B, DPI v0.2C, IndraNet gauge transport v0.2D, Qi non-Markov memory v0.2E, Qi Process Tensor v0.2F, Qi Process Tensor conventional autonomy v0.2G, Qi Process Tensor release-chain v0.2FG"

      - name: Run Physical Quantum Qi v0.2 deepening checks
        run: make physical-quantum-qi-deepening-checks
