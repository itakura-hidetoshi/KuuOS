name: VerifyOS v0.1 Validation

on:
  push:
    paths:
      - "docs/KUUOS_VERIFY_OS_EVIDENCE_BOUND_VERIFICATION_v0_1.md"
      - "manifests/kuuos_verify_os_evidence_bound_verification_v0_1.json"
      - "runtime/kuuos_verify_os_types_v0_1.py"
      - "runtime/kuuos_verify_os_kernel_v0_1.py"
      - "runtime/kuuos_verify_os_store_v0_1.py"
      - "runtime/kuuos_verify_os_fixture_v0_1.py"
      - "runtime/v01_verify_os_evidence_bound_verification.py"
      - "scripts/check_verify_os_evidence_bound_verification_v0_1.py"
      - "scripts/run_kuuos_runtime_full_check_v0_1.py"
      - "formal/KUOS/VerifyOS/EvidenceBoundVerificationV0_1.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/verify-os-v0-1-validation.yml"
  pull_request:
    paths:
      - "docs/KUUOS_VERIFY_OS_EVIDENCE_BOUND_VERIFICATION_v0_1.md"
      - "manifests/kuuos_verify_os_evidence_bound_verification_v0_1.json"
      - "runtime/kuuos_verify_os_types_v0_1.py"
      - "runtime/kuuos_verify_os_kernel_v0_1.py"
      - "runtime/kuuos_verify_os_store_v0_1.py"
      - "runtime/kuuos_verify_os_fixture_v0_1.py"
      - "runtime/v01_verify_os_evidence_bound_verification.py"
      - "scripts/check_verify_os_evidence_bound_verification_v0_1.py"
      - "scripts/run_kuuos_runtime_full_check_v0_1.py"
      - "formal/KUOS/VerifyOS/EvidenceBoundVerificationV0_1.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/verify-os-v0-1-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile VerifyOS runtime
        run: python -m compileall -q runtime scripts/check_verify_os_evidence_bound_verification_v0_1.py
      - name: Validate VerifyOS evidence-bound verification
        run: python -m runtime.v01_verify_os_evidence_bound_verification > verify-os-v01.log 2>&1
      - name: Validate VerifyOS check entry point
        run: python scripts/check_verify_os_evidence_bound_verification_v0_1.py >> verify-os-v01.log 2>&1
      - name: Upload VerifyOS validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-os-v01-log
          path: verify-os-v01.log
