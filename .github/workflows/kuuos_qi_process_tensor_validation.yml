name: KuuOS Qi Process Tensor Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'runtime/qi_process_tensor_v0_1.py'
      - 'runtime/qi_total_field_v0_1.py'
      - 'tests/test_qi_process_tensor_v0_1.py'
      - '.github/workflows/kuuos_qi_process_tensor_validation.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 -m unittest tests.test_qi_process_tensor_v0_1 tests.test_qi_total_field_v0_1
