name: WORLD Vacuum Expectation OS Receipt Composition v0.53

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'README.md'
      - 'ROADMAP.md'
      - 'formal/KUOS/WORLD/VacuumExpectationObserveOSCommitVerifyHandoffBridgeV0_53.lean'
      - 'formal/KuuOSFormalV0_53.lean'
      - 'formal/KUOS.lean'
      - 'lakefile.toml'
      - 'manifests/world_vacuum_expectation_observeos_commit_verify_handoff_v0_53.json'
      - 'scripts/check_world_vacuum_expectation_observeos_commit_verify_handoff_v0_53.py'
      - 'scripts/run_kuuos_runtime_full_check_v0_53.py'
      - 'docs/KU_WORLD_VACUUM_EXPECTATION_OBSERVEOS_COMMIT_VERIFY_HANDOFF_v0_53.md'
      - '.github/workflows/world-vacuum-expectation-observeos-commit-verify-v0-53.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run complete v0.53 regression chain
        id: regression
        continue-on-error: true
        run: |
          set -o pipefail
          python3 scripts/run_kuuos_runtime_full_check_v0_53.py 2>&1 | tee /tmp/world-v053-regression.log
      - name: Report regression failure
        if: steps.regression.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const text = fs.readFileSync('/tmp/world-v053-regression.log', 'utf8');
            const body = [
              'WORLD v0.53 macOS regression failed.',
              '```text',
              text.slice(-5000),
              '```'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
      - name: Stop after regression failure
        if: steps.regression.outcome == 'failure'
        run: exit 1
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify committed manifest is canonical
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Compile WORLD v0.53 root
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KuuOSFormalV0_53
      - name: Compile aggregate formal root
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KuuOSFormal
