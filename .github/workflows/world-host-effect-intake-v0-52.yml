name: WORLD Host-Effect Intake v0.52

on:
  workflow_dispatch:
  push:
    paths:
      - "formal/KUOS/WORLD/VacuumExpectationHostEffectAtomicCommitIntakeV0_52.lean"
      - "formal/KuuOSFormalV0_52.lean"
      - "formal/KuuOSFormal.lean"
      - "formal/KUOS.lean"
      - "formal/KUOS/ActOS/VacuumExpectationBoundedAdapterInvocationV0_4.lean"
      - "formal/KUOS/ObserveOS/EffectGroundedObservationV0_1.lean"
      - "lakefile.toml"
      - "lake-manifest.json"
      - "lean-toolchain"
      - "docs/KU_WORLD_HOST_EFFECT_INTAKE_v0_52.md"
      - "manifests/world_vacuum_expectation_host_effect_intake_v0_52.json"
      - "scripts/check_world_vacuum_expectation_host_effect_intake_v0_52.py"
      - "scripts/run_kuuos_runtime_full_check_v0_52.py"
      - ".github/workflows/world-host-effect-intake-v0-52.yml"
  pull_request:
    paths:
      - "formal/KUOS/WORLD/VacuumExpectationHostEffectAtomicCommitIntakeV0_52.lean"
      - "formal/KuuOSFormalV0_52.lean"
      - "formal/KuuOSFormal.lean"
      - "formal/KUOS.lean"
      - "formal/KUOS/ActOS/VacuumExpectationBoundedAdapterInvocationV0_4.lean"
      - "formal/KUOS/ObserveOS/EffectGroundedObservationV0_1.lean"
      - "lakefile.toml"
      - "lake-manifest.json"
      - "lean-toolchain"
      - "docs/KU_WORLD_HOST_EFFECT_INTAKE_v0_52.md"
      - "manifests/world_vacuum_expectation_host_effect_intake_v0_52.json"
      - "scripts/check_world_vacuum_expectation_host_effect_intake_v0_52.py"
      - "scripts/run_kuuos_runtime_full_check_v0_52.py"
      - ".github/workflows/world-host-effect-intake-v0-52.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile WORLD v0.52 validation surface
        run: >-
          python3 -m compileall -q
          scripts/check_world_vacuum_expectation_host_effect_intake_v0_52.py
          scripts/run_kuuos_runtime_full_check_v0_52.py
      - name: Validate WORLD v0.52 manifest JSON
        run: >-
          python3 -m json.tool
          manifests/world_vacuum_expectation_host_effect_intake_v0_52.json
          > /dev/null
      - name: Check WORLD v0.52 registration
        shell: bash
        run: |
          set -o pipefail
          PYTHONPATH=. python3 scripts/check_world_vacuum_expectation_host_effect_intake_v0_52.py \
            2>&1 | tee world-host-effect-v0-52.log
      - name: Run current cumulative runtime regression
        shell: bash
        run: |
          set -o pipefail
          PYTHONPATH=. python3 scripts/run_kuuos_runtime_full_check_v0_52.py \
            2>&1 | tee -a world-host-effect-v0-52.log
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify canonical manifest
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib cache
        run: lake exe cache get
      - name: Strictly compile WORLD v0.52 module
        shell: bash
        run: |
          set -o pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true \
            build KUOS.WORLD.VacuumExpectationHostEffectAtomicCommitIntakeV0_52 \
            2>&1 | tee world-host-effect-v0-52-lean-module.log
      - name: Strictly compile WORLD v0.52 root
        shell: bash
        run: |
          set -o pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true build KuuOSFormalV0_52 \
            2>&1 | tee world-host-effect-v0-52-lean-root.log
      - name: Strictly compile aggregate formal root
        shell: bash
        run: |
          set -o pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true build KuuOSFormal \
            2>&1 | tee world-host-effect-v0-52-lean-aggregate.log
      - name: Upload WORLD v0.52 diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: world-host-effect-v0-52-diagnostics
          path: |
            world-host-effect-v0-52.log
            world-host-effect-v0-52-lean-module.log
            world-host-effect-v0-52-lean-root.log
            world-host-effect-v0-52-lean-aggregate.log
          if-no-files-found: warn
