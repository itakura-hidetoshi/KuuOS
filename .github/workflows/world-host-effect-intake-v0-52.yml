name: WORLD Host-Effect Intake v0.52

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "formal/KUOS/WORLD/VacuumExpectationHostEffectAtomicCommitIntakeV0_52.lean"
      - "formal/KuuOSFormalV0_52.lean"
      - "formal/KuuOSFormal.lean"
      - "formal/KUOS.lean"
      - "lakefile.toml"
      - "docs/KU_WORLD_HOST_EFFECT_INTAKE_v0_52.md"
      - "manifests/world_vacuum_expectation_host_effect_intake_v0_52.json"
      - "scripts/check_world_vacuum_expectation_host_effect_intake_v0_52.py"
      - "scripts/run_kuuos_runtime_full_check_v0_52.py"
      - ".github/workflows/world-host-effect-intake-v0-52.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check WORLD v0.52 registration
        run: python3 scripts/check_world_vacuum_expectation_host_effect_intake_v0_52.py
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify canonical manifest
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib cache
        run: lake exe cache get
      - name: Compile WORLD v0.52 module
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KUOS.WORLD.VacuumExpectationHostEffectAtomicCommitIntakeV0_52
      - name: Compile WORLD v0.52 root
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KuuOSFormalV0_52
      - name: Compile aggregate formal root
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KuuOSFormal
