name: Observation Belief State v0.21 Probe macOS

on:
  push:
    paths:
      - "runtime/kuuos_observation_belief_state_kernel_v0_21.py"
      - "runtime/kuuos_observation_belief_state_store_v0_21.py"
      - "runtime/kuuos_observation_belief_state_scenarios_v0_21.py"
      - "scripts/check_observation_belief_state_v0_21.py"
      - "tests/test_observation_belief_state_v0_21.py"
      - "formal/KUOS/OpenHorizon/ObservationBeliefStateKernelV0_21.lean"
      - "formal/KUOS.lean"
      - "docs/KUUOS_OBSERVATION_BELIEF_STATE_KERNEL_v0_21.md"
      - "docs/KUUOS_AUTONOMOUS_AGENT_STATUS_v0_21.md"
      - "manifests/kuuos_observation_belief_state_kernel_v0_21.json"
      - ".github/workflows/observation-belief-state-v0-21-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_observation_belief_state_kernel_v0_21.py"
      - "runtime/kuuos_observation_belief_state_store_v0_21.py"
      - "runtime/kuuos_observation_belief_state_scenarios_v0_21.py"
      - "scripts/check_observation_belief_state_v0_21.py"
      - "tests/test_observation_belief_state_v0_21.py"
      - "formal/KUOS/OpenHorizon/ObservationBeliefStateKernelV0_21.lean"
      - "formal/KUOS.lean"
      - "docs/KUUOS_OBSERVATION_BELIEF_STATE_KERNEL_v0_21.md"
      - "docs/KUUOS_AUTONOMOUS_AGENT_STATUS_v0_21.md"
      - "manifests/kuuos_observation_belief_state_kernel_v0_21.json"
      - ".github/workflows/observation-belief-state-v0-21-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python surfaces
        run: >-
          python -m compileall -q
          runtime/kuuos_observation_belief_state_kernel_v0_21.py
          runtime/kuuos_observation_belief_state_store_v0_21.py
          runtime/kuuos_observation_belief_state_scenarios_v0_21.py
          scripts/check_observation_belief_state_v0_21.py
          tests/test_observation_belief_state_v0_21.py
      - name: Validate observation-belief scenarios
        run: >-
          PYTHONPATH=. python scripts/check_observation_belief_state_v0_21.py
          > observation-belief-v0-21.log 2>&1
      - name: Run v0.21 unit tests
        run: >-
          PYTHONPATH=. python -m unittest -v
          tests.test_observation_belief_state_v0_21
          >> observation-belief-v0-21.log 2>&1
      - name: Run mission-cycle regression
        run: >-
          PYTHONPATH=. python runtime/v021_autonomous_mission_cycle_kernel.py
          >> observation-belief-v0-21.log 2>&1
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Strictly compile v0.21 formal module
        shell: bash
        run: |
          set -o pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true \
            build KUOS.OpenHorizon.ObservationBeliefStateKernelV0_21 \
            2>&1 | tee observation-belief-v0-21-lean-module.log
      - name: Strictly compile formal root
        shell: bash
        run: |
          set -o pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true build KuuOSFormal \
            2>&1 | tee observation-belief-v0-21-lean-root.log
      - name: Upload v0.21 diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: observation-belief-v0-21-macos-probe-diagnostics
          path: |
            observation-belief-v0-21.log
            observation-belief-v0-21-lean-module.log
            observation-belief-v0-21-lean-root.log
          if-no-files-found: warn
