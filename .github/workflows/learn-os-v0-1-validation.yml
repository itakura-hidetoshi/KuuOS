name: LearnOS v0.1 Validation

on:
  push:
    paths:
      - "docs/KUUOS_LEARN_OS_FUTURE_ONLY_EVIDENCE_LEARNING_v0_1.md"
      - "manifests/kuuos_learn_os_future_only_evidence_learning_v0_1.json"
      - "runtime/kuuos_learn_os_types_v0_1.py"
      - "runtime/kuuos_learn_os_kernel_v0_1.py"
      - "runtime/kuuos_learn_os_store_v0_1.py"
      - "runtime/kuuos_learn_os_fixture_v0_1.py"
      - "runtime/v01_learn_os_future_only_evidence_learning.py"
      - "scripts/check_learn_os_future_only_evidence_learning_v0_1.py"
      - "scripts/run_kuuos_runtime_full_check_v0_1.py"
      - "formal/KUOS/LearnOS/FutureOnlyEvidenceLearningV0_1.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/learn-os-v0-1-validation.yml"
  pull_request:
    paths:
      - "docs/KUUOS_LEARN_OS_FUTURE_ONLY_EVIDENCE_LEARNING_v0_1.md"
      - "manifests/kuuos_learn_os_future_only_evidence_learning_v0_1.json"
      - "runtime/kuuos_learn_os_types_v0_1.py"
      - "runtime/kuuos_learn_os_kernel_v0_1.py"
      - "runtime/kuuos_learn_os_store_v0_1.py"
      - "runtime/kuuos_learn_os_fixture_v0_1.py"
      - "runtime/v01_learn_os_future_only_evidence_learning.py"
      - "scripts/check_learn_os_future_only_evidence_learning_v0_1.py"
      - "scripts/run_kuuos_runtime_full_check_v0_1.py"
      - "formal/KUOS/LearnOS/FutureOnlyEvidenceLearningV0_1.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/learn-os-v0-1-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile LearnOS runtime
        run: python -m compileall -q runtime scripts/check_learn_os_future_only_evidence_learning_v0_1.py
      - name: Validate LearnOS future-only evidence learning
        run: python -m runtime.v01_learn_os_future_only_evidence_learning > learn-os-v01.log 2>&1
      - name: Validate LearnOS check entry point
        run: python scripts/check_learn_os_future_only_evidence_learning_v0_1.py >> learn-os-v01.log 2>&1
      - name: Upload LearnOS validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: learn-os-v01-log
          path: learn-os-v01.log
