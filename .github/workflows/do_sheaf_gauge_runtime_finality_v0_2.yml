name: Dependent Origination Sheaf Gauge Runtime Finality v0.2

on:
  push:
    paths:
      - 'examples/dependent_origination_sheaf_gauge_runtime_v0_2.py'
      - 'tests/test_dependent_origination_sheaf_gauge_runtime_v0_2.py'
      - 'specs/dependent_origination_sheaf_gauge_runtime_claims_v0_2.json'
      - 'scripts/*do_sheaf_gauge*_v0_2.py'
      - 'scripts/*dependent_origination_sheaf_gauge*_v0_2.py'
      - 'docs/DO_SHEAF_GAUGE_RUNTIME_*_v0_2.md'
      - '.github/workflows/do_sheaf_gauge_runtime_finality_v0_2.yml'
  pull_request:
    paths:
      - 'examples/dependent_origination_sheaf_gauge_runtime_v0_2.py'
      - 'tests/test_dependent_origination_sheaf_gauge_runtime_v0_2.py'
      - 'specs/dependent_origination_sheaf_gauge_runtime_claims_v0_2.json'
      - 'scripts/*do_sheaf_gauge*_v0_2.py'
      - 'scripts/*dependent_origination_sheaf_gauge*_v0_2.py'
      - 'docs/DO_SHEAF_GAUGE_RUNTIME_*_v0_2.md'
      - '.github/workflows/do_sheaf_gauge_runtime_finality_v0_2.yml'
  workflow_dispatch:

jobs:
  validate-do-sheaf-gauge-runtime-finality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate sheaf gauge dependent origination runtime finality v0.2
        run: python3 scripts/check_do_sheaf_gauge_runtime_finality_v0_2.py

      - name: Validate sheaf gauge finality workflow v0.2
        run: python3 scripts/check_do_sheaf_gauge_runtime_finality_ci_v0_2.py
