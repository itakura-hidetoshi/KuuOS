name: BeliefOS v0.3 Context-Gerbe Coherence Validation

on:
  push:
    paths:
      - "docs/KUUOS_BELIEF_OS_CONTEXT_GERBE_COHERENCE_v0_3.md"
      - "manifests/kuuos_belief_os_context_gerbe_coherence_v0_3.json"
      - "runtime/kuuos_belief_os_gerbe_types_v0_3.py"
      - "runtime/kuuos_belief_os_gerbe_coherence_v0_3.py"
      - "runtime/kuuos_belief_os_gerbe_store_v0_3.py"
      - "runtime/v03_belief_os_context_gerbe_coherence.py"
      - "scripts/check_belief_os_context_gerbe_coherence_v0_3.py"
      - "formal/KUOS/BeliefOS/ContextGerbeCoherenceV0_3.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/belief-os-v0-3-context-gerbe-coherence-validation.yml"
  pull_request:
    paths:
      - "docs/KUUOS_BELIEF_OS_CONTEXT_GERBE_COHERENCE_v0_3.md"
      - "manifests/kuuos_belief_os_context_gerbe_coherence_v0_3.json"
      - "runtime/kuuos_belief_os_gerbe_types_v0_3.py"
      - "runtime/kuuos_belief_os_gerbe_coherence_v0_3.py"
      - "runtime/kuuos_belief_os_gerbe_store_v0_3.py"
      - "runtime/v03_belief_os_context_gerbe_coherence.py"
      - "scripts/check_belief_os_context_gerbe_coherence_v0_3.py"
      - "formal/KUOS/BeliefOS/ContextGerbeCoherenceV0_3.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/belief-os-v0-3-context-gerbe-coherence-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile BeliefOS v0.3 runtime
        run: python -m compileall -q runtime scripts/check_belief_os_context_gerbe_coherence_v0_3.py
      - name: Validate context-gerbe credal coherence
        run: python -m runtime.v03_belief_os_context_gerbe_coherence > belief-os-v03.log 2>&1
      - name: Validate check entry point
        run: python scripts/check_belief_os_context_gerbe_coherence_v0_3.py >> belief-os-v03.log 2>&1
      - name: Upload BeliefOS v0.3 validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: belief-os-v03-log
          path: belief-os-v03.log
