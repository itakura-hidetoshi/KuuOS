name: Qi Bounded Plural Shadow Routing v0.20 Validation

on:
  push:
    paths:
      - "runtime/kuuos_indra_qi_bounded_plural_shadow_routing_*_v0_20.py"
      - "scripts/check_qi_bounded_plural_shadow_routing_v0_20.py"
      - "manifests/qi_bounded_plural_shadow_routing_v0_20.json"
      - "examples/indra_qi_bounded_plural_shadow_routing_plan_v0_20.json"
      - "docs/KU_INDRA_QI_BOUNDED_PLURAL_SHADOW_ROUTING_v0_20.md"
      - ".github/workflows/qi-bounded-plural-shadow-routing-v0-20-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_indra_qi_bounded_plural_shadow_routing_*_v0_20.py"
      - "scripts/check_qi_bounded_plural_shadow_routing_v0_20.py"
      - "manifests/qi_bounded_plural_shadow_routing_v0_20.json"
      - "examples/indra_qi_bounded_plural_shadow_routing_plan_v0_20.json"
      - "docs/KU_INDRA_QI_BOUNDED_PLURAL_SHADOW_ROUTING_v0_20.md"
      - ".github/workflows/qi-bounded-plural-shadow-routing-v0-20-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile v0.20 runtime
        run: python -m py_compile runtime/kuuos_indra_qi_bounded_plural_shadow_routing_core_v0_20.py runtime/kuuos_indra_qi_bounded_plural_shadow_routing_runtime_v0_20.py scripts/check_qi_bounded_plural_shadow_routing_v0_20.py
      - name: Run v0.20 checks
        run: python scripts/check_qi_bounded_plural_shadow_routing_v0_20.py
