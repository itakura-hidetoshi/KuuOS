name: DecisionOS Wa v0.3 Validation

on:
  push:
    paths:
      - "docs/KUUOS_DECISION_OS_WA_RELATIONAL_HARMONY_v0_3.md"
      - "manifests/kuuos_decision_os_wa_relational_harmony_v0_3.json"
      - "runtime/kuuos_decision_os_wa_types_v0_3.py"
      - "runtime/kuuos_decision_os_wa_state_v0_3.py"
      - "runtime/kuuos_decision_os_wa_kernel_v0_3.py"
      - "runtime/kuuos_decision_os_wa_store_v0_3.py"
      - "runtime/v03_decision_os_wa_relational_harmony.py"
      - "scripts/check_decision_os_wa_relational_harmony_v0_3.py"
      - "scripts/run_kuuos_runtime_full_check_v0_1.py"
      - "formal/KUOS/DecisionOS/WaRelationalHarmonyV0_3.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/decision-os-wa-v0-3-validation.yml"
  pull_request:
    paths:
      - "docs/KUUOS_DECISION_OS_WA_RELATIONAL_HARMONY_v0_3.md"
      - "manifests/kuuos_decision_os_wa_relational_harmony_v0_3.json"
      - "runtime/kuuos_decision_os_wa_types_v0_3.py"
      - "runtime/kuuos_decision_os_wa_state_v0_3.py"
      - "runtime/kuuos_decision_os_wa_kernel_v0_3.py"
      - "runtime/kuuos_decision_os_wa_store_v0_3.py"
      - "runtime/v03_decision_os_wa_relational_harmony.py"
      - "scripts/check_decision_os_wa_relational_harmony_v0_3.py"
      - "scripts/run_kuuos_runtime_full_check_v0_1.py"
      - "formal/KUOS/DecisionOS/WaRelationalHarmonyV0_3.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/decision-os-wa-v0-3-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Wa runtime
        run: python -m compileall -q runtime scripts/check_decision_os_wa_relational_harmony_v0_3.py
      - name: Validate Wa relational harmony kernel
        run: python -m runtime.v03_decision_os_wa_relational_harmony > decision-os-wa-v03.log 2>&1
      - name: Validate Wa check entry point
        run: python scripts/check_decision_os_wa_relational_harmony_v0_3.py >> decision-os-wa-v03.log 2>&1
      - name: Upload Wa validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decision-os-wa-v03-log
          path: decision-os-wa-v03.log
