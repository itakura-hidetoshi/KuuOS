name: PlanOS Hysteresis Constraint DecisionOS Handoff v0.20

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "formal/KuuOSPlanOSV0_20.lean"
      - "formal/KuuOSFormal.lean"
      - "formal/KUOS/PlanOS/VacuumExpectationHysteresisConstraintDecisionHandoffV0_20.lean"
      - "formal/KUOS/PlanOS/VacuumExpectationHistoryQiCandidateGenerationV0_19.lean"
      - "formal/KUOS/PlanOS/QiConditionedNonMarkovReplanV0_2.lean"
      - "docs/KUUOS_PLANOS_HYSTERESIS_CONSTRAINT_DECISION_HANDOFF_v0_20.md"
      - "manifests/kuuos_planos_hysteresis_constraint_decision_handoff_v0_20.json"
      - "scripts/check_planos_hysteresis_constraint_decision_handoff_v0_20.py"
      - "scripts/run_kuuos_runtime_full_check_v0_51.py"
      - ".github/workflows/planos-hysteresis-constraint-decision-handoff-v0-20.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check PlanOS v0.20 registration
        run: python3 scripts/check_planos_hysteresis_constraint_decision_handoff_v0_20.py
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify committed manifest is canonical
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Compile PlanOS v0.20 module
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KUOS.PlanOS.VacuumExpectationHysteresisConstraintDecisionHandoffV0_20
      - name: Compile aggregate KuuOS formal root
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KuuOSFormal
