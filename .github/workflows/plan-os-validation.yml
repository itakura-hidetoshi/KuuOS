name: PlanOS Validation

on:
  workflow_dispatch:
  push:
    paths:
      - 'docs/KUUOS_PLAN_OS_*.md'
      - 'manifests/kuuos_plan_os_*.json'
      - 'runtime/kuuos_plan_os_*.py'
      - 'runtime/v0*_plan_os_*.py'
      - 'scripts/check_plan_os_*.py'
      - 'scripts/run_plan_os_full_checks_v0_17.py'
      - 'formal/KUOS/PlanOS/**'
      - 'formal/KUOS.lean'
      - '.github/workflows/plan-os-validation.yml'
  pull_request:
    paths:
      - 'docs/KUUOS_PLAN_OS_*.md'
      - 'manifests/kuuos_plan_os_*.json'
      - 'runtime/kuuos_plan_os_*.py'
      - 'runtime/v0*_plan_os_*.py'
      - 'scripts/check_plan_os_*.py'
      - 'scripts/run_plan_os_full_checks_v0_17.py'
      - 'formal/KUOS/PlanOS/**'
      - 'formal/KUOS.lean'
      - '.github/workflows/plan-os-validation.yml'

permissions:
  contents: read

concurrency:
  group: plan-os-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile PlanOS validation surfaces
        run: python -m compileall -q runtime scripts/run_plan_os_full_checks_v0_17.py scripts/check_plan_os_*.py
      - name: Run PlanOS full checks
        run: python scripts/run_plan_os_full_checks_v0_17.py
      - name: Upload early-version logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-os-validation-logs
          path: plan-os-v0*.log
          if-no-files-found: warn
