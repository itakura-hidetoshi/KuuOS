name: ActOS Authorization Intake v0.3
on:
  workflow_dispatch:
  pull_request:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/check_actos_activation_authorization_intake_v0_3.py
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - run: lake update
      - run: git diff --exit-code -- lake-manifest.json
      - run: lake exe cache get
      - run: lake -KleanArgs=-DwarningAsError=true -KleanArgs=-DsorryAsError=true build KUOS.ActOS.VacuumExpectationActivationAuthorizationIntakeV0_3
      - run: lake -KleanArgs=-DwarningAsError=true -KleanArgs=-DsorryAsError=true build KuuOSFormal
