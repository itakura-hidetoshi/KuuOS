name: Temporary VerifyOS Learning Required Fix

on:
  push:
    branches:
      - fix/vacuum-receipt-chain

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/vacuum-receipt-chain
      - name: Add VerifyOS learning requirement bridge
        shell: python
        run: |
          from pathlib import Path
          path = Path("formal/KUOS/VerifyOS/VacuumExpectationCommitVerificationReceiptV0_3.lean")
          text = path.read_text(encoding="utf-8")
          marker = " theorem passed_receipt_discharges_verification_debt\n"
          theorem = """ theorem verification_requires_learning
    (receipt : VacuumExpectationCommitVerificationReceipt
      K O Intake ObserveBridge VerifyBridge) :
    receipt.debtSemantics.learningRequired = true := by
  exact receipt.debtSemantics.learningAlways

"""
          if theorem not in text:
              if marker not in text:
                  raise SystemExit("insertion marker not found")
              path.write_text(text.replace(marker, theorem + marker, 1), encoding="utf-8")
      - name: Commit fix
        run: |
          git config user.name "itakura-hidetoshi"
          git config user.email "itakurahidetoshi@mac.com"
          git add formal/KUOS/VerifyOS/VacuumExpectationCommitVerificationReceiptV0_3.lean
          git diff --cached --quiet && exit 0
          git commit -m "Expose VerifyOS v0.3 learning requirement"
          git push origin HEAD:fix/vacuum-receipt-chain
