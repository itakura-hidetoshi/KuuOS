name: KuuOS Qi Runtime Binding Validation

on:
  workflow_dispatch:
  push:
    paths:
      - 'specs/kuuos_qi_runtime_binding_os_bridge_v0_1.json'
      - 'scripts/validate_kuuos_qi_runtime_binding_os_bridge_v0_1_min.py'
      - 'specs/kuuos_qi_sanjiao_os_bridge_v0_1.json'
      - 'scripts/validate_kuuos_qi_sanjiao_os_bridge_v0_1_min.py'
      - '.github/workflows/kuuos_qi_runtime_binding_validation.yml'
  pull_request:
    paths:
      - 'specs/kuuos_qi_runtime_binding_os_bridge_v0_1.json'
      - 'scripts/validate_kuuos_qi_runtime_binding_os_bridge_v0_1_min.py'
      - 'specs/kuuos_qi_sanjiao_os_bridge_v0_1.json'
      - 'scripts/validate_kuuos_qi_sanjiao_os_bridge_v0_1_min.py'
      - '.github/workflows/kuuos_qi_runtime_binding_validation.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 scripts/validate_kuuos_qi_runtime_binding_os_bridge_v0_1_min.py
