name: MGAP4D External Audit Readiness CI Ledger v0.1

on:
  push:
    paths:
      - 'docs/MGAP4D_EXTERNAL_AUDIT_READINESS_CI_LEDGER_v0_1.md'
      - 'docs/MGAP4D_EXTERNAL_AUDIT_READINESS_CHAIN_INDEX_v0_1.md'
      - 'scripts/check_mgap4d_external_audit_readiness_ci_ledger_v0_1.py'
      - 'scripts/check_mgap4d_external_audit_readiness_chain_index_v0_1.py'
      - 'scripts/build_mgap4d_external_audit_readiness_bundle_manifest_v0_1.py'
      - 'scripts/check_mgap4d_external_audit_readiness_bundle_manifest_v0_1.py'
      - '.github/workflows/mgap4d_external_audit_readiness_ci_ledger_v0_1.yml'
  pull_request:
    paths:
      - 'docs/MGAP4D_EXTERNAL_AUDIT_READINESS_CI_LEDGER_v0_1.md'
      - 'docs/MGAP4D_EXTERNAL_AUDIT_READINESS_CHAIN_INDEX_v0_1.md'
      - 'scripts/check_mgap4d_external_audit_readiness_ci_ledger_v0_1.py'
      - 'scripts/check_mgap4d_external_audit_readiness_chain_index_v0_1.py'
      - 'scripts/build_mgap4d_external_audit_readiness_bundle_manifest_v0_1.py'
      - 'scripts/check_mgap4d_external_audit_readiness_bundle_manifest_v0_1.py'
      - '.github/workflows/mgap4d_external_audit_readiness_ci_ledger_v0_1.yml'
  workflow_dispatch:

jobs:
  validate-mgap4d-external-audit-readiness-ledger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check MGAP4D external audit readiness CI ledger v0.1
        run: python3 scripts/check_mgap4d_external_audit_readiness_ci_ledger_v0_1.py

      - name: Check MGAP4D external audit readiness chain index v0.1
        run: python3 scripts/check_mgap4d_external_audit_readiness_chain_index_v0_1.py

      - name: Build MGAP4D external audit readiness bundle manifest v0.1
        run: python3 scripts/build_mgap4d_external_audit_readiness_bundle_manifest_v0_1.py

      - name: Check MGAP4D external audit readiness bundle manifest v0.1
        run: python3 scripts/check_mgap4d_external_audit_readiness_bundle_manifest_v0_1.py
