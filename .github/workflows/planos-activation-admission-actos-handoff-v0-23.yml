name: PlanOS Activation Admission ActOS Handoff v0.23

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "formal/KUOS/PlanOS/VacuumExpectationActivationAdmissionActOSHandoffV0_23.lean"
      - "formal/KuuOSPlanOSV0_23.lean"
      - "formal/KuuOSFormal.lean"
      - "scripts/check_planos_activation_admission_actos_handoff_v0_23.py"
      - "scripts/run_kuuos_runtime_full_check_v0_51.py"
      - "manifests/kuuos_planos_activation_admission_actos_handoff_v0_23.json"
      - "docs/KUUOS_PLANOS_ACTIVATION_ADMISSION_ACTOS_HANDOFF_v0_23.md"
      - ".github/workflows/planos-activation-admission-actos-handoff-v0-23.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check PlanOS v0.23 registration
        run: python3 scripts/check_planos_activation_admission_actos_handoff_v0_23.py
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify canonical manifest
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib cache
        run: lake exe cache get
      - name: Compile PlanOS v0.23 module
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KUOS.PlanOS.VacuumExpectationActivationAdmissionActOSHandoffV0_23
      - name: Compile aggregate formal root
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KuuOSFormal
