name: Qi-WORLD Licensed Blocker Discharge v1.6

on:
  push:
    paths:
      - "runtime/kuuos_qi_world_licensed_blocker_discharge_core_v1_6.py"
      - "runtime/kuuos_qi_world_licensed_blocker_discharge_v1_6.py"
      - "runtime/kuuos_qi_world_licensed_blocker_discharge_scenarios_v1_6.py"
      - "scripts/check_qi_world_licensed_blocker_discharge_v1_6.py"
      - "tests/test_qi_world_licensed_blocker_discharge_v1_6.py"
      - "formal/KUOS/Architecture/QiWorldLicensedBlockerDischargeV1_6.lean"
      - "formal/KUOS.lean"
      - "scripts/check_qi_world_cross_cycle_blocker_v1_5.py"
      - ".github/workflows/qi-world-licensed-blocker-discharge-v1-6-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_qi_world_licensed_blocker_discharge_core_v1_6.py"
      - "runtime/kuuos_qi_world_licensed_blocker_discharge_v1_6.py"
      - "runtime/kuuos_qi_world_licensed_blocker_discharge_scenarios_v1_6.py"
      - "scripts/check_qi_world_licensed_blocker_discharge_v1_6.py"
      - "tests/test_qi_world_licensed_blocker_discharge_v1_6.py"
      - "formal/KUOS/Architecture/QiWorldLicensedBlockerDischargeV1_6.lean"
      - "formal/KUOS.lean"
      - "scripts/check_qi_world_cross_cycle_blocker_v1_5.py"
      - ".github/workflows/qi-world-licensed-blocker-discharge-v1-6-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python surfaces
        run: >-
          python -m compileall -q
          runtime/kuuos_qi_world_licensed_blocker_discharge_core_v1_6.py
          runtime/kuuos_qi_world_licensed_blocker_discharge_v1_6.py
          runtime/kuuos_qi_world_licensed_blocker_discharge_scenarios_v1_6.py
          scripts/check_qi_world_licensed_blocker_discharge_v1_6.py
          tests/test_qi_world_licensed_blocker_discharge_v1_6.py
      - name: Validate licensed blocker discharge
        run: >-
          python scripts/check_qi_world_licensed_blocker_discharge_v1_6.py
          > licensed-discharge-v1-6.log 2>&1
      - name: Upload licensed discharge diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qi-world-licensed-blocker-discharge-v1-6-diagnostics
          path: licensed-discharge-v1-6.log
          if-no-files-found: error
      - name: Run licensed discharge tests
        run: >-
          python -m unittest -v
          tests.test_qi_world_licensed_blocker_discharge_v1_6
      - name: Run blocker chain regression
        run: python scripts/check_qi_world_cross_cycle_blocker_v1_5.py
      - name: Run central runtime regression
        run: python scripts/run_kuuos_runtime_full_check_v0_1.py
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Strictly compile formal root
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true build KuuOSFormal
