name: CodeAI Frozen Cohort Prediction-Pack and Execution-Shard Contract v0.1

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "runtime/kuuos_codeai_frozen_cohort_prediction_pack_execution_shard_contract_v0_1.py"
      - "tests/test_kuuos_codeai_frozen_cohort_prediction_pack_execution_shard_contract_v0_1.py"
      - "formal/KUOS/CodeAI/FrozenCohortPredictionPackExecutionShardContractV0_1.lean"
      - "docs/KUUOS_CODEAI_FROZEN_COHORT_PREDICTION_PACK_EXECUTION_SHARD_CONTRACT_v0_1.md"
      - "manifests/kuuos_codeai_frozen_cohort_prediction_pack_execution_shard_contract_v0_1.json"
      - ".github/workflows/codeai-frozen-cohort-prediction-pack-execution-shard-contract-v0-1.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate-contract:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python
        run: >-
          python3 -m compileall -q
          runtime/kuuos_codeai_frozen_cohort_prediction_pack_execution_shard_contract_v0_1.py
          tests/test_kuuos_codeai_frozen_cohort_prediction_pack_execution_shard_contract_v0_1.py
      - name: Validate manifest
        run: python3 -m json.tool manifests/kuuos_codeai_frozen_cohort_prediction_pack_execution_shard_contract_v0_1.json >/dev/null
      - name: Run focused tests
        run: PYTHONPATH=. python3 -m unittest tests.test_kuuos_codeai_frozen_cohort_prediction_pack_execution_shard_contract_v0_1
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify dependency manifest
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib cache
        run: lake exe cache get
      - name: Strictly compile formal contract
        run: >-
          lake env lean
          -DwarningAsError=true
          -Dweak.sorryAsError=true
          formal/KUOS/CodeAI/FrozenCohortPredictionPackExecutionShardContractV0_1.lean
