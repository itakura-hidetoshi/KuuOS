name: KuuOS Configuration v0.77

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

env:
  MATHLIB_NO_CACHE_ON_UPDATE: '1'

jobs:
  runtime:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 -m compileall -q runtime/kuuos_governance_role_topology_v0_77.py scripts/check_kuuos_governance_role_topology_v077.py
      - run: PYTHONPATH=. python3 scripts/check_kuuos_governance_role_topology_v077.py
      - run: python3 -m json.tool manifests/kuuos_governance_role_topology_v0_77.json >/dev/null

  formal:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - run: lake update
      - run: git diff --exit-code -- lake-manifest.json
      - run: lake exe cache get
      - run: lake -KleanArgs=-DwarningAsError=true -KleanArgs=-DsorryAsError=true build KuuOSFormal KuuOSRoleConfigV0_77
