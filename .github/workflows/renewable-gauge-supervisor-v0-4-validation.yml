name: Renewable Gauge Supervisor v0.4 Validation

on:
  push:
    paths:
      - "runtime/kuuos_renewable_gauge_supervisor*_v0_4.py"
      - "runtime/kuuos_active_gauge_intervention_effect_v0_3.py"
      - "scripts/check_renewable_gauge_supervisor_v0_4.py"
      - "formal/KUOS/OpenHorizon/RenewableGaugeSupervisorV0_4.lean"
      - "docs/KUUOS_RENEWABLE_GAUGE_SUPERVISOR_v0_4.md"
      - "examples/kuuos_renewable_gauge_supervisor_input_v0_4.json"
      - "manifests/kuuos_renewable_gauge_supervisor_v0_4.json"
      - ".github/workflows/renewable-gauge-supervisor-v0-4-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_renewable_gauge_supervisor*_v0_4.py"
      - "runtime/kuuos_active_gauge_intervention_effect_v0_3.py"
      - "scripts/check_renewable_gauge_supervisor_v0_4.py"
      - "formal/KUOS/OpenHorizon/RenewableGaugeSupervisorV0_4.lean"
      - "docs/KUUOS_RENEWABLE_GAUGE_SUPERVISOR_v0_4.md"
      - "examples/kuuos_renewable_gauge_supervisor_input_v0_4.json"
      - "manifests/kuuos_renewable_gauge_supervisor_v0_4.json"
      - ".github/workflows/renewable-gauge-supervisor-v0-4-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile renewable gauge supervisor
        run: >-
          python -m py_compile
          runtime/kuuos_renewable_gauge_supervisor_types_v0_4.py
          runtime/kuuos_renewable_gauge_supervisor_children_v0_4.py
          runtime/kuuos_renewable_gauge_supervisor_core_v0_4.py
          runtime/kuuos_renewable_gauge_supervisor_v0_4.py
          runtime/kuuos_active_gauge_intervention_effect_v0_3.py
          scripts/check_renewable_gauge_supervisor_v0_4.py
      - name: Run renewable gauge supervisor checks
        id: supervisor_checks
        continue-on-error: true
        run: python scripts/check_renewable_gauge_supervisor_v0_4.py > renewable-v04.log 2>&1
      - name: Upload renewable supervisor log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: renewable-gauge-supervisor-v04-log
          path: renewable-v04.log
      - name: Report renewable supervisor failure
        if: steps.supervisor_checks.outcome == 'failure'
        shell: bash
        run: |
          tail -n 80 renewable-v04.log
          exit 1
