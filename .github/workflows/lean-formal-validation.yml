name: KuuOS Lean Formal Validation

on:
  workflow_dispatch:
    inputs:
      target:
        description: Registered Lake target to compile
        required: true
        default: KuuOSFormal
        type: string
  push:
    branches:
      - main
    paths:
      - "formal/**"
      - "scripts/build_lean4.sh"
      - "docs/LEAN4_BUILD.md"
      - "lean-toolchain"
      - "lakefile.toml"
      - "lake-manifest.json"
      - ".github/workflows/lean-formal-validation.yml"

permissions:
  contents: read

concurrency:
  group: kuuos-lean-formal-${{ github.ref }}
  cancel-in-progress: true

env:
  MATHLIB_NO_CACHE_ON_UPDATE: '1'

jobs:
  formal:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    env:
      KUUOS_LEAN_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'KuuOSFormal' }}
    steps:
      - uses: actions/checkout@v6
      - name: Check build entrypoint syntax
        run: bash -n scripts/build_lean4.sh
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Restore Lake workspace cache
        uses: actions/cache@v5
        with:
          path: .lake
          key: kuuos-lake-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}-${{ github.sha }}
          restore-keys: |
            kuuos-lake-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}-
      - name: Compile pinned Lean 4 target
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/build_lean4.sh --target "$KUUOS_LEAN_TARGET" \
            2>&1 | tee lean-formal-validation.log
      - name: Upload formal validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kuuos-lean-formal-validation-log-${{ github.run_id }}-${{ github.run_attempt }}
          path: lean-formal-validation.log
          if-no-files-found: warn
          retention-days: 14
