name: KuuOS Lean Formal Validation

on:
  push:
    paths:
      - "formal/**"
      - "lean-toolchain"
      - "lakefile.toml"
      - "lake-manifest.json"
      - ".github/workflows/lean-formal-validation.yml"
  pull_request:
    paths:
      - "formal/**"
      - "lean-toolchain"
      - "lakefile.toml"
      - "lake-manifest.json"
      - ".github/workflows/lean-formal-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kuuos-lean-formal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  formal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Restore Lake workspace cache
        uses: actions/cache@v5
        with:
          path: .lake
          key: kuuos-lake-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}-${{ github.sha }}
          restore-keys: |
            kuuos-lake-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}-
      - name: Resolve pinned dependencies
        run: |
          set -o pipefail
          lake update 2>&1 | tee lean-formal-validation.log
      - name: Verify committed manifest is canonical
        run: |
          set -o pipefail
          git diff --exit-code -- lake-manifest.json 2>&1 | tee -a lean-formal-validation.log
      - name: Fetch Mathlib olean cache
        run: |
          set -o pipefail
          lake exe cache get 2>&1 | tee -a lean-formal-validation.log
      - name: Strictly compile all KuuOS formal surfaces
        run: |
          set -o pipefail
          lake -KleanArgs=-DwarningAsError=true -KleanArgs=-DsorryAsError=true build KuuOSFormal 2>&1 | tee -a lean-formal-validation.log
      - name: Upload formal validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kuuos-lean-formal-validation-log
          path: lean-formal-validation.log
