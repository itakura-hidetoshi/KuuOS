name: KuuOS IndraNet OS Dependency Bridge Validation

on:
  workflow_dispatch:
  push:
    paths:
      - 'specs/kuuos_indranet_os_dependency_bridge_v0_1.json'
      - 'specs/kuuos_dependent_origination_os_bridge_v0_1.json'
      - 'specs/kuuos_two_truths_os_bridge_v0_1.json'
      - 'specs/kuuos_os_autonomy_kernel_v0_1.json'
      - 'scripts/validate_kuuos_indranet_os_dependency_bridge_v0_1.py'
      - '.github/workflows/kuuos_indranet_os_dependency_bridge_validation.yml'
  pull_request:
    paths:
      - 'specs/kuuos_indranet_os_dependency_bridge_v0_1.json'
      - 'specs/kuuos_dependent_origination_os_bridge_v0_1.json'
      - 'specs/kuuos_two_truths_os_bridge_v0_1.json'
      - 'specs/kuuos_os_autonomy_kernel_v0_1.json'
      - 'scripts/validate_kuuos_indranet_os_dependency_bridge_v0_1.py'
      - '.github/workflows/kuuos_indranet_os_dependency_bridge_validation.yml'

jobs:
  validate-indranet-os-dependency-bridge:
    name: Validate KuuOS IndraNet OS dependency bridge v0.1
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Show IndraNet OS dependency boundary
        run: |
          python3 --version
          echo "Validating local dependency nodes, overlaps, gluing checks, blocker propagation, and non-collapse projections."

      - name: Validate IndraNet OS dependency bridge
        run: python3 scripts/validate_kuuos_indranet_os_dependency_bridge_v0_1.py
