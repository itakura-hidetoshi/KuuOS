name: Resumable Execution Handoff v0.15 Validation

on:
  push:
    paths:
      - "runtime/kuuos_resumable_execution_handoff*_v0_15.py"
      - "scripts/check_resumable_execution_handoff_kernel_v0_15.py"
      - "scripts/run_resumable_execution_handoff_v0_15.py"
      - "formal/KUOS/OpenHorizon/ResumableExecutionHandoffV0_15.lean"
      - "docs/KUUOS_RESUMABLE_EXECUTION_HANDOFF_v0_15.md"
      - ".github/workflows/resumable-execution-handoff-v0-15-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_resumable_execution_handoff*_v0_15.py"
      - "scripts/check_resumable_execution_handoff_kernel_v0_15.py"
      - "scripts/run_resumable_execution_handoff_v0_15.py"
      - "formal/KUOS/OpenHorizon/ResumableExecutionHandoffV0_15.lean"
      - "docs/KUUOS_RESUMABLE_EXECUTION_HANDOFF_v0_15.md"
      - ".github/workflows/resumable-execution-handoff-v0-15-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile v0.15
        run: python -m compileall -q runtime scripts
      - name: Run resumable handoff kernel checks
        id: checks
        continue-on-error: true
        run: python scripts/run_resumable_execution_handoff_v0_15.py > resumable-execution-handoff-v015.log 2>&1
      - name: Upload v0.15 kernel log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resumable-execution-handoff-v015-log
          path: resumable-execution-handoff-v015.log
      - name: Report v0.15 failure
        if: steps.checks.outcome == 'failure'
        run: |
          cat resumable-execution-handoff-v015.log
          exit 1
