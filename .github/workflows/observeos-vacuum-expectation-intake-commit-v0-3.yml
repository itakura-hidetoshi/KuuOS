name: ObserveOS Vacuum Expectation Intake Commit v0.3

on:
  push:
    paths:
      - "formal/KuuOSObserveOSV0_3.lean"
      - "formal/KUOS.lean"
      - "formal/KUOS/ObserveOS/VacuumExpectationIntakeCommitReceiptV0_3.lean"
      - "formal/KUOS/WORLD/VacuumExpectationObserveOSEvidenceIntakeBridgeV0_51.lean"
      - "formal/KUOS/ObserveOS/EffectGroundedObservationV0_1.lean"
      - "docs/KUUOS_OBSERVEOS_VACUUM_EXPECTATION_INTAKE_COMMIT_RECEIPT_v0_3.md"
      - "manifests/kuuos_observeos_vacuum_expectation_intake_commit_receipt_v0_3.json"
      - "scripts/check_observeos_vacuum_expectation_intake_commit_receipt_v0_3.py"
      - ".github/workflows/observeos-vacuum-expectation-intake-commit-v0-3.yml"
  pull_request:
    paths:
      - "formal/KuuOSObserveOSV0_3.lean"
      - "formal/KUOS.lean"
      - "formal/KUOS/ObserveOS/VacuumExpectationIntakeCommitReceiptV0_3.lean"
      - "formal/KUOS/WORLD/VacuumExpectationObserveOSEvidenceIntakeBridgeV0_51.lean"
      - "formal/KUOS/ObserveOS/EffectGroundedObservationV0_1.lean"
      - "docs/KUUOS_OBSERVEOS_VACUUM_EXPECTATION_INTAKE_COMMIT_RECEIPT_v0_3.md"
      - "manifests/kuuos_observeos_vacuum_expectation_intake_commit_receipt_v0_3.json"
      - "scripts/check_observeos_vacuum_expectation_intake_commit_receipt_v0_3.py"
      - ".github/workflows/observeos-vacuum-expectation-intake-commit-v0-3.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check ObserveOS v0.3 registration
        run: python3 scripts/check_observeos_vacuum_expectation_intake_commit_receipt_v0_3.py
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify committed manifest is canonical
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Compile ObserveOS v0.3 module
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KUOS.ObserveOS.VacuumExpectationIntakeCommitReceiptV0_3
      - name: Compile aggregate KuuOS formal root
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KuuOSFormal
