name: MemoryOS Qi-WORLD Blocker Integration v0.35

on:
  push:
    paths:
      - "runtime/kuuos_memoryos_qi_world_blocker_integration_v0_35.py"
      - "scripts/check_memoryos_qi_world_blocker_integration_v0_35.py"
      - "tests/test_memoryos_qi_world_blocker_integration_v0_35.py"
      - "docs/KUUOS_MEMORYOS_QI_WORLD_BLOCKER_INTEGRATION_v0_35.md"
      - "manifests/kuuos_memoryos_qi_world_blocker_integration_v0_35.json"
      - "formal/KUOS/OpenHorizon/MemoryOSQiWorldBlockerIntegrationKernelV0_35.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/memoryos-qi-world-blocker-integration-v0-35.yml"
  pull_request:
    paths:
      - "runtime/kuuos_memoryos_qi_world_blocker_integration_v0_35.py"
      - "scripts/check_memoryos_qi_world_blocker_integration_v0_35.py"
      - "tests/test_memoryos_qi_world_blocker_integration_v0_35.py"
      - "docs/KUUOS_MEMORYOS_QI_WORLD_BLOCKER_INTEGRATION_v0_35.md"
      - "manifests/kuuos_memoryos_qi_world_blocker_integration_v0_35.json"
      - "formal/KUOS/OpenHorizon/MemoryOSQiWorldBlockerIntegrationKernelV0_35.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/memoryos-qi-world-blocker-integration-v0-35.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile MemoryOS v0.35 Python
        run: |
          python -m compileall -q \
            runtime/kuuos_memoryos_qi_world_blocker_integration_v0_35.py \
            scripts/check_memoryos_qi_world_blocker_integration_v0_35.py \
            tests/test_memoryos_qi_world_blocker_integration_v0_35.py
      - name: Check MemoryOS v0.35 registration
        run: PYTHONPATH=. python scripts/check_memoryos_qi_world_blocker_integration_v0_35.py
      - name: Test MemoryOS v0.35 runtime
        id: memoryos_tests
        continue-on-error: true
        run: |
          set -o pipefail
          PYTHONPATH=. python -m unittest -v \
            tests.test_memoryos_qi_world_blocker_integration_v0_35 \
            2>&1 | tee memoryos-v035-unittest.log
      - name: Upload MemoryOS v0.35 unittest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: memoryos-v035-unittest-log
          path: memoryos-v035-unittest.log
          if-no-files-found: error
      - name: Require MemoryOS v0.35 runtime tests
        if: steps.memoryos_tests.outcome == 'failure'
        run: exit 1
      - name: Check non-Markov cognitive source
        run: PYTHONPATH=. python scripts/check_nonmarkov_cognitive_loop_v0_23.py
      - name: Check Qi-WORLD blocker source
        run: PYTHONPATH=. python scripts/check_qi_world_cross_cycle_blocker_v1_5.py
      - name: Check atomic WORLD source
        run: PYTHONPATH=. python scripts/check_authorized_atomic_world_commit_v0_34.py
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Lean checks
        run: |
          lake update
          lake exe cache get
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true \
            build KUOS.OpenHorizon.MemoryOSQiWorldBlockerIntegrationKernelV0_35
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true \
            build KuuOSFormal
