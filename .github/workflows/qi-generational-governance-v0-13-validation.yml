name: Qi Generational Governance v0.13 Validation

on:
  push:
    paths:
      - "runtime/kuuos_indra_qi_generational_governance_*_v0_13.py"
      - "scripts/check_qi_generational_governance_v0_13.py"
      - "manifests/qi_generational_governance_v0_13.json"
      - "examples/indra_qi_generational_governance_plan_v0_13.json"
      - "docs/KU_INDRA_QI_GENERATIONAL_GOVERNANCE_v0_13.md"
      - ".github/workflows/qi-generational-governance-v0-13-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_indra_qi_generational_governance_*_v0_13.py"
      - "scripts/check_qi_generational_governance_v0_13.py"
      - "manifests/qi_generational_governance_v0_13.json"
      - "examples/indra_qi_generational_governance_plan_v0_13.json"
      - "docs/KU_INDRA_QI_GENERATIONAL_GOVERNANCE_v0_13.md"
      - ".github/workflows/qi-generational-governance-v0-13-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile v0.13 runtime
        run: python -m py_compile runtime/kuuos_indra_qi_generational_governance_core_v0_13.py runtime/kuuos_indra_qi_generational_governance_runtime_v0_13.py scripts/check_qi_generational_governance_v0_13.py
      - name: Run v0.13 checks
        run: python scripts/check_qi_generational_governance_v0_13.py
