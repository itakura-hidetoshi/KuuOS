name: Adaptive Agent Reference Architecture v1.0
on: [push, pull_request, workflow_dispatch]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m compileall -q runtime scripts/check_adaptive_agent_reference_architecture_v1_0.py
      - run: python scripts/check_adaptive_agent_reference_architecture_v1_0.py
