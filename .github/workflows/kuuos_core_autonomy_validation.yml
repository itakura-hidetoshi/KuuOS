name: KuuOS Core Autonomy Validation

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'specs/kuuos_core_autonomy_contract_v0_1.json'
      - 'scripts/run_kuuos_core_autonomy_v0_1.py'
      - 'scripts/validate_kuuos_core_autonomy_contract_v0_1.py'
      - 'scripts/run_pr_entry_check_v0_7.py'
      - 'docs/KUUOS_CORE_AUTONOMY_RUNBOOK_v0_1.md'
      - '.github/workflows/kuuos_core_autonomy_validation.yml'
      - 'Makefile'
      - 'README.md'

permissions:
  contents: read

concurrency:
  group: core-autonomy-v01-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run focused core autonomy validation
        run: python3 scripts/run_pr_entry_check_v0_7.py --check-id core-autonomy-v01 --output-root artifacts/checks
      - name: Upload focused diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-autonomy-v01-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/checks/core-autonomy-v01/
          if-no-files-found: warn
          retention-days: 30
