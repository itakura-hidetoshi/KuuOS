name: Qi-WORLD Indra Transport Receipt Intake v1.7

on:
  push:
    paths:
      - "runtime/kuuos_qi_world_indra_transport_receipt_intake_v1_7.py"
      - "runtime/kuuos_qi_world_indra_transport_receipt_intake_scenarios_v1_7.py"
      - "scripts/check_qi_world_indra_transport_receipt_intake_v1_7.py"
      - "tests/test_qi_world_indra_transport_receipt_intake_v1_7.py"
      - "formal/KUOS/Architecture/QiWorldIndraTransportReceiptIntakeV1_7.lean"
      - "formal/KUOS.lean"
      - "scripts/run_kuuos_runtime_full_check_v0_42.py"
      - ".github/workflows/qi-world-indra-transport-receipt-intake-v1-7-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_qi_world_indra_transport_receipt_intake_v1_7.py"
      - "runtime/kuuos_qi_world_indra_transport_receipt_intake_scenarios_v1_7.py"
      - "scripts/check_qi_world_indra_transport_receipt_intake_v1_7.py"
      - "tests/test_qi_world_indra_transport_receipt_intake_v1_7.py"
      - "formal/KUOS/Architecture/QiWorldIndraTransportReceiptIntakeV1_7.lean"
      - "formal/KUOS.lean"
      - "scripts/run_kuuos_runtime_full_check_v0_42.py"
      - ".github/workflows/qi-world-indra-transport-receipt-intake-v1-7-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python surfaces
        run: >-
          python -m compileall -q
          runtime/kuuos_qi_world_indra_transport_receipt_intake_v1_7.py
          runtime/kuuos_qi_world_indra_transport_receipt_intake_scenarios_v1_7.py
          scripts/check_qi_world_indra_transport_receipt_intake_v1_7.py
          tests/test_qi_world_indra_transport_receipt_intake_v1_7.py
      - name: Validate external analytic receipt intake
        shell: bash
        run: |
          set +e
          python scripts/check_qi_world_indra_transport_receipt_intake_v1_7.py > indra-intake-python.log 2>&1
          status=$?
          cat indra-intake-python.log
          exit $status
      - name: Upload Python diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: indra-intake-python-diagnostics
          path: indra-intake-python.log
      - name: Run receipt intake unit tests
        run: >-
          python -m unittest -v
          tests.test_qi_world_indra_transport_receipt_intake_v1_7
      - name: Run standard runtime full check
        run: python scripts/run_kuuos_runtime_full_check_v0_42.py
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Strictly compile formal root
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true build KuuOSFormal
