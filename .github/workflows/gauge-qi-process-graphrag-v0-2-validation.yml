name: Gauge-Qi Process GraphRAG v0.2 Validation

on:
  push:
    paths:
      - "docs/KUUOS_GAUGE_QI_PROCESS_GRAPHRAG_v0_2.md"
      - "manifests/kuuos_gauge_qi_process_graphrag_v0_2.json"
      - "runtime/kuuos_gauge_qi_process_graphrag_types_v0_2.py"
      - "runtime/kuuos_gauge_qi_process_graphrag_store_v0_2.py"
      - "runtime/kuuos_gauge_qi_process_graphrag_bridge_v0_2.py"
      - "runtime/v02_gauge_qi_process_graphrag.py"
      - "scripts/check_gauge_qi_process_graphrag_v0_2.py"
      - "formal/KUOS/GraphRAG/GaugeQiProcessGraphRAGV0_2.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/gauge-qi-process-graphrag-v0-2-validation.yml"
  pull_request:
    paths:
      - "docs/KUUOS_GAUGE_QI_PROCESS_GRAPHRAG_v0_2.md"
      - "manifests/kuuos_gauge_qi_process_graphrag_v0_2.json"
      - "runtime/kuuos_gauge_qi_process_graphrag_types_v0_2.py"
      - "runtime/kuuos_gauge_qi_process_graphrag_store_v0_2.py"
      - "runtime/kuuos_gauge_qi_process_graphrag_bridge_v0_2.py"
      - "runtime/v02_gauge_qi_process_graphrag.py"
      - "scripts/check_gauge_qi_process_graphrag_v0_2.py"
      - "formal/KUOS/GraphRAG/GaugeQiProcessGraphRAGV0_2.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/gauge-qi-process-graphrag-v0-2-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Gauge-Qi Process GraphRAG v0.2 runtime
        run: >-
          python -m compileall -q runtime
          scripts/check_gauge_qi_process_graphrag_v0_2.py
      - name: Validate v0.2 manifest JSON
        run: >-
          python -m json.tool
          manifests/kuuos_gauge_qi_process_graphrag_v0_2.json
          > /dev/null
      - name: Run persistent GraphRAG v0.2 demo
        run: >-
          python -m runtime.v02_gauge_qi_process_graphrag
          > gauge-qi-graphrag-v02.log 2>&1
      - name: Run persistent GraphRAG v0.2 checks
        run: >-
          python scripts/check_gauge_qi_process_graphrag_v0_2.py
          >> gauge-qi-graphrag-v02.log 2>&1
      - name: Upload Gauge-Qi Process GraphRAG v0.2 log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gauge-qi-graphrag-v02-log
          path: gauge-qi-graphrag-v02.log
