name: WORLD Kū Vacuum OS Hilbert v0.49

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'README.md'
      - 'ROADMAP.md'
      - 'formal/KUOS/WORLD/KuuVacuumOSHilbertCompletionBridgeV0_49.lean'
      - 'formal/KuuOSFormalV0_49.lean'
      - 'formal/KUOS.lean'
      - 'lakefile.toml'
      - 'manifests/world_kuu_vacuum_os_hilbert_completion_v0_49.json'
      - 'scripts/check_world_kuu_vacuum_os_hilbert_completion_v0_49.py'
      - 'docs/KU_WORLD_KUU_VACUUM_OS_HILBERT_COMPLETION_v0_49.md'
      - '.github/workflows/world-kuu-vacuum-os-hilbert-v0-49.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run v0.49 static validation
        run: python3 scripts/check_world_kuu_vacuum_os_hilbert_completion_v0_49.py
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify committed manifest is canonical
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Compile WORLD v0.49 root
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KuuOSFormalV0_49
