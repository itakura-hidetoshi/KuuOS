name: Adaptive Architecture Research Basis v1.0
on: [push, pull_request]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/check_adaptive_agent_reference_architecture_research_v1_0.py
