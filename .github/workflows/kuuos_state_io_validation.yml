name: KuuOS State IO Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'runtime/kuuos_state_io_runner_v0_1.py'
      - 'tests/test_kuuos_state_io_runner_v0_1.py'
      - '.github/workflows/kuuos_state_io_validation.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 -m unittest tests.test_kuuos_state_io_runner_v0_1
