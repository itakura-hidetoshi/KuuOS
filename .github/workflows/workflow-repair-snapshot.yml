name: Workflow Repair Snapshot

on:
  push:
    branches:
      - workflow-repair-audit
    paths:
      - '.github/workflows/workflow-repair-snapshot.yml'
  pull_request:
    paths:
      - '.github/workflows/workflow-repair-snapshot.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Upload repair snapshot
        uses: actions/upload-artifact@v4
        with:
          name: workflow-repair-snapshot-${{ github.run_id }}
          retention-days: 1
          path: |
            .github/**
            chain_indexes/**
            contracts/**
            docs/**
            examples/**
            formal/**
            manifests/**
            packets/**
            runtime/**
            scripts/**
            specs/**
            src/**
            tests/**
            validation_cases/**
            Makefile
            lakefile.toml
            lake-manifest.json
            lean-toolchain
          include-hidden-files: true
          if-no-files-found: error
