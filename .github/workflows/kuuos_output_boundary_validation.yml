name: KuuOS Output Boundary Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'specs/kuuos_candidate_output_boundary_os_bridge_v0_1.json'
      - 'scripts/validate_kuuos_candidate_output_boundary_os_bridge_v0_1_min.py'
      - '.github/workflows/kuuos_output_boundary_validation.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 scripts/validate_kuuos_candidate_output_boundary_os_bridge_v0_1_min.py
