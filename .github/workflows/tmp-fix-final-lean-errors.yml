name: Temporary Final Lean Error Fix

on:
  push:
    branches:
      - fix/vacuum-receipt-chain-final

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/vacuum-receipt-chain-final
      - name: Repair final Lean errors
        shell: python
        run: |
          from pathlib import Path

          yinyang = Path("formal/KUOS/Architecture/QiWorldYinYangProcessBlockerComplementarityV2_3.lean")
          text = yinyang.read_text(encoding="utf-8")
          old = """theorem yin_occupation_idempotent (occupation : YinOccupation) :
    occupation && occupation = occupation := by
  simp"""
          new = """theorem yin_occupation_idempotent (occupation : YinOccupation) :
    (occupation && occupation) = occupation := by
  cases occupation <;> rfl"""
          if new not in text:
              if old not in text:
                  raise SystemExit("YinYang source block not found")
              yinyang.write_text(text.replace(old, new, 1), encoding="utf-8")

          world = Path("formal/KUOS/WORLD/VacuumExpectationHostEffectAtomicCommitIntakeV0_52.lean")
          text = world.read_text(encoding="utf-8")
          old = "Bridge.nonAuthority.commitRecordIsTruth = false"
          new = "Bridge.nonAuthority.truthAuthority = false"
          if new not in text:
              if old not in text:
                  raise SystemExit("WORLD v0.52 field reference not found")
              world.write_text(text.replace(old, new, 1), encoding="utf-8")
      - name: Commit fixes
        run: |
          git config user.name "itakura-hidetoshi"
          git config user.email "itakurahidetoshi@mac.com"
          git add formal/KUOS/Architecture/QiWorldYinYangProcessBlockerComplementarityV2_3.lean
          git add formal/KUOS/WORLD/VacuumExpectationHostEffectAtomicCommitIntakeV0_52.lean
          git diff --cached --quiet && exit 0
          git commit -m "Fix final strict Lean errors"
          git push origin HEAD:fix/vacuum-receipt-chain-final
