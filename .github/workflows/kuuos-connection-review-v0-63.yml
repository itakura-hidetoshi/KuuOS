name: KuuOS Connection Review v0.63

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

env:
  MATHLIB_NO_CACHE_ON_UPDATE: '1'

jobs:
  validate:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile runtime
        run: >-
          python3 -m compileall -q
          runtime/kuuos_connection_admission_types_v0_63.py
          runtime/kuuos_connection_admission_v0_63.py
          tests/kuuos_connection_review_fixture_v0_63.py
          scripts/check_kuuos_v063.py
      - name: Validate review decisions
        run: PYTHONPATH=. python3 scripts/check_kuuos_v063.py
      - name: Set up Lean
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve dependencies
        run: lake update
      - name: Verify manifest stability
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib cache
        run: lake exe cache get
      - name: Build aggregate formal root
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KuuOSFormal
