name: GPT GitHub Integration Validation

on:
  push:
    paths:
      - 'docs/GPT_GITHUB_KUOS_INTEGRATION_v0_1.md'
      - 'docs/KUOS_GITHUB_FORMAL_VERIFICATION_BRIDGE_v0_1.md'
      - 'specs/gpt_github_integration_manifest_v0_1.yaml'
      - 'scripts/validate_gpt_github_integration_v0_1.py'
      - '.github/ISSUE_TEMPLATE/kuos_gpt_github_integration_check.md'
      - '.github/pull_request_template.md'
      - '.github/workflows/gpt_github_integration_validation.yml'
      - 'Makefile'
  pull_request:
    paths:
      - 'docs/GPT_GITHUB_KUOS_INTEGRATION_v0_1.md'
      - 'docs/KUOS_GITHUB_FORMAL_VERIFICATION_BRIDGE_v0_1.md'
      - 'specs/gpt_github_integration_manifest_v0_1.yaml'
      - 'scripts/validate_gpt_github_integration_v0_1.py'
      - '.github/ISSUE_TEMPLATE/kuos_gpt_github_integration_check.md'
      - '.github/pull_request_template.md'
      - '.github/workflows/gpt_github_integration_validation.yml'
      - 'Makefile'

jobs:
  validate-gpt-github-integration:
    name: Validate GPT GitHub integration surface
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run GPT GitHub integration checks
        run: make gpt-github-integration-checks
