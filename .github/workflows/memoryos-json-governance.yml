name: MemoryOS JSON Governance

on:
  push:
    branches: [main]
    paths:
      - "memoryos/**/*.json"
      - "memoryos/**/*.md"
      - "tools/memoryos/**/*.py"
      - ".github/workflows/memoryos-json-governance.yml"
  schedule:
    - cron: "17 0 * * 0"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: memoryos-json-governance-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-json:
    name: Validate MemoryOS JSON surfaces
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate current JSON governance state
        run: |
          python3 tools/memoryos/json_governance_guard.py \
            --repo-root . \
            --current memoryos/ops/current \
            --prev memoryos/ops/prev \
            --out-dir _memoryos_json_governance
      - name: Upload JSON governance receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: memoryos-json-governance-${{ github.run_id }}
          path: _memoryos_json_governance
          if-no-files-found: warn
          retention-days: 30
