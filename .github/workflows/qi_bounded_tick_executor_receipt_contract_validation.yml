name: KuuOS Qi Bounded Tick Executor Receipt Contract Validation

on:
  push:
    paths:
      - 'scripts/validate_qi_bounded_tick_executor_receipt_v0_1.py'
      - 'tests/test_qi_bounded_tick_executor_receipt_validator_v0_1.py'
      - 'manifests/kuuos_qi_bounded_tick_manual_runner_manifest_addendum_v0_1.json'
      - '.github/workflows/qi_bounded_tick_executor_receipt_contract_validation.yml'
  pull_request:
    paths:
      - 'scripts/validate_qi_bounded_tick_executor_receipt_v0_1.py'
      - 'tests/test_qi_bounded_tick_executor_receipt_validator_v0_1.py'
      - 'manifests/kuuos_qi_bounded_tick_manual_runner_manifest_addendum_v0_1.json'
      - '.github/workflows/qi_bounded_tick_executor_receipt_contract_validation.yml'

jobs:
  validate-qi-bounded-tick-executor-receipt-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run receipt validator unit tests
        run: python3 -m unittest tests.test_qi_bounded_tick_executor_receipt_validator_v0_1
      - name: Validate manual runner addendum registration
        run: python3 scripts/validate_qi_bounded_tick_manual_runner_manifest_addendum_v0_1.py
