name: LearnOS v0.2 Validation

on:
  push:
    paths:
      - "runtime/kuuos_learn_os_lineage_types_v0_2.py"
      - "runtime/kuuos_learn_os_lineage_kernel_v0_2.py"
      - "runtime/kuuos_learn_os_lineage_store_v0_2.py"
      - "runtime/v02_learn_os_replan_lineage_future_only_learning_envelope.py"
      - "scripts/check_learn_os_replan_lineage_future_only_learning_envelope_v0_2.py"
      - "formal/KUOS/LearnOS/ReplanLineageFutureOnlyLearningEnvelopeV0_2.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/learn-os-v0-2-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_learn_os_lineage_types_v0_2.py"
      - "runtime/kuuos_learn_os_lineage_kernel_v0_2.py"
      - "runtime/kuuos_learn_os_lineage_store_v0_2.py"
      - "runtime/v02_learn_os_replan_lineage_future_only_learning_envelope.py"
      - "scripts/check_learn_os_replan_lineage_future_only_learning_envelope_v0_2.py"
      - "formal/KUOS/LearnOS/ReplanLineageFutureOnlyLearningEnvelopeV0_2.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/learn-os-v0-2-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile LearnOS v0.2 runtime
        run: python -m compileall -q runtime scripts/check_learn_os_replan_lineage_future_only_learning_envelope_v0_2.py
      - name: Validate LearnOS v0.2 lineage envelope
        run: python -m runtime.v02_learn_os_replan_lineage_future_only_learning_envelope
      - name: Validate LearnOS v0.2 check entry point
        run: python scripts/check_learn_os_replan_lineage_future_only_learning_envelope_v0_2.py
