name: WORLD Noncommutative Operator Algebra Module v0.29 Validation

on:
  push:
    paths:
      - "formal/KUOS/WORLD/NoncommutativeOperatorAlgebraModuleV0_29.lean"
      - "formal/KUOS.lean"
      - "runtime/kuuos_world_noncommutative_operator_algebra_module_*_v0_29.py"
      - "scripts/check_world_noncommutative_operator_algebra_module_v0_29.py"
      - "manifests/world_noncommutative_operator_algebra_module_v0_29.json"
      - "docs/KU_WORLD_NONCOMMUTATIVE_OPERATOR_ALGEBRA_MODULE_v0_29.md"
      - "scripts/run_kuuos_runtime_full_check_v0_1.py"
      - ".github/workflows/world-noncommutative-operator-algebra-module-v0-29-validation.yml"
  pull_request:
    paths:
      - "formal/KUOS/WORLD/NoncommutativeOperatorAlgebraModuleV0_29.lean"
      - "formal/KUOS.lean"
      - "runtime/kuuos_world_noncommutative_operator_algebra_module_*_v0_29.py"
      - "scripts/check_world_noncommutative_operator_algebra_module_v0_29.py"
      - "manifests/world_noncommutative_operator_algebra_module_v0_29.json"
      - "docs/KU_WORLD_NONCOMMUTATIVE_OPERATOR_ALGEBRA_MODULE_v0_29.md"
      - "scripts/run_kuuos_runtime_full_check_v0_1.py"
      - ".github/workflows/world-noncommutative-operator-algebra-module-v0-29-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile v0.29 runtime
        run: python -m py_compile runtime/kuuos_world_noncommutative_operator_algebra_module_core_v0_29.py runtime/kuuos_world_noncommutative_operator_algebra_module_runtime_v0_29.py scripts/check_world_noncommutative_operator_algebra_module_v0_29.py
      - name: Run v0.29 checks
        run: python scripts/check_world_noncommutative_operator_algebra_module_v0_29.py
