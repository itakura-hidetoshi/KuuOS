name: Qi-WORLD Licensed Blocker Discharge v1.7

on:
  push:
    paths:
      - "runtime/kuuos_qi_world_licensed_blocker_discharge_core_v1_7.py"
      - "runtime/kuuos_qi_world_licensed_blocker_discharge_v1_7.py"
      - "runtime/kuuos_qi_world_licensed_blocker_discharge_scenarios_v1_7.py"
      - "scripts/check_qi_world_licensed_blocker_discharge_v1_7.py"
      - "tests/test_qi_world_licensed_blocker_discharge_v1_7.py"
      - "formal/KUOS/Architecture/QiWorldLicensedBlockerDischargeV1_7.lean"
      - "formal/KUOS.lean"
      - "scripts/check_qi_world_indra_transport_request_v1_6.py"
      - "scripts/run_kuuos_runtime_full_check_v0_42.py"
      - ".github/workflows/qi-world-licensed-blocker-discharge-v1-7-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_qi_world_licensed_blocker_discharge_core_v1_7.py"
      - "runtime/kuuos_qi_world_licensed_blocker_discharge_v1_7.py"
      - "runtime/kuuos_qi_world_licensed_blocker_discharge_scenarios_v1_7.py"
      - "scripts/check_qi_world_licensed_blocker_discharge_v1_7.py"
      - "tests/test_qi_world_licensed_blocker_discharge_v1_7.py"
      - "formal/KUOS/Architecture/QiWorldLicensedBlockerDischargeV1_7.lean"
      - "formal/KUOS.lean"
      - "scripts/check_qi_world_indra_transport_request_v1_6.py"
      - "scripts/run_kuuos_runtime_full_check_v0_42.py"
      - ".github/workflows/qi-world-licensed-blocker-discharge-v1-7-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python surfaces
        run: >-
          python -m compileall -q
          runtime/kuuos_qi_world_licensed_blocker_discharge_core_v1_7.py
          runtime/kuuos_qi_world_licensed_blocker_discharge_v1_7.py
          runtime/kuuos_qi_world_licensed_blocker_discharge_scenarios_v1_7.py
          scripts/check_qi_world_licensed_blocker_discharge_v1_7.py
          tests/test_qi_world_licensed_blocker_discharge_v1_7.py
      - name: Validate licensed blocker discharge
        run: >-
          python scripts/check_qi_world_licensed_blocker_discharge_v1_7.py
          > licensed-discharge-v1-7.log 2>&1
      - name: Upload licensed discharge diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qi-world-licensed-blocker-discharge-v1-7-diagnostics
          path: licensed-discharge-v1-7.log
          if-no-files-found: error
      - name: Run licensed discharge tests
        run: >-
          python -m unittest -v
          tests.test_qi_world_licensed_blocker_discharge_v1_7
      - name: Run Indra-to-discharge chain regression
        run: python scripts/check_qi_world_indra_transport_request_v1_6.py
      - name: Run central runtime regression
        run: python scripts/run_kuuos_runtime_full_check_v0_42.py
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Strictly compile formal root
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true build KuuOSFormal
          > lean-v1-7.log 2>&1
      - name: Upload strict Lean diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qi-world-licensed-blocker-discharge-v1-7-lean-diagnostics
          path: lean-v1-7.log
          if-no-files-found: error
