name: CodeAI External Corpus Acquisition and Freeze Receipt v0.1

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "runtime/kuuos_codeai_external_corpus_acquisition_freeze_receipt_schema_v0_1.py"
      - "runtime/kuuos_codeai_external_corpus_acquisition_freeze_receipt_checks_v0_1.py"
      - "runtime/kuuos_codeai_external_corpus_acquisition_freeze_receipt_v0_1.py"
      - "scripts/build_codeai_external_corpus_acquisition_freeze_receipt_fixture_v0_1.py"
      - "scripts/project_codeai_external_corpus_acquisition_freeze_receipt_fixture_v0_1.py"
      - "scripts/check_codeai_external_corpus_acquisition_freeze_receipt_v0_1.py"
      - "tests/test_kuuos_codeai_external_corpus_acquisition_freeze_receipt_v0_1.py"
      - "examples/codeai_external_corpus_acquisition_freeze_receipt_v0_1.json"
      - "manifests/kuuos_codeai_external_corpus_acquisition_freeze_receipt_v0_1.json"
      - "docs/KUUOS_CODEAI_EXTERNAL_CORPUS_ACQUISITION_FREEZE_RECEIPT_v0_1.md"
      - "formal/KUOS/CodeAI/ExternalCorpusAcquisitionFreezeReceiptV0_1.lean"
      - "formal/KuuOSCodeAIExternalCorpusAcquisitionFreezeReceiptV0_1.lean"
      - "lakefile.toml"
      - "lake-manifest.json"
      - "lean-toolchain"
      - ".github/workflows/codeai-external-corpus-acquisition-freeze-receipt-v0-1.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  MATHLIB_NO_CACHE_ON_UPDATE: '1'
  DATASET_URL: https://huggingface.co/datasets/princeton-nlp/SWE-bench_Verified/resolve/c104f840cc67f8b6eec6f759ebc8b2693d585d4a/data/test-00000-of-00001.parquet
  DATASET_PATH: /tmp/swe-bench-verified-c104f840.parquet

jobs:
  validate:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python surfaces
        run: >-
          python3 -m compileall -q
          runtime/kuuos_codeai_external_corpus_acquisition_freeze_receipt_schema_v0_1.py
          runtime/kuuos_codeai_external_corpus_acquisition_freeze_receipt_checks_v0_1.py
          runtime/kuuos_codeai_external_corpus_acquisition_freeze_receipt_v0_1.py
          scripts/build_codeai_external_corpus_acquisition_freeze_receipt_fixture_v0_1.py
          scripts/project_codeai_external_corpus_acquisition_freeze_receipt_fixture_v0_1.py
          scripts/check_codeai_external_corpus_acquisition_freeze_receipt_v0_1.py
          tests/test_kuuos_codeai_external_corpus_acquisition_freeze_receipt_v0_1.py
      - name: Validate machine-readable artifacts
        shell: bash
        run: |
          set -euo pipefail
          python3 -m json.tool examples/codeai_external_corpus_acquisition_freeze_receipt_v0_1.json > /dev/null
          python3 -m json.tool manifests/kuuos_codeai_external_corpus_acquisition_freeze_receipt_v0_1.json > /dev/null
      - name: Check deterministic freeze projection
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=. python3 scripts/check_codeai_external_corpus_acquisition_freeze_receipt_v0_1.py \
            2>&1 | tee codeai-external-corpus-freeze-v0-1.log
      - name: Run freeze and predecessor regression tests
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=. python3 -m unittest \
            tests.test_kuuos_codeai_external_corpus_acquisition_freeze_receipt_v0_1 \
            tests.test_kuuos_codeai_external_general_benchmark_swebench_verified_adapter_v0_1 \
            tests.test_kuuos_codeai_reobservation_bounded_continuation_proposal_gate_v0_1 \
            2>&1 | tee codeai-external-corpus-freeze-v0-1-tests.log
      - name: Acquire pinned external corpus artifact
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 5 --retry-all-errors \
            --output "$DATASET_PATH" "$DATASET_URL"
      - name: Install pinned Parquet inspector
        run: python3 -m pip install --disable-pip-version-check --no-input pyarrow==19.0.1
      - name: Verify external artifact hash size rows and schema
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=. python3 scripts/check_codeai_external_corpus_acquisition_freeze_receipt_v0_1.py \
            --artifact "$DATASET_PATH" \
            2>&1 | tee codeai-external-corpus-artifact-v0-1.log
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify committed dependency manifest is canonical
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Strictly compile external corpus freeze formal root
        shell: bash
        run: |
          set -euo pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true \
            build KuuOSCodeAIExternalCorpusAcquisitionFreezeReceiptV0_1 \
            2>&1 | tee codeai-external-corpus-freeze-v0-1-lean.log
      - name: Strictly compile repository formal baseline
        shell: bash
        run: |
          set -euo pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true \
            build KuuOSFormal \
            2>&1 | tee codeai-external-corpus-freeze-v0-1-lean-root.log
      - name: Upload diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: codeai-external-corpus-freeze-v0-1-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            codeai-external-corpus-freeze-v0-1.log
            codeai-external-corpus-freeze-v0-1-tests.log
            codeai-external-corpus-artifact-v0-1.log
            codeai-external-corpus-freeze-v0-1-lean.log
            codeai-external-corpus-freeze-v0-1-lean-root.log
          if-no-files-found: warn
          retention-days: 14
