name: Qi Licensed Mirror Observation Admission v0.22 Validation

on:
  push:
    paths:
      - "runtime/kuuos_indra_qi_licensed_mirror_observation_admission_*_v0_22.py"
      - "scripts/check_qi_licensed_mirror_observation_admission_v0_22.py"
      - "manifests/qi_licensed_mirror_observation_admission_v0_22.json"
      - "examples/indra_qi_licensed_mirror_observation_admission_plan_v0_22.json"
      - "docs/KU_INDRA_QI_LICENSED_MIRROR_OBSERVATION_ADMISSION_v0_22.md"
      - ".github/workflows/qi-licensed-mirror-observation-admission-v0-22-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_indra_qi_licensed_mirror_observation_admission_*_v0_22.py"
      - "scripts/check_qi_licensed_mirror_observation_admission_v0_22.py"
      - "manifests/qi_licensed_mirror_observation_admission_v0_22.json"
      - "examples/indra_qi_licensed_mirror_observation_admission_plan_v0_22.json"
      - "docs/KU_INDRA_QI_LICENSED_MIRROR_OBSERVATION_ADMISSION_v0_22.md"
      - ".github/workflows/qi-licensed-mirror-observation-admission-v0-22-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile v0.22 runtime
        run: python -m py_compile runtime/kuuos_indra_qi_licensed_mirror_observation_admission_core_v0_22.py runtime/kuuos_indra_qi_licensed_mirror_observation_admission_runtime_v0_22.py scripts/check_qi_licensed_mirror_observation_admission_v0_22.py
      - name: Run v0.22 checks
        run: python scripts/check_qi_licensed_mirror_observation_admission_v0_22.py
