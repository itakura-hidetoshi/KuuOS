name: Cooperative Execution Supervisor v0.16 Validation

on:
  push:
    paths:
      - "runtime/kuuos_cooperative_execution_supervisor*_v0_16.py"
      - "runtime/kuuos_cooperative_execution_command_apply_v016.py"
      - "runtime/kuuos_supervisor_v016.py"
      - "runtime/v016_*.py"
      - "formal/KUOS/OpenHorizon/CooperativeExecutionSupervisorV0_16.lean"
      - "docs/KUUOS_COOPERATIVE_EXECUTION_SUPERVISOR_v0_16.md"
      - ".github/workflows/cooperative-execution-supervisor-v0-16-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_cooperative_execution_supervisor*_v0_16.py"
      - "runtime/kuuos_cooperative_execution_command_apply_v016.py"
      - "runtime/kuuos_supervisor_v016.py"
      - "runtime/v016_*.py"
      - "formal/KUOS/OpenHorizon/CooperativeExecutionSupervisorV0_16.lean"
      - "docs/KUUOS_COOPERATIVE_EXECUTION_SUPERVISOR_v0_16.md"
      - ".github/workflows/cooperative-execution-supervisor-v0-16-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile v0.16
        run: python -m compileall -q runtime
      - name: Run cooperative supervisor kernel checks
        id: checks
        continue-on-error: true
        run: python -m runtime.v016_kernel_all > cooperative-execution-supervisor-v016.log 2>&1
      - name: Upload v0.16 kernel log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cooperative-execution-supervisor-v016-log
          path: cooperative-execution-supervisor-v016.log
      - name: Report v0.16 failure
        if: steps.checks.outcome == 'failure'
        run: |
          cat cooperative-execution-supervisor-v016.log
          exit 1
