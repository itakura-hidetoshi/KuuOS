name: Qi Reversible Shadow Admission v0.17 Validation

on:
  push:
    paths:
      - "runtime/kuuos_indra_qi_reversible_shadow_admission_*_v0_17.py"
      - "scripts/check_qi_reversible_shadow_admission_v0_17.py"
      - "manifests/qi_reversible_shadow_admission_v0_17.json"
      - "examples/indra_qi_reversible_shadow_admission_plan_v0_17.json"
      - "docs/KU_INDRA_QI_REVERSIBLE_SHADOW_ADMISSION_v0_17.md"
      - ".github/workflows/qi-reversible-shadow-admission-v0-17-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_indra_qi_reversible_shadow_admission_*_v0_17.py"
      - "scripts/check_qi_reversible_shadow_admission_v0_17.py"
      - "manifests/qi_reversible_shadow_admission_v0_17.json"
      - "examples/indra_qi_reversible_shadow_admission_plan_v0_17.json"
      - "docs/KU_INDRA_QI_REVERSIBLE_SHADOW_ADMISSION_v0_17.md"
      - ".github/workflows/qi-reversible-shadow-admission-v0-17-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile v0.17 runtime
        run: python -m py_compile runtime/kuuos_indra_qi_reversible_shadow_admission_core_v0_17.py runtime/kuuos_indra_qi_reversible_shadow_admission_runtime_v0_17.py scripts/check_qi_reversible_shadow_admission_v0_17.py
      - name: Run v0.17 checks
        run: python scripts/check_qi_reversible_shadow_admission_v0_17.py
