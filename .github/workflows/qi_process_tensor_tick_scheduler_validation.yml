name: Qi Process Tensor Tick Scheduler Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'runtime/kuuos_runtime_daemon_qi_process_tensor_tick_scheduler_v0_1.py'
      - 'tests/test_qi_process_tensor_tick_scheduler_v0_1.py'
      - '.github/workflows/qi_process_tensor_tick_scheduler_validation.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 -m unittest tests.test_qi_process_tensor_tick_scheduler_v0_1
