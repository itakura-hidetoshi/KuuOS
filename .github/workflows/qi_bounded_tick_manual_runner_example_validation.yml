name: KuuOS Qi Bounded Tick Manual Runner Example Validation

on:
  push:
    paths:
      - 'examples/qi_bounded_tick_manual_runner_v0_1/**'
      - 'scripts/run_qi_process_tensor_bounded_tick_from_daemon_v0_1.py'
      - 'scripts/check_qi_bounded_tick_manual_runner_example_v0_1.py'
      - 'scripts/validate_qi_bounded_tick_executor_receipt_v0_1.py'
      - 'scripts/validate_qi_bounded_tick_manual_runner_manifest_addendum_v0_1.py'
      - 'manifests/kuuos_qi_bounded_tick_manual_runner_manifest_addendum_v0_1.json'
      - '.github/workflows/qi_bounded_tick_manual_runner_example_validation.yml'
  pull_request:
    paths:
      - 'examples/qi_bounded_tick_manual_runner_v0_1/**'
      - 'scripts/run_qi_process_tensor_bounded_tick_from_daemon_v0_1.py'
      - 'scripts/check_qi_bounded_tick_manual_runner_example_v0_1.py'
      - 'scripts/validate_qi_bounded_tick_executor_receipt_v0_1.py'
      - 'scripts/validate_qi_bounded_tick_manual_runner_manifest_addendum_v0_1.py'
      - 'manifests/kuuos_qi_bounded_tick_manual_runner_manifest_addendum_v0_1.json'
      - '.github/workflows/qi_bounded_tick_manual_runner_example_validation.yml'

jobs:
  validate-qi-bounded-tick-manual-runner-example:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate manual runner manifest addendum
        run: python3 scripts/validate_qi_bounded_tick_manual_runner_manifest_addendum_v0_1.py
      - name: Check manual runner example and executor receipt contract
        run: python3 scripts/check_qi_bounded_tick_manual_runner_example_v0_1.py
