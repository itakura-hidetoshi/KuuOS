name: VerifyOS Independent Evidence Verification v0.1

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "runtime/kuuos_verifyos_independent_evidence_verification_v0_1.py"
      - "scripts/check_verifyos_independent_evidence_verification_v0_1.py"
      - "manifests/kuuos_verifyos_independent_evidence_verification_v0_1.json"
      - "docs/KUUOS_VERIFYOS_INDEPENDENT_EVIDENCE_VERIFICATION_v0_1.md"
      - "docs/VerifyOS/README.md"
      - "formal/KUOS/VerifyOS/IndependentEvidenceVerificationV0_14.lean"
      - "formal/KuuOSVerifyOSV0_14.lean"
      - "formal/KUOS.lean"
      - "lakefile.toml"
      - "lake-manifest.json"
      - "lean-toolchain"
      - "scripts/run_evidence_cycle_os_full_checks.py"
      - ".github/workflows/verifyos-independent-evidence-verification-v0-1.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  MATHLIB_NO_CACHE_ON_UPDATE: '1'

jobs:
  validate:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python surfaces
        run: >-
          python3 -m compileall -q
          runtime/kuuos_verifyos_independent_evidence_verification_v0_1.py
          scripts/check_verifyos_independent_evidence_verification_v0_1.py
      - name: Validate manifest
        run: >-
          python3 -m json.tool
          manifests/kuuos_verifyos_independent_evidence_verification_v0_1.json
          > /dev/null
      - name: Check outcomes, repairs, and rejections
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=. python3 \
            scripts/check_verifyos_independent_evidence_verification_v0_1.py \
            2>&1 | tee verifyos-independent-evidence-verification-v0-1.log
      - name: Run cumulative Evidence Cycle OS regression
        run: PYTHONPATH=. python3 scripts/run_evidence_cycle_os_full_checks.py
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify committed manifest is canonical
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Strictly compile VerifyOS v0.14 formal root
        shell: bash
        run: |
          set -euo pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true \
            build KuuOSVerifyOSV0_14 \
            2>&1 | tee verifyos-independent-evidence-verification-v0-1-lean.log
      - name: Strictly compile aggregate formal root
        shell: bash
        run: |
          set -euo pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true \
            build KuuOSFormal \
            2>&1 | tee verifyos-independent-evidence-verification-v0-1-lean-root.log
      - name: Upload diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: verifyos-independent-evidence-verification-v0-1-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            verifyos-independent-evidence-verification-v0-1.log
            verifyos-independent-evidence-verification-v0-1-lean.log
            verifyos-independent-evidence-verification-v0-1-lean-root.log
          if-no-files-found: warn
          retention-days: 14
