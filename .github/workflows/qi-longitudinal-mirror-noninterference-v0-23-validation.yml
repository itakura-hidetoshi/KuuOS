name: Qi Longitudinal Mirror Non-Interference v0.23 Validation

on:
  push:
    paths:
      - "runtime/kuuos_indra_qi_longitudinal_mirror_noninterference_*_v0_23.py"
      - "scripts/check_qi_longitudinal_mirror_noninterference_v0_23.py"
      - "manifests/qi_longitudinal_mirror_noninterference_v0_23.json"
      - "examples/indra_qi_longitudinal_mirror_noninterference_plan_v0_23.json"
      - "docs/KU_INDRA_QI_LONGITUDINAL_MIRROR_NONINTERFERENCE_v0_23.md"
      - ".github/workflows/qi-longitudinal-mirror-noninterference-v0-23-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_indra_qi_longitudinal_mirror_noninterference_*_v0_23.py"
      - "scripts/check_qi_longitudinal_mirror_noninterference_v0_23.py"
      - "manifests/qi_longitudinal_mirror_noninterference_v0_23.json"
      - "examples/indra_qi_longitudinal_mirror_noninterference_plan_v0_23.json"
      - "docs/KU_INDRA_QI_LONGITUDINAL_MIRROR_NONINTERFERENCE_v0_23.md"
      - ".github/workflows/qi-longitudinal-mirror-noninterference-v0-23-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile v0.23 runtime
        run: python -m py_compile runtime/kuuos_indra_qi_longitudinal_mirror_noninterference_core_v0_23.py runtime/kuuos_indra_qi_longitudinal_mirror_noninterference_runtime_v0_23.py scripts/check_qi_longitudinal_mirror_noninterference_v0_23.py
      - name: Run v0.23 checks
        run: python scripts/check_qi_longitudinal_mirror_noninterference_v0_23.py
