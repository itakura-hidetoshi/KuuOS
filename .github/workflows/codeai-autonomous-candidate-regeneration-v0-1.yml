name: CodeAI Autonomous Candidate Regeneration v0.1

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "runtime/kuuos_codeai_autonomous_candidate_regeneration_common_v0_1.py"
      - "runtime/kuuos_codeai_autonomous_candidate_regeneration_portfolio_v0_1.py"
      - "runtime/kuuos_codeai_autonomous_candidate_regeneration_preflight_v0_1.py"
      - "runtime/kuuos_codeai_autonomous_candidate_regeneration_receipt_v0_1.py"
      - "runtime/kuuos_codeai_autonomous_candidate_regeneration_loop_v0_1.py"
      - "runtime/kuuos_codeai_autonomous_candidate_regeneration_v0_1.py"
      - "runtime/kuuos_codeai_autonomous_structured_edit_synthesis_v0_1.py"
      - "runtime/kuuos_codeai_autonomous_structured_edit_types_v0_1.py"
      - "runtime/kuuos_codeai_autonomous_structured_edit_provider_v0_1.py"
      - "runtime/kuuos_codeai_autonomous_unified_diff_candidates_v0_1.py"
      - "runtime/kuuos_codeai_candidate_patch_envelope_v0_1.py"
      - "scripts/check_codeai_autonomous_candidate_regeneration_v0_1.py"
      - "tests/codeai_candidate_regeneration_test_support_v0_1.py"
      - "tests/codeai_candidate_regeneration_tests_part1_v0_1.py"
      - "tests/codeai_candidate_regeneration_tests_part2_v0_1.py"
      - "tests/test_kuuos_codeai_autonomous_candidate_regeneration_v0_1.py"
      - "examples/codeai_autonomous_candidate_regeneration_v0_1.json"
      - "examples/codeai_autonomous_structured_edit_synthesis_v0_1.json"
      - "examples/codeai_candidate_patch_envelope_v0_1.json"
      - "manifests/kuuos_codeai_autonomous_candidate_regeneration_v0_1.json"
      - "docs/KUUOS_CODEAI_AUTONOMOUS_CANDIDATE_REGENERATION_v0_1.md"
      - "docs/CodeAI/README.md"
      - "formal/KUOS/CodeAI/AutonomousCandidateRegenerationV0_1.lean"
      - "formal/KuuOSCodeAIAutonomousCandidateRegenerationV0_1.lean"
      - "lakefile.toml"
      - "lake-manifest.json"
      - "lean-toolchain"
      - ".github/workflows/codeai-autonomous-candidate-regeneration-v0-1.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  MATHLIB_NO_CACHE_ON_UPDATE: '1'

jobs:
  validate:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python surfaces
        run: >-
          python3 -m compileall -q
          runtime/kuuos_codeai_autonomous_candidate_regeneration_common_v0_1.py
          runtime/kuuos_codeai_autonomous_candidate_regeneration_portfolio_v0_1.py
          runtime/kuuos_codeai_autonomous_candidate_regeneration_preflight_v0_1.py
          runtime/kuuos_codeai_autonomous_candidate_regeneration_receipt_v0_1.py
          runtime/kuuos_codeai_autonomous_candidate_regeneration_loop_v0_1.py
          runtime/kuuos_codeai_autonomous_candidate_regeneration_v0_1.py
          scripts/check_codeai_autonomous_candidate_regeneration_v0_1.py
          tests/codeai_candidate_regeneration_test_support_v0_1.py
          tests/codeai_candidate_regeneration_tests_part1_v0_1.py
          tests/codeai_candidate_regeneration_tests_part2_v0_1.py
          tests/test_kuuos_codeai_autonomous_candidate_regeneration_v0_1.py
      - name: Validate machine-readable artifacts
        shell: bash
        run: |
          set -euo pipefail
          python3 -m json.tool \
            examples/codeai_autonomous_candidate_regeneration_v0_1.json \
            > /dev/null
          python3 -m json.tool \
            manifests/kuuos_codeai_autonomous_candidate_regeneration_v0_1.json \
            > /dev/null
      - name: Check autonomous candidate regeneration
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=. python3 \
            scripts/check_codeai_autonomous_candidate_regeneration_v0_1.py \
            2>&1 | tee codeai-autonomous-candidate-regeneration-v0-1.log
      - name: Run autonomous candidate regeneration unit tests
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=. python3 -m unittest \
            tests.test_kuuos_codeai_autonomous_candidate_regeneration_v0_1 \
            2>&1 | tee codeai-autonomous-candidate-regeneration-v0-1-tests.log
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify committed dependency manifest is canonical
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Strictly compile autonomous candidate regeneration formal root
        shell: bash
        run: |
          set -euo pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true \
            build KuuOSCodeAIAutonomousCandidateRegenerationV0_1 \
            2>&1 | tee codeai-autonomous-candidate-regeneration-v0-1-lean.log
      - name: Strictly compile repository formal baseline
        shell: bash
        run: |
          set -euo pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true \
            build KuuOSFormal \
            2>&1 | tee codeai-autonomous-candidate-regeneration-v0-1-lean-root.log
      - name: Upload diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: codeai-autonomous-candidate-regeneration-v0-1-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            codeai-autonomous-candidate-regeneration-v0-1.log
            codeai-autonomous-candidate-regeneration-v0-1-tests.log
            codeai-autonomous-candidate-regeneration-v0-1-lean.log
            codeai-autonomous-candidate-regeneration-v0-1-lean-root.log
          if-no-files-found: warn
          retention-days: 14
