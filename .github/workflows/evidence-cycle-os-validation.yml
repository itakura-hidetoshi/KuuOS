name: Evidence Cycle OS Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'docs/KUUOS_ACT_OS_*.md'
      - 'docs/KUUOS_ACTOS_*.md'
      - 'docs/KUUOS_OBSERVE_OS_*.md'
      - 'docs/KUUOS_OBSERVEOS_*.md'
      - 'docs/KUUOS_VERIFY_OS_*.md'
      - 'docs/KUUOS_VERIFYOS_*.md'
      - 'docs/KUUOS_LEARN_OS_*.md'
      - 'docs/KUUOS_LEARNOS_*.md'
      - 'manifests/kuuos_act_os_*.json'
      - 'manifests/kuuos_actos_*.json'
      - 'manifests/kuuos_observe_os_*.json'
      - 'manifests/kuuos_observeos_*.json'
      - 'manifests/kuuos_verify_os_*.json'
      - 'manifests/kuuos_verifyos_*.json'
      - 'manifests/kuuos_learn_os_*.json'
      - 'manifests/kuuos_learnos_*.json'
      - 'runtime/*act_os*.py'
      - 'runtime/*actos*.py'
      - 'runtime/*observe_os*.py'
      - 'runtime/*observeos*.py'
      - 'runtime/*verify_os*.py'
      - 'runtime/*verifyos*.py'
      - 'runtime/*learn_os*.py'
      - 'runtime/*learnos*.py'
      - 'scripts/check_act_os_*.py'
      - 'scripts/check_actos_*.py'
      - 'scripts/check_observe_os_*.py'
      - 'scripts/check_observeos_*.py'
      - 'scripts/check_verify_os_*.py'
      - 'scripts/check_verifyos_*.py'
      - 'scripts/check_learn_os_*.py'
      - 'scripts/check_learnos_*.py'
      - 'scripts/run_evidence_cycle_os_full_checks.py'
      - 'formal/KUOS/ActOS/**'
      - 'formal/KUOS/ObserveOS/**'
      - 'formal/KUOS/VerifyOS/**'
      - 'formal/KUOS/LearnOS/**'
      - 'formal/KUOS.lean'
      - '.github/workflows/evidence-cycle-os-validation.yml'

permissions:
  contents: read

concurrency:
  group: evidence-cycle-os-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Evidence Cycle OS cumulative validation
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile validation surfaces
        run: python3 -m compileall -q runtime scripts/run_evidence_cycle_os_full_checks.py
      - name: Run cumulative checks
        env:
          PYTHONPATH: .
          PYTHONUNBUFFERED: '1'
        run: python3 scripts/run_evidence_cycle_os_full_checks.py 2>&1 | tee evidence-cycle-os-validation.log
      - name: Upload validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-cycle-os-validation-log-${{ github.run_id }}-${{ github.run_attempt }}
          path: evidence-cycle-os-validation.log
          if-no-files-found: warn
          retention-days: 14
