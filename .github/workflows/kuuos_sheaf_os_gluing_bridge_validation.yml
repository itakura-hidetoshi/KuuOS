name: KuuOS Sheaf OS Gluing Bridge Validation

on:
  workflow_dispatch:
  push:
    paths:
      - 'specs/kuuos_sheaf_os_gluing_bridge_v0_1.json'
      - 'specs/kuuos_gauge_os_transport_bridge_v0_1.json'
      - 'specs/kuuos_indranet_os_dependency_bridge_v0_1.json'
      - 'specs/kuuos_dependent_origination_os_bridge_v0_1.json'
      - 'specs/kuuos_two_truths_os_bridge_v0_1.json'
      - 'specs/kuuos_os_autonomy_kernel_v0_1.json'
      - 'scripts/validate_kuuos_sheaf_os_gluing_bridge_v0_1.py'
      - '.github/workflows/kuuos_sheaf_os_gluing_bridge_validation.yml'
  pull_request:
    paths:
      - 'specs/kuuos_sheaf_os_gluing_bridge_v0_1.json'
      - 'specs/kuuos_gauge_os_transport_bridge_v0_1.json'
      - 'specs/kuuos_indranet_os_dependency_bridge_v0_1.json'
      - 'specs/kuuos_dependent_origination_os_bridge_v0_1.json'
      - 'specs/kuuos_two_truths_os_bridge_v0_1.json'
      - 'specs/kuuos_os_autonomy_kernel_v0_1.json'
      - 'scripts/validate_kuuos_sheaf_os_gluing_bridge_v0_1.py'
      - '.github/workflows/kuuos_sheaf_os_gluing_bridge_validation.yml'

jobs:
  validate-sheaf-os-gluing-bridge:
    name: Validate KuuOS Sheaf OS gluing bridge v0.1
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Show Sheaf OS gluing boundary
        run: |
          python3 --version
          echo "Validating base site, covers, local sections, restrictions, gluing conditions, obstructions, and candidate-only witness projections."

      - name: Validate Sheaf OS gluing bridge
        run: python3 scripts/validate_kuuos_sheaf_os_gluing_bridge_v0_1.py
