name: VerifyOS World Host-Effect v0.4

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "formal/KUOS/VerifyOS/WorldHostEffectVerificationReceiptV0_4.lean"
      - "formal/KUOS/ObserveOS/WorldHostEffectObservationReceiptV0_4.lean"
      - "formal/KuuOSVerifyOSV0_4.lean"
      - "formal/KuuOSFormal.lean"
      - "formal/KUOS.lean"
      - "docs/KUUOS_VERIFYOS_WORLD_HOST_EFFECT_VERIFICATION_v0_4.md"
      - "manifests/kuuos_verifyos_world_host_effect_verification_v0_4.json"
      - "scripts/check_verifyos_world_host_effect_verification_v0_4.py"
      - "scripts/run_kuuos_runtime_full_check_v0_52.py"
      - ".github/workflows/verifyos-world-host-effect-v0-4.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check VerifyOS v0.4 registration
        run: python3 scripts/check_verifyos_world_host_effect_verification_v0_4.py
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify canonical manifest
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib cache
        run: lake exe cache get
      - name: Compile VerifyOS v0.4 module
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KUOS.VerifyOS.WorldHostEffectVerificationReceiptV0_4
      - name: Compile aggregate formal root
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KuuOSFormal
