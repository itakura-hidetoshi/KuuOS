name: Physical Quantum Qi Runtime Evolution Validation

on:
  workflow_dispatch:
  push:
    paths:
      - 'docs/QI_*.md'
      - 'docs/PHYSICAL_QUANTUM_QI_*.md'
      - 'specs/qi_*_v0_2*.json'
      - 'specs/physical_quantum_qi_*_v0_2*.json'
      - 'examples/qi_*_v0_2*.json'
      - 'examples/physical_quantum_qi_*_v0_2*.json'
      - 'src/physical_quantum_qi_*_v0_2*.py'
      - 'tests/test_physical_quantum_qi_*_v0_2*.py'
      - 'scripts/*qi_*_v0_2*.py'
      - 'scripts/*physical_quantum_qi*_v0_2*.py'
      - 'Makefile'
      - '.github/workflows/physical_quantum_qi_runtime_evolution_validation.yml'
  pull_request:
    paths:
      - 'docs/QI_*.md'
      - 'docs/PHYSICAL_QUANTUM_QI_*.md'
      - 'specs/qi_*_v0_2*.json'
      - 'specs/physical_quantum_qi_*_v0_2*.json'
      - 'examples/qi_*_v0_2*.json'
      - 'examples/physical_quantum_qi_*_v0_2*.json'
      - 'src/physical_quantum_qi_*_v0_2*.py'
      - 'tests/test_physical_quantum_qi_*_v0_2*.py'
      - 'scripts/*qi_*_v0_2*.py'
      - 'scripts/*physical_quantum_qi*_v0_2*.py'
      - 'Makefile'
      - '.github/workflows/physical_quantum_qi_runtime_evolution_validation.yml'

jobs:
  validate-physical-quantum-qi-runtime-evolution:
    name: Validate Physical Quantum Qi v0.2J-R / v0.2S baseline lock
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Show Qi runtime evolution validation surface
        run: |
          python3 --version
          echo "Bensho route candidate: v0.2J"
          echo "DecisionOS clinician handoff: v0.2K"
          echo "Clinical red flag consultation governor: v0.2L"
          echo "Observation kernel: v0.2M"
          echo "State transition kernel: v0.2N"
          echo "Transition trajectory ledger: v0.2O"
          echo "Trajectory phase transition detector: v0.2P"
          echo "Phase transition response governor: v0.2Q"
          echo "Response feedback loop: v0.2R"
          echo "Runtime evolution CI receipt: v0.2J-R"
          echo "Runtime evolution bundle manifest: v0.2J-R"
          echo "Runtime evolution finality packet: v0.2J-R"
          echo "Runtime evolution finality post-merge receipt: v0.2J-R"
          echo "Runtime evolution baseline lock: v0.2S"
          echo "Boundary: candidate-only, append-only, non-authoritative, consultation-preserving, baseline-lock-only"

      - name: Run Physical Quantum Qi v0.2J-R / v0.2S runtime evolution checks
        run: make physical-quantum-qi-runtime-evolution-checks
