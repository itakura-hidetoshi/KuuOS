jobs:
  validate-physical-quantum-qi-runtime-evolution:
    name: Validate Physical Quantum Qi v0.2J-R runtime evolution
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Show Qi runtime evolution validation surface
        run: |
          python3 --version
          echo "Bensho route candidate: v0.2J"
          echo "DecisionOS clinician handoff: v0.2K"
          echo "Clinical red flag consultation governor: v0.2L"
          echo "Observation kernel: v0.2M"
          echo "State transition kernel: v0.2N"
          echo "Transition trajectory ledger: v0.2O"
          echo "Trajectory phase transition detector: v0.2P"
          echo "Phase transition response governor: v0.2Q"
          echo "Response feedback loop: v0.2R"
          echo "Runtime evolution CI receipt: v0.2J-R"
          echo "Boundary: candidate-only, append-only, non-authoritative, consultation-preserving"

      - name: Run Physical Quantum Qi v0.2J-R runtime evolution checks
        run: make physical-quantum-qi-runtime-evolution-checks
