name: WORLD v0.56 OS Transport macOS

on:
  pull_request:
    paths:
      - '.github/workflows/v056-os-transport-macos.yml'
      - 'formal/KUOS/WORLD/ArakiBoundedExponentialArcCalculusV0_56.lean'
      - 'formal/KUOS/WORLD/KuuVacuumArakiHessianOSTransportV0_56.lean'
      - 'formal/KuuOSArakiCalculusV0_56.lean'
      - 'formal/KuuOSFormalV0_56.lean'
      - 'lakefile.toml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 scripts/check_world_kuu_vacuum_araki_hessian_physical_realization_v0_56.py
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - run: lake update
      - run: git diff --exit-code -- lake-manifest.json
      - run: lake exe cache get
      - run: lake -KleanArgs=-DwarningAsError=true -KleanArgs=-DsorryAsError=true build KuuOSArakiCalculusV0_56
      - run: lake -KleanArgs=-DwarningAsError=true -KleanArgs=-DsorryAsError=true build KuuOSFormalV0_56
