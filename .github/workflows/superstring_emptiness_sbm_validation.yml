name: Superstring Emptiness String-Brane-Membrane Validation

on:
  push:
    paths:
      - 'docs/SUPERSTRING_EMPTINESS_STRING_BRANE_MEMBRANE_*.md'
      - 'docs/SUPERSTRING_EMPTINESS_MASS_GAP_TWO_TRUTHS_LINK_v0_5.md'
      - 'contracts/superstring_emptiness_string_brane_membrane_contract_v0_1.yaml'
      - 'contracts/superstring_emptiness_indranet_gauge_interface_contract_v0_4.yaml'
      - 'contracts/superstring_emptiness_mass_gap_two_truths_link_contract_v0_5.yaml'
      - 'contracts/superstring_emptiness_observer_record_scale_bridge_contract_v0_6.yaml'
      - 'validators/validate_superstring_emptiness_string_brane_membrane_v0_*.py'
      - 'validators/run_superstring_emptiness_string_brane_membrane_cases_v0_*.py'
      - 'validators/validate_superstring_emptiness_sbm_*_v0_2.py'
      - 'validators/validate_superstring_emptiness_indranet_gauge_interface_v0_4.py'
      - 'validators/run_superstring_emptiness_indranet_gauge_interface_cases_v0_4.py'
      - 'validators/validate_superstring_emptiness_observer_record_scale_bridge_v0_6.py'
      - 'validators/run_superstring_emptiness_observer_record_scale_bridge_cases_v0_6.py'
      - 'validation_cases/superstring_emptiness_string_brane_membrane_validation_cases_v0_*.json'
      - 'validation_cases/superstring_emptiness_indranet_gauge_interface_validation_cases_v0_4.json'
      - 'validation_cases/superstring_emptiness_observer_record_scale_bridge_validation_cases_v0_6.json'
      - 'examples/superstring_emptiness_string_brane_membrane_packet_v0_1.json'
      - 'examples/superstring_emptiness_indranet_gauge_interface_packet_v0_4.json'
      - 'examples/superstring_emptiness_observer_record_scale_bridge_packet_v0_6.json'
      - 'manifests/superstring_emptiness_string_brane_membrane_manifest_v0_1.json'
      - 'manifests/superstring_emptiness_mass_gap_two_truths_link_manifest_v0_5.json'
      - 'packets/superstring_emptiness_string_brane_membrane_*_packet_v0_1.json'
      - '.github/workflows/superstring_emptiness_sbm_validation.yml'
  pull_request:
    paths:
      - 'docs/SUPERSTRING_EMPTINESS_STRING_BRANE_MEMBRANE_*.md'
      - 'docs/SUPERSTRING_EMPTINESS_MASS_GAP_TWO_TRUTHS_LINK_v0_5.md'
      - 'contracts/superstring_emptiness_string_brane_membrane_contract_v0_1.yaml'
      - 'contracts/superstring_emptiness_indranet_gauge_interface_contract_v0_4.yaml'
      - 'contracts/superstring_emptiness_mass_gap_two_truths_link_contract_v0_5.yaml'
      - 'contracts/superstring_emptiness_observer_record_scale_bridge_contract_v0_6.yaml'
      - 'validators/validate_superstring_emptiness_string_brane_membrane_v0_*.py'
      - 'validators/run_superstring_emptiness_string_brane_membrane_cases_v0_*.py'
      - 'validators/validate_superstring_emptiness_sbm_*_v0_2.py'
      - 'validators/validate_superstring_emptiness_indranet_gauge_interface_v0_4.py'
      - 'validators/run_superstring_emptiness_indranet_gauge_interface_cases_v0_4.py'
      - 'validators/validate_superstring_emptiness_observer_record_scale_bridge_v0_6.py'
      - 'validators/run_superstring_emptiness_observer_record_scale_bridge_cases_v0_6.py'
      - 'validation_cases/superstring_emptiness_string_brane_membrane_validation_cases_v0_*.json'
      - 'validation_cases/superstring_emptiness_indranet_gauge_interface_validation_cases_v0_4.json'
      - 'validation_cases/superstring_emptiness_observer_record_scale_bridge_validation_cases_v0_6.json'
      - 'examples/superstring_emptiness_string_brane_membrane_packet_v0_1.json'
      - 'examples/superstring_emptiness_indranet_gauge_interface_packet_v0_4.json'
      - 'examples/superstring_emptiness_observer_record_scale_bridge_packet_v0_6.json'
      - 'manifests/superstring_emptiness_string_brane_membrane_manifest_v0_1.json'
      - 'manifests/superstring_emptiness_mass_gap_two_truths_link_manifest_v0_5.json'
      - 'packets/superstring_emptiness_string_brane_membrane_*_packet_v0_1.json'
      - '.github/workflows/superstring_emptiness_sbm_validation.yml'
  workflow_dispatch:

jobs:
  validate-sbm-runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate legacy example with consolidated validator
        run: |
          python3 validators/validate_superstring_emptiness_string_brane_membrane_v0_2.py \
            examples/superstring_emptiness_string_brane_membrane_packet_v0_1.json

      - name: Run legacy validation cases with consolidated runner
        run: |
          python3 validators/run_superstring_emptiness_string_brane_membrane_cases_v0_2.py \
            validation_cases/superstring_emptiness_string_brane_membrane_validation_cases_v0_1.json

      - name: Run v0.2 validation cases
        run: |
          python3 validators/run_superstring_emptiness_string_brane_membrane_cases_v0_2.py \
            validation_cases/superstring_emptiness_string_brane_membrane_validation_cases_v0_2.json

      - name: Validate manifest
        run: |
          python3 validators/validate_superstring_emptiness_sbm_manifest_v0_2.py \
            manifests/superstring_emptiness_string_brane_membrane_manifest_v0_1.json

      - name: Validate release/finality packet chain
        run: |
          python3 validators/validate_superstring_emptiness_sbm_packet_chain_v0_2.py \
            packets/superstring_emptiness_string_brane_membrane_release_packet_v0_1.json \
            packets/superstring_emptiness_string_brane_membrane_finality_packet_v0_1.json

      - name: Validate v0.4 IndraNet gauge interface example
        run: |
          python3 validators/validate_superstring_emptiness_indranet_gauge_interface_v0_4.py \
            examples/superstring_emptiness_indranet_gauge_interface_packet_v0_4.json

      - name: Run v0.4 IndraNet gauge interface cases
        run: |
          python3 validators/run_superstring_emptiness_indranet_gauge_interface_cases_v0_4.py \
            validation_cases/superstring_emptiness_indranet_gauge_interface_validation_cases_v0_4.json

      - name: Validate v0.6 Observer-Record-Scale bridge example
        run: |
          python3 validators/validate_superstring_emptiness_observer_record_scale_bridge_v0_6.py \
            examples/superstring_emptiness_observer_record_scale_bridge_packet_v0_6.json

      - name: Run v0.6 Observer-Record-Scale bridge cases
        run: |
          python3 validators/run_superstring_emptiness_observer_record_scale_bridge_cases_v0_6.py \
            validation_cases/superstring_emptiness_observer_record_scale_bridge_validation_cases_v0_6.json
