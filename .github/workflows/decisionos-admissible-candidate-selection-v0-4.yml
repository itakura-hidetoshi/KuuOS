name: DecisionOS Admissible Candidate Selection v0.4

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "formal/KUOS/DecisionOS/VacuumExpectationAdmissibleCandidateSelectionV0_4.lean"
      - "formal/KuuOSDecisionOSV0_4.lean"
      - "formal/KuuOSFormal.lean"
      - "scripts/check_decisionos_admissible_candidate_selection_v0_4.py"
      - "manifests/kuuos_decisionos_admissible_candidate_selection_v0_4.json"
      - "docs/KUUOS_DECISIONOS_ADMISSIBLE_CANDIDATE_SELECTION_v0_4.md"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/check_decisionos_admissible_candidate_selection_v0_4.py
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - run: lake update
      - run: git diff --exit-code -- lake-manifest.json
      - run: lake exe cache get
      - run: lake -KleanArgs=-DwarningAsError=true -KleanArgs=-DsorryAsError=true build KUOS.DecisionOS.VacuumExpectationAdmissibleCandidateSelectionV0_4
      - run: lake -KleanArgs=-DwarningAsError=true -KleanArgs=-DsorryAsError=true build KuuOSFormal
