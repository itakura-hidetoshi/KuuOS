name: All Governance Validation

on:
  workflow_dispatch:
  push:
    paths:
      - 'docs/**'
      - 'specs/**'
      - 'scripts/**'
      - 'examples/**'
      - 'tests/**'
      - 'validation_cases/**'
      - 'manifests/**'
      - 'packets/**'
      - 'chain_indexes/**'
      - 'formal/**'
      - 'src/**'
      - 'Makefile'
      - '.github/**'
  pull_request:
    paths:
      - 'docs/**'
      - 'specs/**'
      - 'scripts/**'
      - 'examples/**'
      - 'tests/**'
      - 'validation_cases/**'
      - 'manifests/**'
      - 'packets/**'
      - 'chain_indexes/**'
      - 'formal/**'
      - 'src/**'
      - 'Makefile'
      - '.github/**'

permissions:
  contents: read

concurrency:
  group: all-governance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-all-governance:
    name: Validate all governance checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check workflow consolidation integrity
        run: python3 scripts/check_workflow_consolidation_integrity.py
      - name: Run all governance checks
        run: python3 scripts/run_all_governance_full_checks_v0_1.py
