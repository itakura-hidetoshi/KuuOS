name: ActOS Bounded Invocation v0.4
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - fix/vacuum-receipt-chain-final
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/fix_dependent_receipt_notation.py
      - run: git diff --check
      - run: python3 scripts/check_actos_bounded_adapter_invocation_v0_4.py
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - run: lake update
      - run: git diff --exit-code -- lake-manifest.json
      - run: lake exe cache get
      - run: lake -KleanArgs=-DwarningAsError=true -KleanArgs=-DsorryAsError=true build KUOS.ActOS.VacuumExpectationBoundedAdapterInvocationV0_4
      - run: lake -KleanArgs=-DwarningAsError=true -KleanArgs=-DsorryAsError=true build KuuOSFormal
