      - 'specs/dukkha_as_qi_mode_validation_cases_v0_1.yaml'
      - 'specs/invariant_preservation_matrix_fixtures_v0_1.json'
      - 'scripts/validate_mandala_multi_world_v0_1.py'
      - 'scripts/validate_bodhisattva_ten_paramita_v0_1.py'
      - 'scripts/validate_paramita_repair_router_v0_1.py'
      - 'scripts/validate_paramita_repair_router_fixtures_v0_1.py'
      - 'scripts/validate_dukkha_mathematical_model_v0_1.py'
      - 'scripts/validate_dukkha_model_fixtures_v0_1.py'
      - 'scripts/validate_dukkha_as_qi_mode_v0_1.py'
      - 'scripts/validate_formal_invariant_spine_v0_1.py'
      - 'scripts/validate_super_relativity_invariant_bridge_v0_1.py'
      - 'scripts/validate_invariant_preservation_matrix_v0_1.py'
      - 'scripts/validate_invariant_preservation_matrix_fixtures_v0_1.py'
