      - 'docs/SUPER_RELATIVITY_INVARIANT_BRIDGE_v0_1.md'
      - 'docs/INVARIANT_PRESERVATION_MATRIX_v0_1.md'
      - 'formal/KUOS/CoreGovernance/*.lean'
      - 'specs/mandala_multi_world_validation_cases_v0_1.yaml'
