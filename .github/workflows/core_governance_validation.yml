      - 'examples/dukkha_model_minimal.py'
      - 'examples/invariant_preservation_matrix_minimal.py'
      - 'Makefile'
      - '.github/workflows/core_governance_validation.yml'

jobs:
  validate-core-governance:
    name: Validate core governance checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run core governance full checks
        run: python3 scripts/run_core_governance_full_checks_v0_1.py
