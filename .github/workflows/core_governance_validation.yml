name: Core Governance Validation

on:
  workflow_dispatch:
  push:
    paths:
      - 'docs/**'
      - 'specs/**'
      - 'scripts/**'
      - 'examples/**'
      - 'formal/**'
      - 'Makefile'
      - '.github/workflows/core_governance_validation.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'specs/**'
      - 'scripts/**'
      - 'examples/**'
      - 'formal/**'
      - 'Makefile'
      - '.github/workflows/core_governance_validation.yml'

jobs:
  validate-core-governance:
    name: Validate core governance checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Show core governance validation entrypoint
        run: |
          python3 --version
          echo "Core Governance: scripts/run_core_governance_full_checks_v0_1.py"
          echo "Invariant pipeline includes audit event, hash-chain, and WORM export receipt validators."

      - name: Run core governance full checks
        run: python3 scripts/run_core_governance_full_checks_v0_1.py
