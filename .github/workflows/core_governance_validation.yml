name: Core Governance Validation

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: core-governance-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-core-governance:
    name: Validate core governance checks
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run core governance checks
        shell: bash
        env:
          PYTHONUNBUFFERED: '1'
          PYTHONPATH: .
        run: |
          set -euo pipefail
          python3 scripts/run_core_governance_full_checks_v0_1.py 2>&1 | tee core-governance.log
      - name: Upload core governance diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-governance-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: core-governance.log
          if-no-files-found: warn
          retention-days: 14
