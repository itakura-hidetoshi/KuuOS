name: Qi-WORLD Yin-Yang Process Blocker v2.3

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'runtime/kuuos_qi_world_yinyang_process_blocker_complementarity_v2_3.py'
      - 'runtime/kuuos_qi_world_yinyang_process_blocker_complementarity_scenarios_v2_3.py'
      - 'scripts/check_qi_world_yinyang_process_blocker_complementarity_v2_3.py'
      - 'tests/test_qi_world_yinyang_process_blocker_complementarity_v2_3.py'
      - 'docs/KUUOS_QI_WORLD_YINYANG_PROCESS_BLOCKER_COMPLEMENTARITY_v2_3.md'
      - 'manifests/kuuos_qi_world_yinyang_process_blocker_complementarity_v2_3.json'
      - 'runtime/kuuos_belief_os_types_v0_1.py'
      - 'runtime/kuuos_qi_world_cross_cycle_reentry_v1_4.py'
      - 'runtime/kuuos_qi_world_cross_cycle_reentry_v1_4_new.py'
      - 'runtime/kuuos_qi_world_cross_cycle_blocker_core_v1_5.py'
      - 'runtime/kuuos_qi_world_cross_cycle_blocker_v1_5.py'
      - 'runtime/kuuos_qi_world_cross_cycle_blocker_scenarios_v1_5.py'
      - 'scripts/check_qi_world_cross_cycle_blocker_v1_5.py'
      - 'tests/test_qi_world_cross_cycle_blocker_v1_5.py'
      - 'manifests/kuuos_qi_world_cross_cycle_blocker_v1_5.json'
      - 'formal/KUOS/Architecture/QiWorldYinYangProcessBlockerComplementarityV2_3.lean'
      - 'formal/KUOS/Architecture/QiWorldCrossCycleBlockerTheoryV1_5.lean'
      - 'formal/KUOS/Architecture/QiWorldConcreteThirdLicensedCycleMaterializationV2_2.lean'
      - 'formal/KUOS.lean'
      - 'lakefile.toml'
      - 'lake-manifest.json'
      - 'lean-toolchain'
      - '.github/workflows/qi-world-yinyang-process-blocker-v2-3-validation.yml'
  pull_request:
    paths:
      - 'runtime/kuuos_qi_world_yinyang_process_blocker_complementarity_v2_3.py'
      - 'runtime/kuuos_qi_world_yinyang_process_blocker_complementarity_scenarios_v2_3.py'
      - 'scripts/check_qi_world_yinyang_process_blocker_complementarity_v2_3.py'
      - 'tests/test_qi_world_yinyang_process_blocker_complementarity_v2_3.py'
      - 'docs/KUUOS_QI_WORLD_YINYANG_PROCESS_BLOCKER_COMPLEMENTARITY_v2_3.md'
      - 'manifests/kuuos_qi_world_yinyang_process_blocker_complementarity_v2_3.json'
      - 'runtime/kuuos_belief_os_types_v0_1.py'
      - 'runtime/kuuos_qi_world_cross_cycle_reentry_v1_4.py'
      - 'runtime/kuuos_qi_world_cross_cycle_reentry_v1_4_new.py'
      - 'runtime/kuuos_qi_world_cross_cycle_blocker_core_v1_5.py'
      - 'runtime/kuuos_qi_world_cross_cycle_blocker_v1_5.py'
      - 'runtime/kuuos_qi_world_cross_cycle_blocker_scenarios_v1_5.py'
      - 'scripts/check_qi_world_cross_cycle_blocker_v1_5.py'
      - 'tests/test_qi_world_cross_cycle_blocker_v1_5.py'
      - 'manifests/kuuos_qi_world_cross_cycle_blocker_v1_5.json'
      - 'formal/KUOS/Architecture/QiWorldYinYangProcessBlockerComplementarityV2_3.lean'
      - 'formal/KUOS/Architecture/QiWorldCrossCycleBlockerTheoryV1_5.lean'
      - 'formal/KUOS/Architecture/QiWorldConcreteThirdLicensedCycleMaterializationV2_2.lean'
      - 'formal/KUOS.lean'
      - 'lakefile.toml'
      - 'lake-manifest.json'
      - 'lean-toolchain'
      - '.github/workflows/qi-world-yinyang-process-blocker-v2-3-validation.yml'

permissions:
  contents: read

concurrency:
  group: qi-world-yinyang-v23-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  MATHLIB_NO_CACHE_ON_UPDATE: '1'

jobs:
  validate:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare diagnostics
        shell: bash
        run: mkdir -p artifacts/diagnostics

      - name: Compile v2.3 and blocker-foundation surfaces
        shell: bash
        run: |
          set -euo pipefail
          python3 -m compileall -q \
            runtime/kuuos_belief_os_types_v0_1.py \
            runtime/kuuos_qi_world_yinyang_process_blocker_complementarity_v2_3.py \
            runtime/kuuos_qi_world_yinyang_process_blocker_complementarity_scenarios_v2_3.py \
            scripts/check_qi_world_yinyang_process_blocker_complementarity_v2_3.py \
            tests/test_qi_world_yinyang_process_blocker_complementarity_v2_3.py \
            runtime/kuuos_qi_world_cross_cycle_reentry_v1_4.py \
            runtime/kuuos_qi_world_cross_cycle_reentry_v1_4_new.py \
            runtime/kuuos_qi_world_cross_cycle_blocker_core_v1_5.py \
            runtime/kuuos_qi_world_cross_cycle_blocker_v1_5.py \
            runtime/kuuos_qi_world_cross_cycle_blocker_scenarios_v1_5.py \
            scripts/check_qi_world_cross_cycle_blocker_v1_5.py \
            tests/test_qi_world_cross_cycle_blocker_v1_5.py \
            2>&1 | tee artifacts/diagnostics/python-compile.log

      - name: Validate manifests
        shell: bash
        run: |
          set -euo pipefail
          {
            python3 -m json.tool \
              manifests/kuuos_qi_world_yinyang_process_blocker_complementarity_v2_3.json \
              > /dev/null
            echo 'PASS: v2.3 manifest JSON'
            python3 -m json.tool \
              manifests/kuuos_qi_world_cross_cycle_blocker_v1_5.json \
              > /dev/null
            echo 'PASS: v1.5 manifest JSON'
          } 2>&1 | tee artifacts/diagnostics/manifest-validation.log

      - name: Validate Yin-Yang process blocker complementarity
        shell: bash
        env:
          PYTHONPATH: .
          PYTHONUNBUFFERED: '1'
        run: |
          set -euo pipefail
          python3 scripts/check_qi_world_yinyang_process_blocker_complementarity_v2_3.py \
            2>&1 | tee artifacts/diagnostics/v2-3-runtime.log
          python3 -m unittest -v \
            tests.test_qi_world_yinyang_process_blocker_complementarity_v2_3 \
            2>&1 | tee -a artifacts/diagnostics/v2-3-runtime.log

      - name: Validate cross-cycle blocker foundation
        shell: bash
        env:
          PYTHONPATH: .
          PYTHONUNBUFFERED: '1'
        run: |
          set -euo pipefail
          python3 scripts/check_qi_world_cross_cycle_blocker_v1_5.py \
            2>&1 | tee artifacts/diagnostics/v1-5-blocker.log
          python3 -m unittest -v tests.test_qi_world_cross_cycle_blocker_v1_5 \
            2>&1 | tee -a artifacts/diagnostics/v1-5-blocker.log

      - name: Verify formal registration and dependencies
        shell: bash
        run: |
          set -euo pipefail
          {
            grep -Fq \
              'import KUOS.Architecture.QiWorldYinYangProcessBlockerComplementarityV2_3' \
              formal/KUOS.lean
            grep -Fq \
              'import KUOS.Architecture.QiWorldCrossCycleBlockerTheoryV1_5' \
              formal/KUOS/Architecture/QiWorldYinYangProcessBlockerComplementarityV2_3.lean
            grep -Fq \
              'import KUOS.Architecture.QiWorldConcreteThirdLicensedCycleMaterializationV2_2' \
              formal/KUOS/Architecture/QiWorldYinYangProcessBlockerComplementarityV2_3.lean
            echo 'PASS: formal registration and dependency imports'
          } 2>&1 | tee artifacts/diagnostics/formal-registration.log

      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false

      - name: Resolve pinned dependencies
        shell: bash
        run: |
          set -euo pipefail
          lake update 2>&1 | tee artifacts/diagnostics/lake-update.log

      - name: Verify committed manifest is canonical
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code -- lake-manifest.json \
            2>&1 | tee artifacts/diagnostics/manifest-diff.log

      - name: Fetch Mathlib olean cache
        shell: bash
        run: |
          set -euo pipefail
          lake exe cache get 2>&1 | tee artifacts/diagnostics/mathlib-cache.log

      - name: Strictly compile v2.3 formal module
        shell: bash
        run: |
          set -euo pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true \
            build KUOS.Architecture.QiWorldYinYangProcessBlockerComplementarityV2_3 \
            2>&1 | tee artifacts/diagnostics/v2-3-lean-module.log

      - name: Record run context
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "workflow=${GITHUB_WORKFLOW}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "event=${GITHUB_EVENT_NAME}"
            echo "ref=${GITHUB_REF}"
            echo "sha=${GITHUB_SHA}"
            python3 --version
            lake --version || true
            lean --version || true
          } > artifacts/diagnostics/context.log

      - name: Upload v2.3 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qi-world-yinyang-v2-3-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/diagnostics/
          if-no-files-found: error
          retention-days: 14
