name: Qi-WORLD Yin-Yang Process Blocker v2.3

on:
  push:
    paths:
      - "runtime/kuuos_qi_world_yinyang_process_blocker_complementarity_v2_3.py"
      - "runtime/kuuos_qi_world_yinyang_process_blocker_complementarity_scenarios_v2_3.py"
      - "scripts/check_qi_world_yinyang_process_blocker_complementarity_v2_3.py"
      - "tests/test_qi_world_yinyang_process_blocker_complementarity_v2_3.py"
      - "formal/KUOS/Architecture/QiWorldYinYangProcessBlockerComplementarityV2_3.lean"
      - "formal/KUOS.lean"
      - "docs/KUUOS_QI_WORLD_YINYANG_PROCESS_BLOCKER_COMPLEMENTARITY_v2_3.md"
      - "manifests/kuuos_qi_world_yinyang_process_blocker_complementarity_v2_3.json"
      - ".github/workflows/qi-world-yinyang-process-blocker-v2-3-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_qi_world_yinyang_process_blocker_complementarity_v2_3.py"
      - "runtime/kuuos_qi_world_yinyang_process_blocker_complementarity_scenarios_v2_3.py"
      - "scripts/check_qi_world_yinyang_process_blocker_complementarity_v2_3.py"
      - "tests/test_qi_world_yinyang_process_blocker_complementarity_v2_3.py"
      - "formal/KUOS/Architecture/QiWorldYinYangProcessBlockerComplementarityV2_3.lean"
      - "formal/KUOS.lean"
      - "docs/KUUOS_QI_WORLD_YINYANG_PROCESS_BLOCKER_COMPLEMENTARITY_v2_3.md"
      - "manifests/kuuos_qi_world_yinyang_process_blocker_complementarity_v2_3.json"
      - ".github/workflows/qi-world-yinyang-process-blocker-v2-3-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python surfaces
        run: >-
          python -m compileall -q
          runtime/kuuos_qi_world_yinyang_process_blocker_complementarity_v2_3.py
          runtime/kuuos_qi_world_yinyang_process_blocker_complementarity_scenarios_v2_3.py
          scripts/check_qi_world_yinyang_process_blocker_complementarity_v2_3.py
          tests/test_qi_world_yinyang_process_blocker_complementarity_v2_3.py
      - name: Validate manifest JSON
        run: >-
          python -m json.tool
          manifests/kuuos_qi_world_yinyang_process_blocker_complementarity_v2_3.json
          > /dev/null
      - name: Validate Yin-Yang process blocker complementarity
        run: >-
          PYTHONPATH=. python scripts/check_qi_world_yinyang_process_blocker_complementarity_v2_3.py
          > v2-3-runtime.log 2>&1
      - name: Run v2.3 unit tests
        run: >-
          PYTHONPATH=. python -m unittest -v
          tests.test_qi_world_yinyang_process_blocker_complementarity_v2_3
          >> v2-3-runtime.log 2>&1
      - name: Run blocker theory regression
        run: >-
          PYTHONPATH=. python scripts/check_qi_world_cross_cycle_blocker_v1_5.py
          >> v2-3-runtime.log 2>&1
      - name: Run central runtime regression
        run: >-
          PYTHONPATH=. python scripts/run_kuuos_runtime_full_check_v0_52.py
          >> v2-3-runtime.log 2>&1
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify lockfile stability
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Strictly compile v2.3 formal module
        shell: bash
        run: |
          set -o pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true \
            build KUOS.Architecture.QiWorldYinYangProcessBlockerComplementarityV2_3 \
            2>&1 | tee v2-3-lean-module.log
      - name: Strictly compile formal root
        shell: bash
        run: |
          set -o pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true build KuuOSFormal \
            2>&1 | tee v2-3-lean-root.log
      - name: Upload v2.3 diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qi-world-yinyang-v2-3-diagnostics
          path: |
            v2-3-runtime.log
            v2-3-lean-module.log
            v2-3-lean-root.log
          if-no-files-found: warn
