name: Qi-WORLD Yin-Yang Process Blocker v2.3

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "runtime/kuuos_qi_world_yinyang_process_blocker_complementarity_v2_3.py"
      - "runtime/kuuos_qi_world_yinyang_process_blocker_complementarity_scenarios_v2_3.py"
      - "scripts/check_qi_world_yinyang_process_blocker_complementarity_v2_3.py"
      - "tests/test_qi_world_yinyang_process_blocker_complementarity_v2_3.py"
      - "formal/KUOS/Architecture/QiWorldYinYangProcessBlockerComplementarityV2_3.lean"
      - "formal/KUOS.lean"
      - "formal/KuuOSFormal.lean"
      - "docs/KUUOS_QI_WORLD_YINYANG_PROCESS_BLOCKER_COMPLEMENTARITY_v2_3.md"
      - "manifests/kuuos_qi_world_yinyang_process_blocker_complementarity_v2_3.json"
      - "scripts/check_qi_world_cross_cycle_blocker_v1_5.py"
      - "scripts/run_kuuos_runtime_full_check_v0_55.py"
      - "lakefile.toml"
      - "lake-manifest.json"
      - "lean-toolchain"
      - ".github/workflows/qi-world-yinyang-process-blocker-v2-3-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_qi_world_yinyang_process_blocker_complementarity_v2_3.py"
      - "runtime/kuuos_qi_world_yinyang_process_blocker_complementarity_scenarios_v2_3.py"
      - "scripts/check_qi_world_yinyang_process_blocker_complementarity_v2_3.py"
      - "tests/test_qi_world_yinyang_process_blocker_complementarity_v2_3.py"
      - "formal/KUOS/Architecture/QiWorldYinYangProcessBlockerComplementarityV2_3.lean"
      - "formal/KUOS.lean"
      - "formal/KuuOSFormal.lean"
      - "docs/KUUOS_QI_WORLD_YINYANG_PROCESS_BLOCKER_COMPLEMENTARITY_v2_3.md"
      - "manifests/kuuos_qi_world_yinyang_process_blocker_complementarity_v2_3.json"
      - "scripts/check_qi_world_cross_cycle_blocker_v1_5.py"
      - "scripts/run_kuuos_runtime_full_check_v0_55.py"
      - "lakefile.toml"
      - "lake-manifest.json"
      - "lean-toolchain"
      - ".github/workflows/qi-world-yinyang-process-blocker-v2-3-validation.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  MATHLIB_NO_CACHE_ON_UPDATE: '1'

jobs:
  validate:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python surfaces
        run: >-
          python3 -m compileall -q
          runtime/kuuos_qi_world_yinyang_process_blocker_complementarity_v2_3.py
          runtime/kuuos_qi_world_yinyang_process_blocker_complementarity_scenarios_v2_3.py
          scripts/check_qi_world_yinyang_process_blocker_complementarity_v2_3.py
          tests/test_qi_world_yinyang_process_blocker_complementarity_v2_3.py
      - name: Validate manifest JSON
        run: >-
          python3 -m json.tool
          manifests/kuuos_qi_world_yinyang_process_blocker_complementarity_v2_3.json
          > /dev/null
      - name: Validate Yin-Yang process blocker complementarity
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=. python3 scripts/check_qi_world_yinyang_process_blocker_complementarity_v2_3.py \
            2>&1 | tee v2-3-runtime.log
      - name: Run v2.3 unit tests
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=. python3 -m unittest -v \
            tests.test_qi_world_yinyang_process_blocker_complementarity_v2_3 \
            2>&1 | tee -a v2-3-runtime.log
      - name: Run blocker theory regression
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=. python3 scripts/check_qi_world_cross_cycle_blocker_v1_5.py \
            2>&1 | tee -a v2-3-runtime.log
      - name: Run current central runtime regression
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=. python3 scripts/run_kuuos_runtime_full_check_v0_55.py \
            2>&1 | tee -a v2-3-runtime.log
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify lockfile stability
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Strictly compile v2.3 formal module
        shell: bash
        run: |
          set -euo pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true \
            build KUOS.Architecture.QiWorldYinYangProcessBlockerComplementarityV2_3 \
            2>&1 | tee v2-3-lean-module.log
      - name: Strictly compile formal root
        shell: bash
        run: |
          set -euo pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true build KuuOSFormal \
            2>&1 | tee v2-3-lean-root.log
      - name: Upload v2.3 diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: qi-world-yinyang-v2-3-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            v2-3-runtime.log
            v2-3-lean-module.log
            v2-3-lean-root.log
          if-no-files-found: warn
          retention-days: 14
