name: Workflow Reference Migration

on:
  push:
    branches:
      - workflow-repair-audit
    paths:
      - 'scripts/apply_workflow_reference_migrations.py'
      - '.github/workflows/workflow-reference-migration.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: workflow-repair-audit
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply migrations
        run: python3 scripts/apply_workflow_reference_migrations.py
      - name: Commit migrated references
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- scripts manifests; then
            echo 'No workflow references require migration.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts manifests
          git commit -m 'Repair consolidated workflow references'
          git push origin HEAD:workflow-repair-audit
