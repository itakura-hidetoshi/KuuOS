name: Qi WORLD Real Hilbert L2 Analytic Spine v0.26 Validation

on:
  push:
    paths:
      - "runtime/kuuos_indra_qi_world_real_hilbert_l2_analytic_spine_*_v0_26.py"
      - "scripts/check_qi_world_real_hilbert_l2_analytic_spine_v0_26.py"
      - "manifests/qi_world_real_hilbert_l2_analytic_spine_v0_26.json"
      - "examples/indra_qi_world_real_hilbert_l2_analytic_spine_plan_v0_26.json"
      - "docs/KU_INDRA_QI_WORLD_REAL_HILBERT_L2_ANALYTIC_SPINE_v0_26.md"
      - ".github/workflows/qi-world-real-hilbert-l2-analytic-spine-v0-26-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_indra_qi_world_real_hilbert_l2_analytic_spine_*_v0_26.py"
      - "scripts/check_qi_world_real_hilbert_l2_analytic_spine_v0_26.py"
      - "manifests/qi_world_real_hilbert_l2_analytic_spine_v0_26.json"
      - "examples/indra_qi_world_real_hilbert_l2_analytic_spine_plan_v0_26.json"
      - "docs/KU_INDRA_QI_WORLD_REAL_HILBERT_L2_ANALYTIC_SPINE_v0_26.md"
      - ".github/workflows/qi-world-real-hilbert-l2-analytic-spine-v0-26-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile v0.26 runtime
        run: python -m py_compile runtime/kuuos_indra_qi_world_real_hilbert_l2_analytic_spine_base_v0_26.py runtime/kuuos_indra_qi_world_real_hilbert_l2_analytic_spine_embedding_v0_26.py runtime/kuuos_indra_qi_world_real_hilbert_l2_analytic_spine_packet_v0_26.py runtime/kuuos_indra_qi_world_real_hilbert_l2_analytic_spine_core_v0_26.py runtime/kuuos_indra_qi_world_real_hilbert_l2_analytic_spine_runtime_v0_26.py scripts/check_qi_world_real_hilbert_l2_analytic_spine_v0_26.py
      - name: Run v0.26 checks
        run: python scripts/check_qi_world_real_hilbert_l2_analytic_spine_v0_26.py
