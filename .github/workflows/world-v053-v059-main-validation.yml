name: WORLD v0.53-v0.59 Main Validation

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'ROADMAP.md'
      - 'formal/KUOS/WORLD/**'
      - 'formal/KUOS.lean'
      - 'formal/KuuOSArakiCalculusV0_56.lean'
      - 'formal/KuuOSFourGreatCoreV0_59.lean'
      - 'formal/KuuOSFormalV0_53.lean'
      - 'formal/KuuOSFormalV0_54.lean'
      - 'formal/KuuOSFormalV0_55.lean'
      - 'formal/KuuOSFormalV0_56.lean'
      - 'formal/KuuOSFormalV0_57.lean'
      - 'formal/KuuOSFormalV0_58.lean'
      - 'formal/KuuOSFormalV0_59.lean'
      - 'formal/KuuOSFormal.lean'
      - 'lakefile.toml'
      - 'lake-manifest.json'
      - 'lean-toolchain'
      - 'docs/KU_WORLD_*'
      - 'manifests/world_*'
      - 'scripts/check_world_*'
      - 'scripts/run_pr_entry_check_v0_5.py'
      - '.github/workflows/world-v053-v059-main-validation.yml'

permissions:
  contents: read

concurrency:
  group: world-v053-v059-main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  focused-validation:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run focused WORLD validation
        env:
          PYTHONPATH: .
          PYTHONUNBUFFERED: '1'
        run: python3 scripts/run_pr_entry_check_v0_5.py --check-id world-v053-v059 --output-root artifacts/checks
      - name: Upload focused diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: world-v053-v059-focused-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/checks/world-v053-v059/
          if-no-files-found: warn
          retention-days: 30
