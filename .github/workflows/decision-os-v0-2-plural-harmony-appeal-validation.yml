name: DecisionOS v0.2 Plural Harmony Appeal Validation

on:
  push:
    paths:
      - "docs/KUUOS_DECISION_OS_PLURAL_HARMONY_APPEAL_KERNEL_v0_2.md"
      - "manifests/kuuos_decision_os_plural_harmony_appeal_kernel_v0_2.json"
      - "runtime/kuuos_decision_os_plural_types_v0_2.py"
      - "runtime/kuuos_decision_os_plural_kernel_v0_2.py"
      - "runtime/kuuos_decision_os_plural_store_v0_2.py"
      - "runtime/v02_decision_os_plural_harmony_appeal.py"
      - "scripts/check_decision_os_plural_harmony_appeal_v0_2.py"
      - "formal/KUOS/DecisionOS/PluralHarmonyAppealKernelV0_2.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/decision-os-v0-2-plural-harmony-appeal-validation.yml"
  pull_request:
    paths:
      - "docs/KUUOS_DECISION_OS_PLURAL_HARMONY_APPEAL_KERNEL_v0_2.md"
      - "manifests/kuuos_decision_os_plural_harmony_appeal_kernel_v0_2.json"
      - "runtime/kuuos_decision_os_plural_types_v0_2.py"
      - "runtime/kuuos_decision_os_plural_kernel_v0_2.py"
      - "runtime/kuuos_decision_os_plural_store_v0_2.py"
      - "runtime/v02_decision_os_plural_harmony_appeal.py"
      - "scripts/check_decision_os_plural_harmony_appeal_v0_2.py"
      - "formal/KUOS/DecisionOS/PluralHarmonyAppealKernelV0_2.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/decision-os-v0-2-plural-harmony-appeal-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile DecisionOS plural runtime
        run: python -m compileall -q runtime scripts/check_decision_os_plural_harmony_appeal_v0_2.py
      - name: Validate DecisionOS plural harmony kernel
        run: python -m runtime.v02_decision_os_plural_harmony_appeal > decision-os-v02.log 2>&1
      - name: Validate check entry point
        run: python scripts/check_decision_os_plural_harmony_appeal_v0_2.py >> decision-os-v02.log 2>&1
      - name: Upload DecisionOS plural validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decision-os-v02-log
          path: decision-os-v02.log
