name: PlanOS v0.6 Validation

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile runtime
        run: python -m compileall -q runtime scripts/check_plan_os_bounded_multi_generation_supervisor_v0_6.py
      - name: Validate bounded multi-generation supervisor
        run: python scripts/check_plan_os_bounded_multi_generation_supervisor_v0_6.py
