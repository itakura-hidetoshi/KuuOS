name: Qi-WORLD OS Interface Bridge v1.0
on: [push, pull_request, workflow_dispatch]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m compileall -q runtime scripts/check_qi_world_os_interface_bridge_v1_0.py
      - run: python scripts/check_qi_world_os_interface_bridge_v1_0.py
      - run: python scripts/run_kuuos_runtime_full_check_v0_1.py
      - name: Install elan
        run: |
          curl https://elan.lean-lang.org/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Compile Lean bridge
        shell: bash
        run: |
          source "$HOME/.elan/env"
          set +e
          lake env lean formal/KUOS/Architecture/QiWorldOSInterfaceBridgeV1_0.lean > qi-world-os-lean.log 2>&1
          status=$?
          cat qi-world-os-lean.log
          exit $status
      - name: Upload Lean diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qi-world-os-lean-diagnostics
          path: qi-world-os-lean.log
