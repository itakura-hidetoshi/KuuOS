name: Semantic Planner Verifier v0.22

on:
  push:
    paths:
      - "runtime/kuuos_semantic_planner_verifier_kernel_v0_22.py"
      - "runtime/kuuos_semantic_planner_verifier_store_v0_22.py"
      - "runtime/kuuos_semantic_planner_verifier_scenarios_v0_22.py"
      - "scripts/check_semantic_planner_verifier_v0_22.py"
      - "tests/test_semantic_planner_verifier_v0_22.py"
      - "formal/KUOS/OpenHorizon/SemanticPlannerVerifierKernelV0_22.lean"
      - "formal/KUOS.lean"
      - "docs/KUUOS_SEMANTIC_PLANNER_VERIFIER_KERNEL_v0_22.md"
      - "docs/KUUOS_AUTONOMOUS_AGENT_STATUS_v0_22.md"
      - "manifests/kuuos_semantic_planner_verifier_kernel_v0_22.json"
      - ".github/workflows/semantic-planner-verifier-v0-22-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_semantic_planner_verifier_kernel_v0_22.py"
      - "runtime/kuuos_semantic_planner_verifier_store_v0_22.py"
      - "runtime/kuuos_semantic_planner_verifier_scenarios_v0_22.py"
      - "scripts/check_semantic_planner_verifier_v0_22.py"
      - "tests/test_semantic_planner_verifier_v0_22.py"
      - "formal/KUOS/OpenHorizon/SemanticPlannerVerifierKernelV0_22.lean"
      - "formal/KUOS.lean"
      - "docs/KUUOS_SEMANTIC_PLANNER_VERIFIER_KERNEL_v0_22.md"
      - "docs/KUUOS_AUTONOMOUS_AGENT_STATUS_v0_22.md"
      - "manifests/kuuos_semantic_planner_verifier_kernel_v0_22.json"
      - ".github/workflows/semantic-planner-verifier-v0-22-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python surfaces
        run: >-
          python -m compileall -q
          runtime/kuuos_semantic_planner_verifier_kernel_v0_22.py
          runtime/kuuos_semantic_planner_verifier_store_v0_22.py
          runtime/kuuos_semantic_planner_verifier_scenarios_v0_22.py
          scripts/check_semantic_planner_verifier_v0_22.py
          tests/test_semantic_planner_verifier_v0_22.py
      - name: Validate v0.22 scenarios
        run: >-
          PYTHONPATH=. python scripts/check_semantic_planner_verifier_v0_22.py
          > semantic-planner-verifier-v0-22.log 2>&1
      - name: Run v0.22 unit tests
        run: >-
          PYTHONPATH=. python -m unittest -v
          tests.test_semantic_planner_verifier_v0_22
          >> semantic-planner-verifier-v0-22.log 2>&1
      - name: Run observation-belief regression
        run: >-
          PYTHONPATH=. python scripts/check_observation_belief_state_v0_21.py
          >> semantic-planner-verifier-v0-22.log 2>&1
      - name: Run mission-cycle regression
        run: >-
          PYTHONPATH=. python runtime/v021_autonomous_mission_cycle_kernel.py
          >> semantic-planner-verifier-v0-22.log 2>&1
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Strictly compile v0.22 formal module
        shell: bash
        run: |
          set -o pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true \
            build KUOS.OpenHorizon.SemanticPlannerVerifierKernelV0_22 \
            2>&1 | tee semantic-planner-verifier-v0-22-lean-module.log
      - name: Strictly compile formal root
        shell: bash
        run: |
          set -o pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true build KuuOSFormal \
            2>&1 | tee semantic-planner-verifier-v0-22-lean-root.log
      - name: Upload v0.22 diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: semantic-planner-verifier-v0-22-diagnostics
          path: |
            semantic-planner-verifier-v0-22.log
            semantic-planner-verifier-v0-22-lean-module.log
            semantic-planner-verifier-v0-22-lean-root.log
          if-no-files-found: warn
