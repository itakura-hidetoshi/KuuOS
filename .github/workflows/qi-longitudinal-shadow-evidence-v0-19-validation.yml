name: Qi Longitudinal Shadow Evidence v0.19 Validation

on:
  push:
    paths:
      - "runtime/kuuos_indra_qi_longitudinal_shadow_evidence_*_v0_19.py"
      - "scripts/check_qi_longitudinal_shadow_evidence_v0_19.py"
      - "manifests/qi_longitudinal_shadow_evidence_v0_19.json"
      - "examples/indra_qi_longitudinal_shadow_evidence_plan_v0_19.json"
      - "docs/KU_INDRA_QI_LONGITUDINAL_SHADOW_EVIDENCE_v0_19.md"
      - ".github/workflows/qi-longitudinal-shadow-evidence-v0-19-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_indra_qi_longitudinal_shadow_evidence_*_v0_19.py"
      - "scripts/check_qi_longitudinal_shadow_evidence_v0_19.py"
      - "manifests/qi_longitudinal_shadow_evidence_v0_19.json"
      - "examples/indra_qi_longitudinal_shadow_evidence_plan_v0_19.json"
      - "docs/KU_INDRA_QI_LONGITUDINAL_SHADOW_EVIDENCE_v0_19.md"
      - ".github/workflows/qi-longitudinal-shadow-evidence-v0-19-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile v0.19 runtime
        run: python -m py_compile runtime/kuuos_indra_qi_longitudinal_shadow_evidence_core_v0_19.py runtime/kuuos_indra_qi_longitudinal_shadow_evidence_runtime_v0_19.py scripts/check_qi_longitudinal_shadow_evidence_v0_19.py
      - name: Run v0.19 checks
        run: python scripts/check_qi_longitudinal_shadow_evidence_v0_19.py
