name: KuuOS v0.77 Checks

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  runtime:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: PYTHONPATH=. python3 scripts/check_kuuos_v077.py
      - run: python3 -m json.tool manifests/v077.json >/dev/null
