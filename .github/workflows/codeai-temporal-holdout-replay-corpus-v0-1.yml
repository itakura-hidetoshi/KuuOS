name: CodeAI Temporal Holdout Replay Corpus v0.1

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "runtime/kuuos_codeai_temporal_holdout_replay_corpus_schema_v0_1.py"
      - "runtime/kuuos_codeai_temporal_holdout_replay_corpus_checks_v0_1.py"
      - "runtime/kuuos_codeai_temporal_holdout_replay_corpus_v0_1.py"
      - "scripts/build_codeai_temporal_holdout_replay_corpus_fixture_v0_1.py"
      - "scripts/project_codeai_temporal_holdout_replay_corpus_fixture_v0_1.py"
      - "scripts/check_codeai_temporal_holdout_replay_corpus_v0_1.py"
      - "tests/test_kuuos_codeai_temporal_holdout_replay_corpus_v0_1.py"
      - "examples/codeai_temporal_holdout_replay_corpus_v0_1.json"
      - "manifests/kuuos_codeai_temporal_holdout_replay_corpus_v0_1.json"
      - "docs/KUUOS_CODEAI_TEMPORAL_HOLDOUT_REPLAY_CORPUS_v0_1.md"
      - "formal/KUOS/CodeAI/TemporalHoldoutReplayCorpusV0_1.lean"
      - "formal/KuuOSCodeAITemporalHoldoutReplayCorpusV0_1.lean"
      - "runtime/kuuos_codeai_generated_patch_error_reduction_comparative_replay_evaluation_v0_1.py"
      - "tests/test_kuuos_codeai_generated_patch_error_reduction_comparative_replay_evaluation_v0_1.py"
      - "lakefile.toml"
      - "lake-manifest.json"
      - "lean-toolchain"
      - ".github/workflows/codeai-temporal-holdout-replay-corpus-v0-1.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  MATHLIB_NO_CACHE_ON_UPDATE: '1'

jobs:
  validate:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python surfaces
        run: >-
          python3 -m compileall -q
          runtime/kuuos_codeai_temporal_holdout_replay_corpus_schema_v0_1.py
          runtime/kuuos_codeai_temporal_holdout_replay_corpus_checks_v0_1.py
          runtime/kuuos_codeai_temporal_holdout_replay_corpus_v0_1.py
          scripts/build_codeai_temporal_holdout_replay_corpus_fixture_v0_1.py
          scripts/project_codeai_temporal_holdout_replay_corpus_fixture_v0_1.py
          scripts/check_codeai_temporal_holdout_replay_corpus_v0_1.py
          tests/test_kuuos_codeai_temporal_holdout_replay_corpus_v0_1.py
      - name: Validate machine-readable artifacts
        shell: bash
        run: |
          set -euo pipefail
          python3 -m json.tool \
            examples/codeai_temporal_holdout_replay_corpus_v0_1.json \
            > /dev/null
          python3 -m json.tool \
            manifests/kuuos_codeai_temporal_holdout_replay_corpus_v0_1.json \
            > /dev/null
      - name: Check temporal holdout corpus
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=. python3 \
            scripts/check_codeai_temporal_holdout_replay_corpus_v0_1.py \
            2>&1 | tee codeai-temporal-holdout-replay-corpus-v0-1.log
      - name: Run holdout and predecessor regression tests
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=. python3 -m unittest \
            tests.test_kuuos_codeai_temporal_holdout_replay_corpus_v0_1 \
            tests.test_kuuos_codeai_generated_patch_error_reduction_comparative_replay_evaluation_v0_1 \
            2>&1 | tee codeai-temporal-holdout-replay-corpus-v0-1-tests.log
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify committed dependency manifest is canonical
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Strictly compile temporal holdout formal root
        shell: bash
        run: |
          set -euo pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true \
            build KuuOSCodeAITemporalHoldoutReplayCorpusV0_1 \
            2>&1 | tee codeai-temporal-holdout-replay-corpus-v0-1-lean.log
      - name: Strictly compile repository formal baseline
        shell: bash
        run: |
          set -euo pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true \
            build KuuOSFormal \
            2>&1 | tee codeai-temporal-holdout-replay-corpus-v0-1-lean-root.log
      - name: Upload diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: codeai-temporal-holdout-replay-corpus-v0-1-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            codeai-temporal-holdout-replay-corpus-v0-1.log
            codeai-temporal-holdout-replay-corpus-v0-1-tests.log
            codeai-temporal-holdout-replay-corpus-v0-1-lean.log
            codeai-temporal-holdout-replay-corpus-v0-1-lean-root.log
          if-no-files-found: warn
          retention-days: 14
