name: Qi-WORLD Licensed Multi-Cycle Chain Induction v2.1

on:
  push:
    paths:
      - "runtime/kuuos_qi_world_licensed_multi_cycle_chain_induction_v2_1.py"
      - "runtime/kuuos_qi_world_licensed_multi_cycle_chain_induction_scenarios_v2_1.py"
      - "scripts/check_qi_world_licensed_multi_cycle_chain_induction_v2_1.py"
      - "tests/test_qi_world_licensed_multi_cycle_chain_induction_v2_1.py"
      - "formal/KUOS/Architecture/QiWorldLicensedMultiCycleChainInductionV2_1.lean"
      - "formal/KUOS.lean"
      - "docs/KUUOS_QI_WORLD_LICENSED_MULTI_CYCLE_CHAIN_INDUCTION_v2_1.md"
      - "manifests/kuuos_qi_world_licensed_multi_cycle_chain_induction_v2_1.json"
      - ".github/workflows/qi-world-licensed-multi-cycle-chain-induction-v2-1-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_qi_world_licensed_multi_cycle_chain_induction_v2_1.py"
      - "runtime/kuuos_qi_world_licensed_multi_cycle_chain_induction_scenarios_v2_1.py"
      - "scripts/check_qi_world_licensed_multi_cycle_chain_induction_v2_1.py"
      - "tests/test_qi_world_licensed_multi_cycle_chain_induction_v2_1.py"
      - "formal/KUOS/Architecture/QiWorldLicensedMultiCycleChainInductionV2_1.lean"
      - "formal/KUOS.lean"
      - "docs/KUUOS_QI_WORLD_LICENSED_MULTI_CYCLE_CHAIN_INDUCTION_v2_1.md"
      - "manifests/kuuos_qi_world_licensed_multi_cycle_chain_induction_v2_1.json"
      - ".github/workflows/qi-world-licensed-multi-cycle-chain-induction-v2-1-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python surfaces
        run: >-
          python -m compileall -q
          runtime/kuuos_qi_world_licensed_multi_cycle_chain_induction_v2_1.py
          runtime/kuuos_qi_world_licensed_multi_cycle_chain_induction_scenarios_v2_1.py
          scripts/check_qi_world_licensed_multi_cycle_chain_induction_v2_1.py
          tests/test_qi_world_licensed_multi_cycle_chain_induction_v2_1.py
      - name: Validate licensed multi-cycle chain induction
        run: >-
          PYTHONPATH=. python scripts/check_qi_world_licensed_multi_cycle_chain_induction_v2_1.py
      - name: Run v2.1 unit tests
        run: >-
          python -m unittest -v
          tests.test_qi_world_licensed_multi_cycle_chain_induction_v2_1
      - name: Run v2.0 materialization regression
        run: >-
          python scripts/check_qi_world_successor_licensed_cycle_materialization_v2_0.py
          > v2-0-materialization-regression.log 2>&1
      - name: Upload v2.0 regression diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qi-world-v2-0-regression-diagnostics
          path: v2-0-materialization-regression.log
          if-no-files-found: error
      - name: Run central runtime regression
        run: python scripts/run_kuuos_runtime_full_check_v0_48.py
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Strictly compile formal root
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true build KuuOSFormal
