name: KuuOS Review Seal Validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run focused review seal validation
        run: python3 scripts/run_pr_entry_check_v0_7.py --check-id review-seal-v01 --output-root artifacts/checks
      - name: Upload focused diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-seal-v01-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/checks/review-seal-v01/
          if-no-files-found: warn
          retention-days: 30
