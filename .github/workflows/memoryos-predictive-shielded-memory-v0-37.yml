name: MemoryOS Predictive Shielded Memory v0.37

on:
  push:
    paths:
      - "runtime/kuuos_memoryos_predictive_shielded_memory_v0_37.py"
      - "tests/test_memoryos_predictive_shielded_memory_v0_37.py"
      - "scripts/check_memoryos_predictive_shielded_memory_v0_37.py"
      - "docs/KUUOS_MEMORYOS_PREDICTIVE_SHIELDED_MEMORY_v0_37.md"
      - "docs/research/MEMORYOS_QI_BLOCKER_AI_THEORY_RESEARCH_v0_37.md"
      - "manifests/kuuos_memoryos_predictive_shielded_memory_v0_37.json"
      - "formal/KUOS/OpenHorizon/MemoryOSPredictiveShieldedMemoryKernelV0_37.lean"
      - "formal/KUOS.lean"
      - "scripts/run_kuuos_runtime_full_check_v0_48.py"
      - ".github/workflows/memoryos-predictive-shielded-memory-v0-37.yml"
      - "runtime/kuuos_memoryos_qi_world_blocker_integration_v0_35.py"
      - "tests/test_memoryos_qi_world_blocker_integration_v0_35.py"
      - "scripts/check_memoryos_qi_world_blocker_integration_v0_35.py"
  pull_request:
    paths:
      - "runtime/kuuos_memoryos_predictive_shielded_memory_v0_37.py"
      - "tests/test_memoryos_predictive_shielded_memory_v0_37.py"
      - "scripts/check_memoryos_predictive_shielded_memory_v0_37.py"
      - "docs/KUUOS_MEMORYOS_PREDICTIVE_SHIELDED_MEMORY_v0_37.md"
      - "docs/research/MEMORYOS_QI_BLOCKER_AI_THEORY_RESEARCH_v0_37.md"
      - "manifests/kuuos_memoryos_predictive_shielded_memory_v0_37.json"
      - "formal/KUOS/OpenHorizon/MemoryOSPredictiveShieldedMemoryKernelV0_37.lean"
      - "formal/KUOS.lean"
      - "scripts/run_kuuos_runtime_full_check_v0_48.py"
      - ".github/workflows/memoryos-predictive-shielded-memory-v0-37.yml"
      - "runtime/kuuos_memoryos_qi_world_blocker_integration_v0_35.py"
      - "tests/test_memoryos_qi_world_blocker_integration_v0_35.py"
      - "scripts/check_memoryos_qi_world_blocker_integration_v0_35.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile MemoryOS v0.37 Python
        run: |
          python -m compileall -q \
            runtime/kuuos_memoryos_predictive_shielded_memory_v0_37.py \
            tests/test_memoryos_predictive_shielded_memory_v0_37.py \
            scripts/check_memoryos_predictive_shielded_memory_v0_37.py
      - name: Check MemoryOS v0.37 registration and research mapping
        run: PYTHONPATH=. python scripts/check_memoryos_predictive_shielded_memory_v0_37.py
      - name: Test MemoryOS v0.37 runtime
        run: PYTHONPATH=. python -m unittest -v tests.test_memoryos_predictive_shielded_memory_v0_37
      - name: Recheck MemoryOS v0.35 source integration
        run: |
          PYTHONPATH=. python scripts/check_memoryos_qi_world_blocker_integration_v0_35.py
          PYTHONPATH=. python -m unittest -v tests.test_memoryos_qi_world_blocker_integration_v0_35
      - name: Recheck MemoryOS v0.36 validation matrix
        run: |
          PYTHONPATH=. python scripts/check_memoryos_qi_world_validation_matrix_v0_36.py
          PYTHONPATH=. python -m unittest -v tests.test_memoryos_qi_world_validation_matrix_v0_36
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Lean checks
        run: |
          lake update
          lake exe cache get
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true \
            build KUOS.OpenHorizon.MemoryOSPredictiveShieldedMemoryKernelV0_37
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true \
            build KuuOSFormal
