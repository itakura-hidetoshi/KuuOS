name: PlanOS v0.21
on:
  workflow_dispatch:
  pull_request:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/check_planos_selected_candidate_next_cycle_synthesis_v0_21.py
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - run: lake update
      - run: lake exe cache get
      - run: lake build KUOS.PlanOS.VacuumExpectationSelectedCandidateNextCycleSynthesisV0_21
