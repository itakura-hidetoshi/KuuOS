name: WORLD Kū Vacuum Central Reference v0.50

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'formal/KUOS/WORLD/KuuVacuumCentralReferenceStateBridgeV0_50.lean'
      - 'formal/KuuOSFormalV0_50.lean'
      - 'formal/KUOS.lean'
      - 'lakefile.toml'
      - 'manifests/world_kuu_vacuum_central_reference_state_v0_50.json'
      - 'scripts/check_world_kuu_vacuum_central_reference_state_v0_50.py'
      - 'scripts/run_kuuos_runtime_full_check_v0_50.py'
      - 'docs/KU_WORLD_KUU_VACUUM_CENTRAL_REFERENCE_STATE_v0_50.md'
      - '.github/workflows/world-kuu-vacuum-central-reference-v0-50.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile static validation
        run: python -m compileall -q scripts/check_world_kuu_vacuum_central_reference_state_v0_50.py scripts/run_kuuos_runtime_full_check_v0_50.py
      - name: Run v0.50 static validation
        run: python3 scripts/check_world_kuu_vacuum_central_reference_state_v0_50.py
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify committed manifest is canonical
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Compile WORLD v0.50 root
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KuuOSFormalV0_50
      - name: Compile full formal root
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KuuOSFormal
