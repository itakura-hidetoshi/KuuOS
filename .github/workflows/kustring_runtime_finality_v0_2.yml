name: KuString Runtime Finality v0.2

on:
  push:
    branches: [main]
    paths:
      - 'examples/kustring_runtime_v0_2.py'
      - 'tests/test_kustring_runtime_v0_2.py'
      - 'specs/kustring_runtime_packets_v0_2.json'
      - 'scripts/*kustring_runtime*_v0_2.py'
      - 'scripts/run_pr_entry_check_v0_4.py'
      - 'docs/KUSTRING_RUNTIME_*_v0_2.md'
      - 'docs/kustring_runtime_finality_ci_ledger_v0_2.md'
      - '.github/workflows/kustring_runtime_finality_v0_2.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 scripts/run_pr_entry_check_v0_4.py --check-id kustring-finality --output-root .out/checks
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kustring-finality-${{ github.run_id }}
          path: .out/checks/kustring-finality
          if-no-files-found: error
