name: Qi Process Window v0.29

on:
  push:
    paths:
      - "runtime/kuuos_qi_window_trajectory_types_v0_29.py"
      - "runtime/kuuos_qi_window_trajectory_kernel_v0_29.py"
      - "runtime/kuuos_qi_window_trajectory_ledger_v0_29.py"
      - "runtime/kuuos_qi_window_trajectory_scenarios_v0_29.py"
      - "scripts/check_qi_window_v0_29.py"
      - "tests/test_qi_window_v0_29.py"
      - "formal/KUOS/OpenHorizon/QiWindowTrajectoryKernelV0_29.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/qi-process-window-v0-29.yml"
  pull_request:
    paths:
      - "runtime/kuuos_qi_window_trajectory_types_v0_29.py"
      - "runtime/kuuos_qi_window_trajectory_kernel_v0_29.py"
      - "runtime/kuuos_qi_window_trajectory_ledger_v0_29.py"
      - "runtime/kuuos_qi_window_trajectory_scenarios_v0_29.py"
      - "scripts/check_qi_window_v0_29.py"
      - "tests/test_qi_window_v0_29.py"
      - "formal/KUOS/OpenHorizon/QiWindowTrajectoryKernelV0_29.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/qi-process-window-v0-29.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python checks
        run: |
          python -m compileall -q runtime/kuuos_qi_window_trajectory_types_v0_29.py runtime/kuuos_qi_window_trajectory_kernel_v0_29.py runtime/kuuos_qi_window_trajectory_ledger_v0_29.py runtime/kuuos_qi_window_trajectory_scenarios_v0_29.py scripts/check_qi_window_v0_29.py tests/test_qi_window_v0_29.py
          PYTHONPATH=. python scripts/check_qi_window_v0_29.py
          PYTHONPATH=. python -m unittest -v tests.test_qi_window_v0_29
          PYTHONPATH=. python scripts/check_qi_healing_potential_diagnostic_v0_28.py
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Lean checks
        run: |
          lake update
          lake exe cache get
          lake -KleanArgs=-DwarningAsError=true -KleanArgs=-DsorryAsError=true build KUOS.OpenHorizon.QiWindowTrajectoryKernelV0_29
          lake -KleanArgs=-DwarningAsError=true -KleanArgs=-DsorryAsError=true build KuuOSFormal
