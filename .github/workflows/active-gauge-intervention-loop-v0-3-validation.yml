name: Active Gauge Intervention Loop v0.3 Validation

on:
  push:
    paths:
      - "runtime/kuuos_active_gauge_intervention_*_v0_3.py"
      - "scripts/check_active_gauge_intervention_loop_v0_3.py"
      - "formal/KUOS/OpenHorizon/ActiveGaugeInterventionV0_3.lean"
      - "docs/KUUOS_ACTIVE_GAUGE_INTERVENTION_LOOP_v0_3.md"
      - "examples/kuuos_active_gauge_intervention_input_v0_3.json"
      - "manifests/kuuos_active_gauge_intervention_loop_v0_3.json"
      - ".github/workflows/active-gauge-intervention-loop-v0-3-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_active_gauge_intervention_*_v0_3.py"
      - "scripts/check_active_gauge_intervention_loop_v0_3.py"
      - "formal/KUOS/OpenHorizon/ActiveGaugeInterventionV0_3.lean"
      - "docs/KUUOS_ACTIVE_GAUGE_INTERVENTION_LOOP_v0_3.md"
      - "examples/kuuos_active_gauge_intervention_input_v0_3.json"
      - "manifests/kuuos_active_gauge_intervention_loop_v0_3.json"
      - ".github/workflows/active-gauge-intervention-loop-v0-3-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile active gauge intervention runtime
        run: >-
          python -m py_compile
          runtime/kuuos_active_gauge_intervention_types_v0_3.py
          runtime/kuuos_active_gauge_intervention_validation_v0_3.py
          runtime/kuuos_active_gauge_intervention_local_adapter_v0_3.py
          runtime/kuuos_active_gauge_intervention_effect_v0_3.py
          runtime/kuuos_active_gauge_intervention_loop_core_v0_3.py
          runtime/kuuos_active_gauge_intervention_loop_v0_3.py
          scripts/check_active_gauge_intervention_loop_v0_3.py
      - name: Run active gauge intervention checks
        run: python scripts/check_active_gauge_intervention_loop_v0_3.py
