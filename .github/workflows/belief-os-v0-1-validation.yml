name: BeliefOS v0.1 Validation

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs/KUUOS_BELIEF_OS_RELATIONAL_CONDITIONAL_KERNEL_v0_1.md"
      - "manifests/kuuos_belief_os_relational_conditional_kernel_v0_1.json"
      - "runtime/kuuos_belief_os_types_v0_1.py"
      - "runtime/kuuos_belief_os_state_v0_1.py"
      - "runtime/kuuos_belief_os_phase_v0_1.py"
      - "runtime/kuuos_belief_os_kernel_v0_1.py"
      - "runtime/kuuos_belief_os_store_v0_1.py"
      - "runtime/v01_belief_os_relational_conditional_kernel.py"
      - "scripts/check_belief_os_relational_conditional_kernel_v0_1.py"
      - "scripts/run_pr_entry_check_v0_7.py"
      - "formal/KUOS/BeliefOS/RelationalConditionalKernelV0_1.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/belief-os-v0-1-validation.yml"

permissions:
  contents: read

concurrency:
  group: belief-os-v01-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run focused BeliefOS validation
        run: python3 scripts/run_pr_entry_check_v0_7.py --check-id belief-os-v01 --output-root artifacts/checks
      - name: Upload focused diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: belief-os-v01-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/checks/belief-os-v01/
          if-no-files-found: warn
          retention-days: 30
