name: BeliefOS v0.1 Validation

on:
  push:
    paths:
      - "docs/KUUOS_BELIEF_OS_RELATIONAL_CONDITIONAL_KERNEL_v0_1.md"
      - "manifests/kuuos_belief_os_relational_conditional_kernel_v0_1.json"
      - "runtime/kuuos_belief_os_types_v0_1.py"
      - "runtime/kuuos_belief_os_state_v0_1.py"
      - "runtime/kuuos_belief_os_phase_v0_1.py"
      - "runtime/kuuos_belief_os_kernel_v0_1.py"
      - "runtime/kuuos_belief_os_store_v0_1.py"
      - "runtime/v01_belief_os_relational_conditional_kernel.py"
      - "scripts/check_belief_os_relational_conditional_kernel_v0_1.py"
      - "formal/KUOS/BeliefOS/RelationalConditionalKernelV0_1.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/belief-os-v0-1-validation.yml"
  pull_request:
    paths:
      - "docs/KUUOS_BELIEF_OS_RELATIONAL_CONDITIONAL_KERNEL_v0_1.md"
      - "manifests/kuuos_belief_os_relational_conditional_kernel_v0_1.json"
      - "runtime/kuuos_belief_os_types_v0_1.py"
      - "runtime/kuuos_belief_os_state_v0_1.py"
      - "runtime/kuuos_belief_os_phase_v0_1.py"
      - "runtime/kuuos_belief_os_kernel_v0_1.py"
      - "runtime/kuuos_belief_os_store_v0_1.py"
      - "runtime/v01_belief_os_relational_conditional_kernel.py"
      - "scripts/check_belief_os_relational_conditional_kernel_v0_1.py"
      - "formal/KUOS/BeliefOS/RelationalConditionalKernelV0_1.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/belief-os-v0-1-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile BeliefOS runtime
        run: python -m compileall -q runtime scripts/check_belief_os_relational_conditional_kernel_v0_1.py
      - name: Validate BeliefOS relational conditional kernel
        run: python -m runtime.v01_belief_os_relational_conditional_kernel > belief-os-v01.log 2>&1
      - name: Validate check entry point
        run: python scripts/check_belief_os_relational_conditional_kernel_v0_1.py >> belief-os-v01.log 2>&1
      - name: Upload BeliefOS validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: belief-os-v01-log
          path: belief-os-v01.log
