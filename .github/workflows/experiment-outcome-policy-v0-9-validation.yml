name: Experiment Outcome Policy v0.9 Validation

on:
  push:
    paths:
      - "runtime/kuuos_experiment_outcome_policy*_v0_9.py"
      - "scripts/experiment_outcome_policy_v0_9_test_support.py"
      - "scripts/check_experiment_outcome_policy_v0_9.py"
      - "formal/KUOS/OpenHorizon/ExperimentOutcomePolicyV0_9.lean"
      - "docs/KUUOS_EXPERIMENT_OUTCOME_POLICY_v0_9.md"
      - "examples/kuuos_experiment_outcome_policy_input_v0_9.json"
      - "manifests/kuuos_experiment_outcome_policy_v0_9.json"
      - ".github/workflows/experiment-outcome-policy-v0-9-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_experiment_outcome_policy*_v0_9.py"
      - "scripts/experiment_outcome_policy_v0_9_test_support.py"
      - "scripts/check_experiment_outcome_policy_v0_9.py"
      - "formal/KUOS/OpenHorizon/ExperimentOutcomePolicyV0_9.lean"
      - "docs/KUUOS_EXPERIMENT_OUTCOME_POLICY_v0_9.md"
      - "examples/kuuos_experiment_outcome_policy_input_v0_9.json"
      - "manifests/kuuos_experiment_outcome_policy_v0_9.json"
      - ".github/workflows/experiment-outcome-policy-v0-9-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile experiment outcome policy
        run: >-
          python -m py_compile
          runtime/kuuos_experiment_outcome_policy_types_v0_9.py
          runtime/kuuos_experiment_outcome_policy_model_v0_9.py
          runtime/kuuos_experiment_outcome_policy_validation_v0_9.py
          runtime/kuuos_experiment_outcome_policy_bridge_v0_9.py
          runtime/kuuos_experiment_outcome_policy_records_v0_9.py
          runtime/kuuos_experiment_outcome_policy_core_v0_9.py
          runtime/kuuos_experiment_outcome_policy_cycle_v0_9.py
          scripts/experiment_outcome_policy_v0_9_test_support.py
          scripts/check_experiment_outcome_policy_v0_9.py
      - name: Run experiment outcome policy checks
        id: policy_checks
        continue-on-error: true
        run: python scripts/check_experiment_outcome_policy_v0_9.py > experiment-policy-v09.log 2>&1
      - name: Upload policy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiment-outcome-policy-v09-log
          path: experiment-policy-v09.log
      - name: Report policy failure
        if: steps.policy_checks.outcome == 'failure'
        shell: bash
        run: |
          tail -n 220 experiment-policy-v09.log
          exit 1
