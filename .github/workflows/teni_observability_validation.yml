name: Ten'i Observability Validation

on:
  push:
    paths:
      - 'docs/TENI_*.md'
      - 'docs/AI_ALAYA_*.md'
      - 'docs/AI_CONTROL_SURFACE_REGISTRY_v0_1.md'
      - 'docs/AI_YOGACARA_RUNTIME_ADAPTER_CONTRACT_v0_1.md'
      - 'docs/AI_YOGACARA_ADAPTER_AUDIT_EVENT_v0_1.md'
      - 'specs/teni_*.yaml'
      - 'specs/ai_yogacara_runtime_adapter_schema_v0_1.yaml'
      - 'specs/ai_yogacara_adapter_fixtures_v0_1.json'
      - 'specs/kuos_core_manifest_addendum_v0_1_2*.yaml'
      - 'specs/kuos_core_manifest_addendum_v0_1_3*.yaml'
      - 'scripts/validate_teni_observability_v0_1.py'
      - 'scripts/validate_ai_yogacara_adapter_schema_v0_1.py'
      - 'scripts/validate_ai_yogacara_adapter_fixtures_v0_1.py'
      - 'scripts/validate_ai_yogacara_adapter_audit_event_v0_1.py'
      - 'examples/ai_yogacara_runtime_adapter_minimal.py'
      - 'tests/test_ai_yogacara_runtime_adapter_minimal_v0_1.py'
      - '.github/workflows/teni_observability_validation.yml'
  pull_request:
    paths:
      - 'docs/TENI_*.md'
      - 'docs/AI_ALAYA_*.md'
      - 'docs/AI_CONTROL_SURFACE_REGISTRY_v0_1.md'
      - 'docs/AI_YOGACARA_RUNTIME_ADAPTER_CONTRACT_v0_1.md'
      - 'docs/AI_YOGACARA_ADAPTER_AUDIT_EVENT_v0_1.md'
      - 'specs/teni_*.yaml'
      - 'specs/ai_yogacara_runtime_adapter_schema_v0_1.yaml'
      - 'specs/ai_yogacara_adapter_fixtures_v0_1.json'
      - 'specs/kuos_core_manifest_addendum_v0_1_2*.yaml'
      - 'specs/kuos_core_manifest_addendum_v0_1_3*.yaml'
      - 'scripts/validate_teni_observability_v0_1.py'
      - 'scripts/validate_ai_yogacara_adapter_schema_v0_1.py'
      - 'scripts/validate_ai_yogacara_adapter_fixtures_v0_1.py'
      - 'scripts/validate_ai_yogacara_adapter_audit_event_v0_1.py'
      - 'examples/ai_yogacara_runtime_adapter_minimal.py'
      - 'tests/test_ai_yogacara_runtime_adapter_minimal_v0_1.py'
      - '.github/workflows/teni_observability_validation.yml'

jobs:
  validate-teni-observability:
    name: Validate Ten'i observability pack
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run stdlib-only Ten'i observability validator
        run: python3 scripts/validate_teni_observability_v0_1.py

      - name: Run AI Yogacara adapter schema validator
        run: python3 scripts/validate_ai_yogacara_adapter_schema_v0_1.py

      - name: Run AI Yogacara adapter fixture validator
        run: python3 scripts/validate_ai_yogacara_adapter_fixtures_v0_1.py

      - name: Run AI Yogacara adapter audit event validator
        run: python3 scripts/validate_ai_yogacara_adapter_audit_event_v0_1.py

      - name: Run minimal AI Yogacara runtime adapter tests
        run: python3 -m unittest tests/test_ai_yogacara_runtime_adapter_minimal_v0_1.py
