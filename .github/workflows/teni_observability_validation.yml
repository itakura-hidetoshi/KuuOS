name: Ten'i Observability Validation

on:
  push:
    paths:
      - 'docs/TENI_*.md'
      - 'docs/AI_ALAYA_*.md'
      - 'docs/AI_CONTROL_SURFACE_REGISTRY_v0_1.md'
      - 'docs/AI_YOGACARA_*.md'
      - 'specs/teni_*.yaml'
      - 'specs/ai_yogacara_*'
      - 'specs/kuos_core_manifest_addendum_v0_1_2*.yaml'
      - 'specs/kuos_core_manifest_addendum_v0_1_3*.yaml'
      - 'scripts/*ai_yogacara*_v0_1.py'
      - 'scripts/validate_teni_observability_v0_1.py'
      - 'examples/ai_yogacara_runtime_adapter_minimal.py'
      - 'tests/test_ai_yogacara_runtime_adapter_minimal_v0_1.py'
      - '.github/workflows/teni_observability_validation.yml'
  pull_request:
    paths:
      - 'docs/TENI_*.md'
      - 'docs/AI_ALAYA_*.md'
      - 'docs/AI_CONTROL_SURFACE_REGISTRY_v0_1.md'
      - 'docs/AI_YOGACARA_*.md'
      - 'specs/teni_*.yaml'
      - 'specs/ai_yogacara_*'
      - 'specs/kuos_core_manifest_addendum_v0_1_2*.yaml'
      - 'specs/kuos_core_manifest_addendum_v0_1_3*.yaml'
      - 'scripts/*ai_yogacara*_v0_1.py'
      - 'scripts/validate_teni_observability_v0_1.py'
      - 'examples/ai_yogacara_runtime_adapter_minimal.py'
      - 'tests/test_ai_yogacara_runtime_adapter_minimal_v0_1.py'
      - '.github/workflows/teni_observability_validation.yml'

jobs:
  validate-teni-observability:
    name: Validate AI Yogacara / Ten'i full checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run AI Yogacara / Ten'i full checks
        run: python3 scripts/run_ai_yogacara_full_checks_v0_1.py
