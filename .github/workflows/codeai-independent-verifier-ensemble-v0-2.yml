name: CodeAI Independent Verifier Ensemble v0.2

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "runtime/kuuos_codeai_independent_verifier_ensemble_schema_v0_2.py"
      - "runtime/kuuos_codeai_independent_verifier_ensemble_checks_v0_2.py"
      - "runtime/kuuos_codeai_independent_verifier_ensemble_v0_2.py"
      - "scripts/build_codeai_independent_verifier_ensemble_fixture_v0_2.py"
      - "scripts/project_codeai_independent_verifier_ensemble_fixture_v0_2.py"
      - "scripts/check_codeai_independent_verifier_ensemble_v0_2.py"
      - "tests/test_kuuos_codeai_independent_verifier_ensemble_v0_2.py"
      - "examples/codeai_independent_verifier_ensemble_v0_2.json"
      - "manifests/kuuos_codeai_independent_verifier_ensemble_v0_2.json"
      - "docs/KUUOS_CODEAI_INDEPENDENT_VERIFIER_ENSEMBLE_v0_2.md"
      - "formal/KUOS/CodeAI/IndependentVerifierEnsembleV0_2.lean"
      - "formal/KuuOSCodeAIIndependentVerifierEnsembleV0_2.lean"
      - "lakefile.toml"
      - "lake-manifest.json"
      - "lean-toolchain"
      - ".github/workflows/codeai-independent-verifier-ensemble-v0-2.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  MATHLIB_NO_CACHE_ON_UPDATE: '1'

jobs:
  validate:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python surfaces
        run: >-
          python3 -m compileall -q
          runtime/kuuos_codeai_independent_verifier_ensemble_schema_v0_2.py
          runtime/kuuos_codeai_independent_verifier_ensemble_checks_v0_2.py
          runtime/kuuos_codeai_independent_verifier_ensemble_v0_2.py
          scripts/build_codeai_independent_verifier_ensemble_fixture_v0_2.py
          scripts/project_codeai_independent_verifier_ensemble_fixture_v0_2.py
          scripts/check_codeai_independent_verifier_ensemble_v0_2.py
          tests/test_kuuos_codeai_independent_verifier_ensemble_v0_2.py
      - name: Validate machine-readable artifacts
        shell: bash
        run: |
          set -euo pipefail
          python3 -m json.tool examples/codeai_independent_verifier_ensemble_v0_2.json > /dev/null
          python3 -m json.tool manifests/kuuos_codeai_independent_verifier_ensemble_v0_2.json > /dev/null
      - name: Check independent verifier ensemble
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=. python3 scripts/check_codeai_independent_verifier_ensemble_v0_2.py \
            2>&1 | tee codeai-independent-verifier-ensemble-v0-2.log
      - name: Run ensemble and predecessor regression tests
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=. python3 -m unittest \
            tests.test_kuuos_codeai_independent_verifier_ensemble_v0_2 \
            tests.test_kuuos_codeai_independent_verification_envelope_v0_1 \
            tests.test_kuuos_codeai_intent_aligned_dataflow_context_pack_v0_2 \
            tests.test_kuuos_codeai_temporal_holdout_replay_corpus_v0_1 \
            2>&1 | tee codeai-independent-verifier-ensemble-v0-2-tests.log
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify committed dependency manifest is canonical
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Strictly compile verifier ensemble formal root
        shell: bash
        run: |
          set -euo pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true \
            build KuuOSCodeAIIndependentVerifierEnsembleV0_2 \
            2>&1 | tee codeai-independent-verifier-ensemble-v0-2-lean.log
      - name: Strictly compile repository formal baseline
        shell: bash
        run: |
          set -euo pipefail
          lake -KleanArgs=-DwarningAsError=true \
            -KleanArgs=-DsorryAsError=true \
            build KuuOSFormal \
            2>&1 | tee codeai-independent-verifier-ensemble-v0-2-lean-root.log
      - name: Upload diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: codeai-independent-verifier-ensemble-v0-2-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            codeai-independent-verifier-ensemble-v0-2.log
            codeai-independent-verifier-ensemble-v0-2-tests.log
            codeai-independent-verifier-ensemble-v0-2-lean.log
            codeai-independent-verifier-ensemble-v0-2-lean-root.log
          if-no-files-found: warn
          retention-days: 14
