name: Open-Ended Background Agency v0.30

on:
  push:
    paths:
      - "runtime/kuuos_open_ended_background_agency_v0_30.py"
      - "runtime/kuuos_open_ended_background_agency_entry_v0_30.py"
      - "scripts/check_open_ended_background_agency_v0_30.py"
      - "tests/test_open_ended_background_agency_v0_30.py"
      - "tests/test_open_ended_background_agency_entry_v0_30.py"
      - "docs/KUUOS_OPEN_ENDED_BACKGROUND_AGENCY_v0_30.md"
      - "manifests/kuuos_open_ended_background_agency_v0_30.json"
      - "formal/KUOS/OpenHorizon/OpenEndedBackgroundAgencyKernelV0_30.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/open-ended-background-agency-v0-30.yml"
  pull_request:
    paths:
      - "runtime/kuuos_open_ended_background_agency_v0_30.py"
      - "runtime/kuuos_open_ended_background_agency_entry_v0_30.py"
      - "scripts/check_open_ended_background_agency_v0_30.py"
      - "tests/test_open_ended_background_agency_v0_30.py"
      - "tests/test_open_ended_background_agency_entry_v0_30.py"
      - "docs/KUUOS_OPEN_ENDED_BACKGROUND_AGENCY_v0_30.md"
      - "manifests/kuuos_open_ended_background_agency_v0_30.json"
      - "formal/KUOS/OpenHorizon/OpenEndedBackgroundAgencyKernelV0_30.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/open-ended-background-agency-v0-30.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python checks
        run: |
          python -m compileall -q runtime/kuuos_open_ended_background_agency_v0_30.py runtime/kuuos_open_ended_background_agency_entry_v0_30.py scripts/check_open_ended_background_agency_v0_30.py tests/test_open_ended_background_agency_v0_30.py tests/test_open_ended_background_agency_entry_v0_30.py
          PYTHONPATH=. python scripts/check_open_ended_background_agency_v0_30.py
          PYTHONPATH=. python -m unittest -v tests.test_open_ended_background_agency_v0_30 tests.test_open_ended_background_agency_entry_v0_30
          PYTHONPATH=. python scripts/run_qi_candidate_lineage_v0_29.py
          PYTHONPATH=. python scripts/check_integrated_long_duration_operation_v0_27.py
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Lean checks
        run: |
          lake update
          lake exe cache get
          lake -KleanArgs=-DwarningAsError=true -KleanArgs=-DsorryAsError=true build KUOS.OpenHorizon.OpenEndedBackgroundAgencyKernelV0_30
          lake -KleanArgs=-DwarningAsError=true -KleanArgs=-DsorryAsError=true build KuuOSFormal
