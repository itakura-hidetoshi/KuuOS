name: KuuOS Example Runner Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'scripts/run_kuuos_state_io_example_v0_1.py'
      - 'scripts/check_kuuos_example_runner_import_v0_1.py'
      - 'examples/qi_state_io_v0_1/README.md'
      - '.github/workflows/kuuos_example_runner_validation.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 scripts/check_kuuos_example_runner_import_v0_1.py
