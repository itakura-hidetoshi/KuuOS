name: KuuOS Module-Bundle Self-Organization v0.70

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'runtime/kuuos_context_algebra_v0_70.py'
      - 'runtime/kuuos_state_module_v0_70.py'
      - 'runtime/kuuos_module_connection_v0_70.py'
      - 'runtime/kuuos_connection_deformation_v0_70.py'
      - 'runtime/kuuos_module_candidate_validation_v0_70.py'
      - 'runtime/kuuos_module_rollback_v0_70.py'
      - 'scripts/check_kuuos_module_bundle_v070.py'
      - 'docs/KUUOS_MODULE_BUNDLE_SELF_ORGANIZATION_v0_70.md'
      - 'manifests/kuuos_module_bundle_self_organization_v0_70.json'
      - 'formal/KUOS/WORLD/KuuOSModuleBundleSelfOrganizationV0_70.lean'
      - 'formal/KuuOSFormalV0_70.lean'
      - 'formal/KUOS.lean'
      - 'formal/KuuOSFormal.lean'
      - 'lakefile.toml'
      - '.github/workflows/kuuos-module-bundle-v070.yml'

permissions:
  contents: read

env:
  MATHLIB_NO_CACHE_ON_UPDATE: '1'

jobs:
  validate:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile module-bundle runtime
        run: >-
          python3 -m compileall -q
          runtime/kuuos_context_algebra_v0_70.py
          runtime/kuuos_state_module_v0_70.py
          runtime/kuuos_module_connection_v0_70.py
          runtime/kuuos_connection_deformation_v0_70.py
          runtime/kuuos_module_candidate_validation_v0_70.py
          runtime/kuuos_module_rollback_v0_70.py
          scripts/check_kuuos_module_bundle_v070.py
      - name: Validate module-bundle self-organization
        run: PYTHONPATH=. python3 scripts/check_kuuos_module_bundle_v070.py
      - name: Validate manifest JSON
        run: python3 -m json.tool manifests/kuuos_module_bundle_self_organization_v0_70.json >/dev/null
      - name: Set up Lean
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve dependencies
        run: lake update
      - name: Verify manifest stability
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib cache
        run: lake exe cache get
      - name: Build aggregate and v0.70 strict roots
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KuuOSFormal KuuOSFormalV0_70
