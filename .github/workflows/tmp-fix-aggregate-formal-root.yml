name: Temporary Aggregate Formal Root Fix

on:
  push:
    branches:
      - fix/vacuum-receipt-chain
    paths:
      - ".github/workflows/tmp-fix-aggregate-formal-root.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/vacuum-receipt-chain
      - name: Repair remaining strict Lean failures
        shell: python
        run: |
          from pathlib import Path

          replacements = {
              "formal/KUOS/WORLD/VacuumExpectationHostEffectAtomicCommitIntakeV0_52.lean": (
                  """abbrev Envelope := WorldVacuumExpectationHostEffectAtomicCommitIntakeEnvelope
            K O Intake ObserveBridge VerifyBridge LearnBridge ReplanBridge
              GenerationBridge HandoffBridge SelectionBridge SynthesisBridge
                MaterializationBridge AdmissionBridge AuthorizationBridge
                  InvocationBridge Bridge""",
                  """local notation \"Envelope\" =>
            WorldVacuumExpectationHostEffectAtomicCommitIntakeEnvelope
              K O Intake ObserveBridge VerifyBridge LearnBridge ReplanBridge
                GenerationBridge HandoffBridge SelectionBridge SynthesisBridge
                  MaterializationBridge AdmissionBridge AuthorizationBridge
                    InvocationBridge Bridge""",
              ),
              "formal/KUOS/Architecture/QiWorldYinYangProcessBlockerComplementarityV2_3.lean": (
                  """theorem yin_occupation_idempotent (occupation : YinOccupation) :
            occupation && occupation = occupation := by
          cases occupation <;> rfl""",
                  """theorem yin_occupation_idempotent (occupation : YinOccupation) :
            occupation && occupation = occupation := by
          simp""",
              ),
          }

          changed = []
          for filename, (old, new) in replacements.items():
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              if new in text:
                  continue
              if old not in text:
                  raise SystemExit(f"expected source block not found: {filename}")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")
              changed.append(filename)

          print("patched:", *changed, sep="\n")
      - name: Commit fixes
        run: |
          git config user.name "itakura-hidetoshi"
          git config user.email "itakurahidetoshi@mac.com"
          git add formal/KUOS/WORLD/VacuumExpectationHostEffectAtomicCommitIntakeV0_52.lean
          git add formal/KUOS/Architecture/QiWorldYinYangProcessBlockerComplementarityV2_3.lean
          git diff --cached --quiet && exit 0
          git commit -m "Fix remaining aggregate formal root failures"
          git push origin HEAD:fix/vacuum-receipt-chain
