name: KuuOS Memory Review v0.74

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

env:
  MATHLIB_NO_CACHE_ON_UPDATE: '1'

jobs:
  validate-runtime:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile runtime
        run: >-
          python3 -m compileall -q
          runtime/kuuos_memory_review_identity_v0_74.py
          runtime/kuuos_memory_review_request_v0_74.py
          runtime/kuuos_memory_review_receipt_v0_74.py
          runtime/kuuos_memory_selection_reviewability_v0_74.py
          runtime/kuuos_memory_selection_review_v0_74.py
          runtime/kuuos_governed_memory_review_v0_74.py
          scripts/check_kuuos_memory_review_v074.py
      - name: Validate memory review
        run: PYTHONPATH=. python3 scripts/check_kuuos_memory_review_v074.py
      - name: Validate manifest
        run: python3 -m json.tool manifests/kuuos_memory_review_v0_74.json >/dev/null

  validate-formal:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - name: Set up Lean
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve dependencies
        run: lake update
      - name: Verify manifest stability
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib cache
        run: lake exe cache get
      - name: Build aggregate and v0.74 roots
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KuuOSFormal KuuOSMemoryReviewV0_74
