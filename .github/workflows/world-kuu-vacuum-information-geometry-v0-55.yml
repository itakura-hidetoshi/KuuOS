name: WORLD Kū Vacuum Information Geometry v0.55 macOS

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'formal/KUOS/WORLD/KuuVacuumInformationGeometryBridgeV0_55.lean'
      - 'formal/KuuOSFormalV0_55.lean'
      - 'formal/KuuOSFormal.lean'
      - 'lakefile.toml'
      - 'docs/KU_WORLD_KUU_VACUUM_INFORMATION_GEOMETRY_v0_55.md'
      - 'manifests/world_kuu_vacuum_information_geometry_v0_55.json'
      - 'scripts/check_world_kuu_vacuum_information_geometry_v0_55.py'
      - 'scripts/run_kuuos_runtime_full_check_v0_55.py'
      - '.github/workflows/world-kuu-vacuum-information-geometry-v0-55.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile v0.55 Python validation
        run: |
          python -m compileall -q \
            scripts/check_world_kuu_vacuum_information_geometry_v0_55.py \
            scripts/run_kuuos_runtime_full_check_v0_55.py
      - name: Run v0.55 static validation
        run: python3 scripts/check_world_kuu_vacuum_information_geometry_v0_55.py
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify committed manifest is canonical
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Compile WORLD v0.55 root
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KuuOSFormalV0_55
      - name: Compile aggregate formal root
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KuuOSFormal
