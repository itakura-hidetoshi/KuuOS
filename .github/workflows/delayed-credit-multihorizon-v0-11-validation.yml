name: Delayed Credit Multi-Horizon v0.11 Validation

on:
  push:
    paths:
      - "runtime/kuuos_delayed_credit_multihorizon*_v0_11.py"
      - "scripts/*delayed_credit_multihorizon_v0_11*.py"
      - "formal/KUOS/OpenHorizon/DelayedCreditMultiHorizonV0_11.lean"
      - "docs/KUUOS_DELAYED_CREDIT_MULTIHORIZON_v0_11.md"
      - "examples/kuuos_delayed_credit_multihorizon_input_v0_11.json"
      - "manifests/kuuos_delayed_credit_multihorizon_v0_11.json"
      - ".github/workflows/delayed-credit-multihorizon-v0-11-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_delayed_credit_multihorizon*_v0_11.py"
      - "scripts/*delayed_credit_multihorizon_v0_11*.py"
      - "formal/KUOS/OpenHorizon/DelayedCreditMultiHorizonV0_11.lean"
      - "docs/KUUOS_DELAYED_CREDIT_MULTIHORIZON_v0_11.md"
      - "examples/kuuos_delayed_credit_multihorizon_input_v0_11.json"
      - "manifests/kuuos_delayed_credit_multihorizon_v0_11.json"
      - ".github/workflows/delayed-credit-multihorizon-v0-11-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile v0.11
        run: python -m compileall -q runtime scripts
      - name: Run v0.11 checks
        id: checks
        continue-on-error: true
        run: python scripts/check_delayed_credit_multihorizon_v0_11.py > delayed-credit-v011.log 2>&1
      - name: Upload v0.11 log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: delayed-credit-v011-log
          path: delayed-credit-v011.log
      - name: Report v0.11 failure
        if: steps.checks.outcome == 'failure'
        run: |
          tail -n 240 delayed-credit-v011.log
          exit 1
