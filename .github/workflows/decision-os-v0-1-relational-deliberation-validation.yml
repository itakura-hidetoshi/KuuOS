name: DecisionOS v0.1 Relational Deliberation Validation

on:
  push:
    paths:
      - "docs/KUUOS_DECISION_OS_RELATIONAL_DELIBERATION_KERNEL_v0_1.md"
      - "manifests/kuuos_decision_os_relational_deliberation_kernel_v0_1.json"
      - "runtime/kuuos_decision_os_types_v0_1.py"
      - "runtime/kuuos_decision_os_state_v0_1.py"
      - "runtime/kuuos_decision_os_phase_v0_1.py"
      - "runtime/kuuos_decision_os_kernel_v0_1.py"
      - "runtime/kuuos_decision_os_store_v0_1.py"
      - "runtime/v01_decision_os_relational_deliberation.py"
      - "scripts/check_decision_os_relational_deliberation_v0_1.py"
      - "formal/KUOS/DecisionOS/RelationalDeliberationKernelV0_1.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/decision-os-v0-1-relational-deliberation-validation.yml"
  pull_request:
    paths:
      - "docs/KUUOS_DECISION_OS_RELATIONAL_DELIBERATION_KERNEL_v0_1.md"
      - "manifests/kuuos_decision_os_relational_deliberation_kernel_v0_1.json"
      - "runtime/kuuos_decision_os_types_v0_1.py"
      - "runtime/kuuos_decision_os_state_v0_1.py"
      - "runtime/kuuos_decision_os_phase_v0_1.py"
      - "runtime/kuuos_decision_os_kernel_v0_1.py"
      - "runtime/kuuos_decision_os_store_v0_1.py"
      - "runtime/v01_decision_os_relational_deliberation.py"
      - "scripts/check_decision_os_relational_deliberation_v0_1.py"
      - "formal/KUOS/DecisionOS/RelationalDeliberationKernelV0_1.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/decision-os-v0-1-relational-deliberation-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile DecisionOS runtime
        run: python -m compileall -q runtime scripts/check_decision_os_relational_deliberation_v0_1.py
      - name: Validate DecisionOS relational deliberation kernel
        run: python -m runtime.v01_decision_os_relational_deliberation > decision-os-v01.log 2>&1
      - name: Validate check entry point
        run: python scripts/check_decision_os_relational_deliberation_v0_1.py >> decision-os-v01.log 2>&1
      - name: Upload DecisionOS validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decision-os-v01-log
          path: decision-os-v01.log
