name: Apply re-observation-gated continuation bundle

on:
  pull_request:
    branches: [main]
    paths:
      - '.tmp/reobservation-gated-continuation/**'
      - '.github/workflows/apply-reobservation-gated-continuation.yml'

permissions:
  contents: write
  actions: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull-request head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Reconstruct and verify sealed bundle
        shell: bash
        run: |
          set -euo pipefail
          cat .tmp/reobservation-gated-continuation/part-* > /tmp/continuation.tar.gz.b64
          base64 -d /tmp/continuation.tar.gz.b64 > /tmp/continuation.tar.gz
          echo 'a3ffa79a5ce33181fde34a7e3c3ac34753e61dbb72a9573b07be7e6a4ed3d80b  /tmp/continuation.tar.gz' | sha256sum -c -
          tar -xzf /tmp/continuation.tar.gz

      - name: Validate extracted implementation
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            runtime/kuuos_codeai_reobservation_gated_git_lifecycle_continuation_v0_1.py \
            scripts/check_codeai_reobservation_gated_git_lifecycle_continuation_v0_1.py \
            tests/test_kuuos_codeai_reobservation_gated_git_lifecycle_continuation_v0_1.py
          python -m json.tool examples/codeai_reobservation_gated_git_lifecycle_continuation_v0_1.json >/dev/null
          python -m json.tool manifests/kuuos_codeai_reobservation_gated_git_lifecycle_continuation_v0_1.json >/dev/null
          PYTHONPATH=. python scripts/check_codeai_reobservation_gated_git_lifecycle_continuation_v0_1.py
          PYTHONPATH=. python -m unittest \
            tests.test_kuuos_codeai_autonomous_git_lifecycle_envelope_v0_1 \
            tests.test_kuuos_codeai_autonomous_git_effect_execution_v0_1 \
            tests.test_kuuos_codeai_autonomous_git_effect_reobservation_v0_1 \
            tests.test_kuuos_codeai_reobservation_gated_git_lifecycle_continuation_v0_1
          grep -F 'KuuOSCodeAIReobservationGatedGitLifecycleContinuationV0_1' lakefile.toml
          git diff --check

      - name: Create final implementation commit
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .tmp/reobservation-gated-continuation
          rm -f .github/workflows/apply-reobservation-gated-continuation.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'add re-observation-gated Git lifecycle continuation'
          git rev-parse HEAD | tee /tmp/final-commit-sha.txt
          git show --stat --oneline HEAD | tee /tmp/final-commit-summary.txt
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Push final commit
        id: push
        continue-on-error: true
        shell: bash
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git push origin "HEAD:refs/heads/${HEAD_REF}"

      - name: Record push result
        if: always()
        shell: bash
        run: |
          printf 'push_outcome=%s\n' '${{ steps.push.outcome }}' | tee /tmp/push-result.txt
          printf 'final_commit=%s\n' '${{ steps.commit.outputs.sha }}' | tee -a /tmp/push-result.txt

      - name: Upload final commit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-continuation-commit-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /tmp/final-commit-sha.txt
            /tmp/final-commit-summary.txt
            /tmp/push-result.txt
          if-no-files-found: error
