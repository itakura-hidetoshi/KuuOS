name: KuuOS Runtime Full Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    paths:
      - 'README.md'
      - 'ROADMAP.md'
      - 'runtime/**'
      - 'tests/**'
      - 'examples/**'
      - 'scripts/**'
      - 'manifests/**'
      - 'formal/**'
      - 'docs/**'
      - 'lakefile.toml'
      - 'lake-manifest.json'
      - 'lean-toolchain'
      - '.github/workflows/kuuos_runtime_full_check.yml'

permissions:
  contents: read

jobs:
  full-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile runtime validation surfaces
        run: python3 -m compileall -q scripts runtime tests examples
      - name: Run cumulative runtime full check
        shell: bash
        run: |
          set -o pipefail
          PYTHONPATH=. python3 scripts/run_kuuos_runtime_full_check_v0_52.py \
            2>&1 | tee kuuos-runtime-full-check.log
      - name: Upload runtime diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kuuos-runtime-full-check-diagnostics
          path: kuuos-runtime-full-check.log
          if-no-files-found: warn
