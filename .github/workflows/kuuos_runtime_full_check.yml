name: KuuOS Runtime Full Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - 'ROADMAP.md'
      - 'runtime/**'
      - 'tests/**'
      - 'examples/**'
      - 'scripts/**'
      - 'manifests/**'
      - 'formal/**'
      - 'docs/**'
      - 'lakefile.toml'
      - 'lake-manifest.json'
      - 'lean-toolchain'
      - '.github/WORKFLOW_INDEX.md'
      - '.github/workflows/kuuos_runtime_full_check.yml'
  pull_request:
    paths:
      - 'README.md'
      - 'ROADMAP.md'
      - 'runtime/**'
      - 'tests/**'
      - 'examples/**'
      - 'scripts/**'
      - 'manifests/**'
      - 'formal/**'
      - 'docs/**'
      - 'lakefile.toml'
      - 'lake-manifest.json'
      - 'lean-toolchain'
      - '.github/WORKFLOW_INDEX.md'
      - '.github/workflows/kuuos_runtime_full_check.yml'

permissions:
  contents: read

concurrency:
  group: kuuos-runtime-full-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  full-check:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare diagnostics
        shell: bash
        run: mkdir -p artifacts/diagnostics

      - name: Check workflow reference integrity
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/check_workflow_consolidation_integrity.py \
            2>&1 | tee artifacts/diagnostics/workflow-integrity.log

      - name: Compile runtime validation surfaces
        shell: bash
        run: |
          set -euo pipefail
          python3 -m compileall -q scripts runtime tests examples \
            2>&1 | tee artifacts/diagnostics/compileall.log

      - name: Run cumulative runtime full check
        shell: bash
        env:
          PYTHONPATH: .
          PYTHONUNBUFFERED: '1'
        run: |
          set -euo pipefail
          python3 scripts/run_kuuos_runtime_full_check_v0_55.py \
            2>&1 | tee artifacts/diagnostics/kuuos-runtime-full-check.log

      - name: Record failure context
        if: ${{ failure() }}
        shell: bash
        run: |
          mkdir -p artifacts/diagnostics
          {
            echo "workflow=${GITHUB_WORKFLOW}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "event=${GITHUB_EVENT_NAME}"
            echo "ref=${GITHUB_REF}"
            echo "sha=${GITHUB_SHA}"
            python3 --version
          } > artifacts/diagnostics/context.txt

      - name: Upload runtime diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: kuuos-runtime-full-check-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/diagnostics/
          if-no-files-found: error
          retention-days: 14
