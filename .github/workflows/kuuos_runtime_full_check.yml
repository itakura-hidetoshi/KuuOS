name: KuuOS Runtime Full Check

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'README.md'
      - 'ROADMAP.md'
      - 'runtime/**'
      - 'tests/**'
      - 'examples/qi_state_io_v0_1/**'
      - 'examples/qi_process_tensor_v0_1/**'
      - 'scripts/run_kuuos_runtime_full_check_v0_1.py'
      - 'scripts/run_kuuos_runtime_full_check_v0_41.py'
      - 'scripts/run_kuuos_runtime_full_check_v0_42.py'
      - 'scripts/run_kuuos_runtime_full_check_v0_43.py'
      - 'scripts/run_kuuos_runtime_full_check_v0_44.py'
      - 'scripts/run_kuuos_runtime_full_check_v0_45.py'
      - 'scripts/run_kuuos_runtime_full_check_v0_46.py'
      - 'scripts/run_kuuos_runtime_full_check_v0_47.py'
      - 'scripts/run_kuuos_runtime_full_check_v0_48.py'
      - 'scripts/run_kuuos_runtime_full_check_v0_49.py'
      - 'scripts/check_world_module_category_nimrep_tube_center_bridge_v0_41.py'
      - 'scripts/check_world_gauge_categorical_indra_net_bridge_v0_42.py'
      - 'scripts/check_world_information_geometric_higher_gauge_v0_43.py'
      - 'scripts/check_world_araki_petz_quantum_information_geometry_v0_44.py'
      - 'scripts/check_world_quantum_exponential_dual_affine_projection_v0_45.py'
      - 'scripts/check_world_quantum_geodesic_mirror_free_energy_v0_46.py'
      - 'scripts/check_world_quantum_gradient_jko_entropy_production_v0_47.py'
      - 'scripts/check_world_quantum_log_sobolev_contractivity_mixing_v0_48.py'
      - 'scripts/check_world_kuu_vacuum_os_hilbert_completion_v0_49.py'
      - 'scripts/validate_kuuos_runtime_manifest_v0_1.py'
      - 'scripts/check_kuuos_state_io_example_v0_1.py'
      - 'scripts/check_kuuos_qi_process_tensor_example_v0_1.py'
      - 'manifests/kuuos_runtime_manifest_v0_1.json'
      - 'manifests/world_module_category_nimrep_tube_center_bridge_v0_41.json'
      - 'manifests/world_gauge_categorical_indra_net_bridge_v0_42.json'
      - 'manifests/world_information_geometric_higher_gauge_v0_43.json'
      - 'manifests/world_araki_petz_quantum_information_geometry_v0_44.json'
      - 'manifests/world_quantum_exponential_dual_affine_projection_v0_45.json'
      - 'manifests/world_quantum_geodesic_mirror_free_energy_v0_46.json'
      - 'manifests/world_quantum_gradient_jko_entropy_production_v0_47.json'
      - 'manifests/world_quantum_log_sobolev_contractivity_mixing_v0_48.json'
      - 'formal/KUOS/WORLD/KuuVacuumOSHilbertCompletionBridgeV0_49.lean'
      - 'formal/KuuOSFormalV0_49.lean'
      - 'docs/KU_WORLD_KUU_VACUUM_OS_HILBERT_COMPLETION_v0_49.md'
      - '.github/workflows/world-kuu-vacuum-os-hilbert-v0-49.yml'
      - '.github/workflows/kuuos_runtime_full_check.yml'

jobs:
  full-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 scripts/run_kuuos_runtime_full_check_v0_49.py
