name: Qi Licensed Canary Observation Trial v0.25 Validation

on:
  push:
    paths:
      - "runtime/kuuos_indra_qi_licensed_canary_observation_trial_*_v0_25.py"
      - "scripts/check_qi_licensed_canary_observation_trial_v0_25.py"
      - "manifests/qi_licensed_canary_observation_trial_v0_25.json"
      - "examples/indra_qi_licensed_canary_observation_trial_plan_v0_25.json"
      - "docs/KU_INDRA_QI_LICENSED_CANARY_OBSERVATION_TRIAL_v0_25.md"
      - ".github/workflows/qi-licensed-canary-observation-trial-v0-25-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_indra_qi_licensed_canary_observation_trial_*_v0_25.py"
      - "scripts/check_qi_licensed_canary_observation_trial_v0_25.py"
      - "manifests/qi_licensed_canary_observation_trial_v0_25.json"
      - "examples/indra_qi_licensed_canary_observation_trial_plan_v0_25.json"
      - "docs/KU_INDRA_QI_LICENSED_CANARY_OBSERVATION_TRIAL_v0_25.md"
      - ".github/workflows/qi-licensed-canary-observation-trial-v0-25-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile v0.25 runtime
        run: python -m py_compile runtime/kuuos_indra_qi_licensed_canary_observation_trial_core_v0_25.py runtime/kuuos_indra_qi_licensed_canary_observation_trial_runtime_v0_25.py scripts/check_qi_licensed_canary_observation_trial_v0_25.py
      - name: Run v0.25 checks
        run: python scripts/check_qi_licensed_canary_observation_trial_v0_25.py
