name: KuuOS Post-Shadow Review v0.69

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

env:
  MATHLIB_NO_CACHE_ON_UPDATE: '1'

jobs:
  validate:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile runtime
        run: >-
          python3 -m compileall -q
          runtime/kuuos_connection_evidence_review_types_v0_69.py
          runtime/kuuos_post_shadow_review_v0_69.py
          runtime/kuuos_post_shadow_review_validation_v0_69.py
          scripts/check_kuuos_post_shadow_review_v069.py
          scripts/check_kuuos_post_shadow_integrity_v069.py
      - name: Validate external evidence review
        run: PYTHONPATH=. python3 scripts/check_kuuos_post_shadow_review_v069.py
      - name: Validate review integrity
        run: PYTHONPATH=. python3 scripts/check_kuuos_post_shadow_integrity_v069.py
      - name: Validate manifest JSON
        run: python3 -m json.tool manifests/kuuos_external_evidence_review_v0_69.json >/dev/null
      - name: Set up Lean
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve dependencies
        run: lake update
      - name: Verify manifest stability
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib cache
        run: lake exe cache get
      - name: Build aggregate and v0.69 strict roots
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KuuOSFormal KuuOSFormalV0_69
