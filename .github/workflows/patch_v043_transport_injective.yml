name: Patch v0.43 Transport Injectivity

on:
  push:
    branches:
      - world-information-geometric-higher-gauge-v0-43-rebased
    paths:
      - '.github/workflows/patch_v043_transport_injective.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: world-information-geometric-higher-gauge-v0-43-rebased
          fetch-depth: 0
      - name: Replace injectivity proofs
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('formal/KUOS/WORLD/InformationGeometricHigherGaugeBridgeV0_43.lean')
          text = path.read_text(encoding='utf-8')
          old = '''theorem statistical_transport_injective (i j : G.Patch) :
              Function.Injective (I.statisticalTransport i j) :=
            (I.statisticalTransport_inverse i j).injective

          theorem tangent_transport_injective (i j : G.Patch) :
              Function.Injective (I.tangentTransport i j) :=
            (I.tangentTransport_inverse i j).injective
          '''
          new = '''theorem statistical_transport_injective (i j : G.Patch) :
              Function.Injective (I.statisticalTransport i j) := by
            intro p q h
            calc
              p = I.statisticalTransport j i (I.statisticalTransport i j p) :=
                (I.statisticalTransport_inverse i j p).symm
              _ = I.statisticalTransport j i (I.statisticalTransport i j q) :=
                congrArg (I.statisticalTransport j i) h
              _ = q := I.statisticalTransport_inverse i j q

          theorem tangent_transport_injective (i j : G.Patch) :
              Function.Injective (I.tangentTransport i j) := by
            intro u v h
            calc
              u = I.tangentTransport j i (I.tangentTransport i j u) :=
                (I.tangentTransport_inverse i j u).symm
              _ = I.tangentTransport j i (I.tangentTransport i j v) :=
                congrArg (I.tangentTransport j i) h
              _ = v := I.tangentTransport_inverse i j v
          '''
          if text.count(old) != 1:
              raise SystemExit(f'expected one target block, found {text.count(old)}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Commit exact proof repair
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add formal/KUOS/WORLD/InformationGeometricHigherGaugeBridgeV0_43.lean
          git commit -m 'Prove v0.43 transport injectivity by explicit inverse transport'
          git push origin HEAD:world-information-geometric-higher-gauge-v0-43-rebased
