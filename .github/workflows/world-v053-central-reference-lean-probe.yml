name: WORLD v0.53 Central Reference Lean Probe

on:
  workflow_dispatch:
  push:
    branches:
      - 'ci-probe-base-v053'
    paths:
      - 'probes/KuuVacuumCentralReferenceStateBridgeV0_53.lean'
      - '.github/workflows/world-v053-central-reference-lean-probe.yml'
  pull_request:
    paths:
      - 'probes/KuuVacuumCentralReferenceStateBridgeV0_53.lean'
      - '.github/workflows/world-v053-central-reference-lean-probe.yml'

permissions:
  contents: read

jobs:
  lean-probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify lockfile stability
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Compile isolated v0.53 source
        run: >-
          lake env lean
          -DwarningAsError=true
          -DsorryAsError=true
          probes/KuuVacuumCentralReferenceStateBridgeV0_53.lean
      - name: Record probe completion
        run: echo 'WORLD v0.53 isolated Lean probe completed'
