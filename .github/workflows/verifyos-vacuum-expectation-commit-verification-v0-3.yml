name: VerifyOS Vacuum Expectation Commit Verification v0.3

on:
  push:
    paths:
      - "formal/KuuOSVerifyOSV0_3.lean"
      - "formal/KUOS.lean"
      - "formal/KUOS/VerifyOS/VacuumExpectationCommitVerificationReceiptV0_3.lean"
      - "formal/KUOS/ObserveOS/VacuumExpectationIntakeCommitReceiptV0_3.lean"
      - "formal/KUOS/VerifyOS/EvidenceBoundVerificationV0_1.lean"
      - "docs/KUUOS_VERIFYOS_VACUUM_EXPECTATION_COMMIT_VERIFICATION_RECEIPT_v0_3.md"
      - "manifests/kuuos_verifyos_vacuum_expectation_commit_verification_receipt_v0_3.json"
      - "scripts/check_verifyos_vacuum_expectation_commit_verification_receipt_v0_3.py"
      - "scripts/run_kuuos_runtime_full_check_v0_51.py"
      - ".github/workflows/verifyos-vacuum-expectation-commit-verification-v0-3.yml"
  pull_request:
    paths:
      - "formal/KuuOSVerifyOSV0_3.lean"
      - "formal/KUOS.lean"
      - "formal/KUOS/VerifyOS/VacuumExpectationCommitVerificationReceiptV0_3.lean"
      - "formal/KUOS/ObserveOS/VacuumExpectationIntakeCommitReceiptV0_3.lean"
      - "formal/KUOS/VerifyOS/EvidenceBoundVerificationV0_1.lean"
      - "docs/KUUOS_VERIFYOS_VACUUM_EXPECTATION_COMMIT_VERIFICATION_RECEIPT_v0_3.md"
      - "manifests/kuuos_verifyos_vacuum_expectation_commit_verification_receipt_v0_3.json"
      - "scripts/check_verifyos_vacuum_expectation_commit_verification_receipt_v0_3.py"
      - "scripts/run_kuuos_runtime_full_check_v0_51.py"
      - ".github/workflows/verifyos-vacuum-expectation-commit-verification-v0-3.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check VerifyOS v0.3 registration
        run: python3 scripts/check_verifyos_vacuum_expectation_commit_verification_receipt_v0_3.py
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify committed manifest is canonical
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Compile VerifyOS v0.3 module
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KUOS.VerifyOS.VacuumExpectationCommitVerificationReceiptV0_3
      - name: Compile aggregate KuuOS formal root
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KuuOSFormal
