name: OS Bridge Workflow Migration

on:
  push:
    branches:
      - workflow-consolidation-next
    paths:
      - 'scripts/apply_os_bridge_workflow_migration.py'
      - '.github/workflows/os-bridge-workflow-migration.yml'

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: workflow-consolidation-next
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 scripts/apply_os_bridge_workflow_migration.py
      - name: Commit migrated references
        shell: bash
        run: |
          set -euo pipefail
          git checkout -- .github/workflows
          if git diff --quiet; then
            echo 'No OS bridge workflow references require migration.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m 'Migrate OS bridge workflow references'
          git push origin HEAD:workflow-consolidation-next
