name: KuuOS Governance Mode v0.75

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'runtime/kuuos_governance_mode_v0_75.py'
      - 'scripts/check_kuuos_governance_mode_v075.py'
      - 'manifests/kuuos_governance_mode_v0_75.json'
      - 'docs/KUUOS_GOVERNANCE_MODE_ROLE_AGGREGATION_v0_75.md'
      - 'formal/KUOS/WORLD/KuuOSGovernanceModeRoleAggregationV0_75.lean'
      - 'formal/KuuOSGovernanceModeV0_75.lean'
      - 'formal/KuuOSFormal.lean'
      - 'lakefile.toml'
      - 'lake-manifest.json'
      - 'lean-toolchain'
      - '.github/workflows/kuuos-governance-mode-v075.yml'

permissions:
  contents: read

env:
  MATHLIB_NO_CACHE_ON_UPDATE: '1'

jobs:
  validate-runtime:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile runtime
        run: >-
          python3 -m compileall -q
          runtime/kuuos_governance_mode_v0_75.py
          scripts/check_kuuos_governance_mode_v075.py
      - name: Validate governance mode
        run: PYTHONPATH=. python3 scripts/check_kuuos_governance_mode_v075.py
      - name: Validate manifest
        run: python3 -m json.tool manifests/kuuos_governance_mode_v0_75.json >/dev/null

  validate-formal:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - name: Set up Lean
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve dependencies
        run: lake update
      - name: Verify manifest stability
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib cache
        run: lake exe cache get
      - name: Build aggregate and v0.75 roots
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KuuOSFormal KuuOSGovernanceModeV0_75
