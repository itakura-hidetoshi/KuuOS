name: Qi Shadow Counterfactual Observation v0.18 Validation

on:
  push:
    paths:
      - "runtime/kuuos_indra_qi_shadow_counterfactual_observation_*_v0_18.py"
      - "scripts/check_qi_shadow_counterfactual_observation_v0_18.py"
      - "manifests/qi_shadow_counterfactual_observation_v0_18.json"
      - "examples/indra_qi_shadow_counterfactual_observation_plan_v0_18.json"
      - "docs/KU_INDRA_QI_SHADOW_COUNTERFACTUAL_OBSERVATION_v0_18.md"
      - ".github/workflows/qi-shadow-counterfactual-observation-v0-18-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_indra_qi_shadow_counterfactual_observation_*_v0_18.py"
      - "scripts/check_qi_shadow_counterfactual_observation_v0_18.py"
      - "manifests/qi_shadow_counterfactual_observation_v0_18.json"
      - "examples/indra_qi_shadow_counterfactual_observation_plan_v0_18.json"
      - "docs/KU_INDRA_QI_SHADOW_COUNTERFACTUAL_OBSERVATION_v0_18.md"
      - ".github/workflows/qi-shadow-counterfactual-observation-v0-18-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile v0.18 runtime
        run: python -m py_compile runtime/kuuos_indra_qi_shadow_counterfactual_observation_core_v0_18.py runtime/kuuos_indra_qi_shadow_counterfactual_observation_runtime_v0_18.py scripts/check_qi_shadow_counterfactual_observation_v0_18.py
      - name: Run v0.18 checks
        run: python scripts/check_qi_shadow_counterfactual_observation_v0_18.py
