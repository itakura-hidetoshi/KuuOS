name: Qi Process Diagnostic v0.28

on:
  push:
    paths:
      - "runtime/kuuos_qi_healing_potential_diagnostic_types_v0_28.py"
      - "runtime/kuuos_qi_healing_potential_diagnostic_kernel_v0_28.py"
      - "runtime/kuuos_qi_diagnostic_candidate_ledger_v0_28.py"
      - "runtime/kuuos_qi_healing_potential_diagnostic_scenarios_v0_28.py"
      - "scripts/check_qi_healing_potential_diagnostic_v0_28.py"
      - "tests/test_qi_process_diagnostic_v0_28.py"
      - "formal/KUOS/OpenHorizon/QiHealingPotentialDiagnosticKernelV0_28.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/qi-process-diagnostic-v0-28.yml"
  pull_request:
    paths:
      - "runtime/kuuos_qi_healing_potential_diagnostic_types_v0_28.py"
      - "runtime/kuuos_qi_healing_potential_diagnostic_kernel_v0_28.py"
      - "runtime/kuuos_qi_diagnostic_candidate_ledger_v0_28.py"
      - "runtime/kuuos_qi_healing_potential_diagnostic_scenarios_v0_28.py"
      - "scripts/check_qi_healing_potential_diagnostic_v0_28.py"
      - "tests/test_qi_process_diagnostic_v0_28.py"
      - "formal/KUOS/OpenHorizon/QiHealingPotentialDiagnosticKernelV0_28.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/qi-process-diagnostic-v0-28.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python checks
        run: |
          python -m compileall -q runtime/kuuos_qi_healing_potential_diagnostic_types_v0_28.py runtime/kuuos_qi_healing_potential_diagnostic_kernel_v0_28.py runtime/kuuos_qi_diagnostic_candidate_ledger_v0_28.py runtime/kuuos_qi_healing_potential_diagnostic_scenarios_v0_28.py scripts/check_qi_healing_potential_diagnostic_v0_28.py tests/test_qi_process_diagnostic_v0_28.py
          PYTHONPATH=. python scripts/check_qi_healing_potential_diagnostic_v0_28.py
          PYTHONPATH=. python -m unittest -v tests.test_qi_process_diagnostic_v0_28
          PYTHONPATH=. python scripts/check_integrated_long_duration_operation_v0_27.py
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Lean checks
        run: |
          lake update
          lake exe cache get
          lake -KleanArgs=-DwarningAsError=true -KleanArgs=-DsorryAsError=true build KUOS.OpenHorizon.QiHealingPotentialDiagnosticKernelV0_28
          lake -KleanArgs=-DwarningAsError=true -KleanArgs=-DsorryAsError=true build KuuOSFormal
