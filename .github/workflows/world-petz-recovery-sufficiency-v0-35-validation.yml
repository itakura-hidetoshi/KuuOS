name: WORLD Petz Recovery Sufficiency v0.35 Validation

on:
  push:
    paths:
      - "formal/KUOS/WORLD/PetzRecoverySufficiencyBridgeV0_35.lean"
      - "formal/KUOS.lean"
      - "runtime/kuuos_world_petz_recovery_sufficiency_bridge_*_v0_35.py"
      - "scripts/check_world_petz_recovery_sufficiency_bridge_v0_35.py"
      - "manifests/world_petz_recovery_sufficiency_bridge_v0_35.json"
      - "docs/KU_WORLD_PETZ_RECOVERY_SUFFICIENCY_BRIDGE_v0_35.md"
      - "scripts/run_kuuos_runtime_full_check_v0_1.py"
      - ".github/workflows/world-petz-recovery-sufficiency-v0-35-validation.yml"
  pull_request:
    paths:
      - "formal/KUOS/WORLD/PetzRecoverySufficiencyBridgeV0_35.lean"
      - "formal/KUOS.lean"
      - "runtime/kuuos_world_petz_recovery_sufficiency_bridge_*_v0_35.py"
      - "scripts/check_world_petz_recovery_sufficiency_bridge_v0_35.py"
      - "manifests/world_petz_recovery_sufficiency_bridge_v0_35.json"
      - "docs/KU_WORLD_PETZ_RECOVERY_SUFFICIENCY_BRIDGE_v0_35.md"
      - "scripts/run_kuuos_runtime_full_check_v0_1.py"
      - ".github/workflows/world-petz-recovery-sufficiency-v0-35-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile v0.35 runtime
        run: python -m py_compile runtime/kuuos_world_petz_recovery_sufficiency_bridge_core_v0_35.py runtime/kuuos_world_petz_recovery_sufficiency_bridge_runtime_v0_35.py scripts/check_world_petz_recovery_sufficiency_bridge_v0_35.py
      - name: Run v0.35 checks
        run: python scripts/check_world_petz_recovery_sufficiency_bridge_v0_35.py
