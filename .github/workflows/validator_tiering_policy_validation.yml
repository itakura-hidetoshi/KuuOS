name: KuuOS Validator Tiering Policy Validation

on:
  push:
    paths:
      - 'manifests/kuuos_validator_tiering_policy_v0_1.json'
      - 'scripts/validate_kuuos_validator_tiering_policy_v0_1.py'
      - 'scripts/run_kuuos_runtime_full_check_v0_1.py'
      - 'manifests/kuuos_runtime_manifest_v0_1.json'
      - '.github/workflows/validator_tiering_policy_validation.yml'
  pull_request:
    paths:
      - 'manifests/kuuos_validator_tiering_policy_v0_1.json'
      - 'scripts/validate_kuuos_validator_tiering_policy_v0_1.py'
      - 'scripts/run_kuuos_runtime_full_check_v0_1.py'
      - 'manifests/kuuos_runtime_manifest_v0_1.json'
      - '.github/workflows/validator_tiering_policy_validation.yml'

jobs:
  validate-validator-tiering-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run validator tiering policy validator
        run: python3 scripts/validate_kuuos_validator_tiering_policy_v0_1.py
