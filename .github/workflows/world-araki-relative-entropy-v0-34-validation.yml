name: WORLD Araki Relative Entropy v0.34 Validation

on:
  push:
    paths:
      - "formal/KUOS/WORLD/ArakiRelativeEntropyBridgeV0_34.lean"
      - "formal/KUOS.lean"
      - "runtime/kuuos_world_araki_relative_entropy_bridge_*_v0_34.py"
      - "scripts/check_world_araki_relative_entropy_bridge_v0_34.py"
      - "manifests/world_araki_relative_entropy_bridge_v0_34.json"
      - "docs/KU_WORLD_ARAKI_RELATIVE_ENTROPY_BRIDGE_v0_34.md"
      - "scripts/run_kuuos_runtime_full_check_v0_1.py"
      - ".github/workflows/world-araki-relative-entropy-v0-34-validation.yml"
  pull_request:
    paths:
      - "formal/KUOS/WORLD/ArakiRelativeEntropyBridgeV0_34.lean"
      - "formal/KUOS.lean"
      - "runtime/kuuos_world_araki_relative_entropy_bridge_*_v0_34.py"
      - "scripts/check_world_araki_relative_entropy_bridge_v0_34.py"
      - "manifests/world_araki_relative_entropy_bridge_v0_34.json"
      - "docs/KU_WORLD_ARAKI_RELATIVE_ENTROPY_BRIDGE_v0_34.md"
      - "scripts/run_kuuos_runtime_full_check_v0_1.py"
      - ".github/workflows/world-araki-relative-entropy-v0-34-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile v0.34 runtime
        run: python -m py_compile runtime/kuuos_world_araki_relative_entropy_bridge_core_v0_34.py runtime/kuuos_world_araki_relative_entropy_bridge_runtime_v0_34.py scripts/check_world_araki_relative_entropy_bridge_v0_34.py
      - name: Run v0.34 checks
        run: python scripts/check_world_araki_relative_entropy_bridge_v0_34.py
