name: Qi Bounded Canary Observation v0.24 Validation

on:
  push:
    paths:
      - "runtime/kuuos_indra_qi_bounded_canary_observation_*_v0_24.py"
      - "scripts/check_qi_bounded_canary_observation_v0_24.py"
      - "manifests/qi_bounded_canary_observation_v0_24.json"
      - "examples/indra_qi_bounded_canary_observation_plan_v0_24.json"
      - "docs/KU_INDRA_QI_BOUNDED_CANARY_OBSERVATION_v0_24.md"
      - ".github/workflows/qi-bounded-canary-observation-v0-24-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_indra_qi_bounded_canary_observation_*_v0_24.py"
      - "scripts/check_qi_bounded_canary_observation_v0_24.py"
      - "manifests/qi_bounded_canary_observation_v0_24.json"
      - "examples/indra_qi_bounded_canary_observation_plan_v0_24.json"
      - "docs/KU_INDRA_QI_BOUNDED_CANARY_OBSERVATION_v0_24.md"
      - ".github/workflows/qi-bounded-canary-observation-v0-24-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile v0.24 runtime
        run: python -m py_compile runtime/kuuos_indra_qi_bounded_canary_observation_core_v0_24.py runtime/kuuos_indra_qi_bounded_canary_observation_runtime_v0_24.py scripts/check_qi_bounded_canary_observation_v0_24.py
      - name: Run v0.24 checks
        run: python scripts/check_qi_bounded_canary_observation_v0_24.py
