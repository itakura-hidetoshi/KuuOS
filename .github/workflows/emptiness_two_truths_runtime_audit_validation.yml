name: Emptiness Two Truths Runtime Audit Validation

on:
  workflow_dispatch:
  push:
    paths:
      - 'docs/**'
      - 'specs/**'
      - 'scripts/**'
      - 'Makefile'
      - '.github/workflows/emptiness_two_truths_runtime_audit_validation.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'specs/**'
      - 'scripts/**'
      - 'Makefile'
      - '.github/workflows/emptiness_two_truths_runtime_audit_validation.yml'

jobs:
  validate-emptiness-two-truths-runtime-audit:
    name: Validate emptiness two truths runtime audit chain
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Show validation entrypoints
        run: |
          python3 --version
          echo "Runtime audit exporter: scripts/export_emptiness_do_two_truths_runtime_audit_v0_1.py"
          echo "Runtime audit chain builder: scripts/build_emptiness_do_two_truths_runtime_audit_chain_v0_1.py"
          echo "Runtime audit chain checker: scripts/check_emptiness_do_two_truths_runtime_audit_chain_v0_1.py"
          echo "Integrated runtime runner: scripts/run_emptiness_do_two_truths_runtime_checks_v0_1.py"
          echo "Release packet validator: scripts/validate_emptiness_do_two_truths_runtime_release_packet_v0_1.py"
          echo "Release bundle manifest validator: scripts/validate_emptiness_do_two_truths_runtime_release_bundle_manifest_v0_1.py"
          echo "Make target: make emptiness-two-truths-runtime-audit-checks"

      - name: Run emptiness two truths runtime audit checks
        run: make emptiness-two-truths-runtime-audit-checks