name: Emptiness Release Workflow Migration

on:
  push:
    branches:
      - workflow-repair-audit
    paths:
      - 'scripts/apply_emptiness_release_workflow_migration.py'
      - '.github/workflows/emptiness-release-workflow-migration.yml'

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: workflow-repair-audit
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 scripts/apply_emptiness_release_workflow_migration.py
      - name: Commit migration
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- specs docs; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add specs docs
          git commit -m 'Repair emptiness release workflow references'
          git push origin HEAD:workflow-repair-audit
