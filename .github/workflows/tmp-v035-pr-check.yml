name: Temporary v0.35 PR Check

on:
  pull_request:
    paths:
      - ".github/workflows/tmp-v035-pr-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile
        run: python -m compileall -q runtime/kuuos_memoryos_qi_world_blocker_integration_v0_35.py scripts/check_memoryos_qi_world_blocker_integration_v0_35.py tests/test_memoryos_qi_world_blocker_integration_v0_35.py
      - name: Registration
        run: PYTHONPATH=. python scripts/check_memoryos_qi_world_blocker_integration_v0_35.py
      - name: Unit tests
        run: PYTHONPATH=. python -m unittest -v tests.test_memoryos_qi_world_blocker_integration_v0_35
      - name: Source checks
        run: |
          PYTHONPATH=. python scripts/check_nonmarkov_cognitive_loop_v0_23.py
          PYTHONPATH=. python scripts/check_qi_world_cross_cycle_blocker_v1_5.py
          PYTHONPATH=. python scripts/check_authorized_atomic_world_commit_v0_34.py
