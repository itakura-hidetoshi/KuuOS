name: Qi WORLD Qi-QUE Path Ecology v0.14 Validation

on:
  push:
    paths:
      - "runtime/kuuos_indra_qi_world_qique_path_ecology_*_v0_14.py"
      - "scripts/check_qi_world_qique_path_ecology_v0_14.py"
      - "manifests/qi_world_qique_path_ecology_v0_14.json"
      - "examples/indra_qi_world_qique_path_ecology_plan_v0_14.json"
      - "docs/KU_INDRA_QI_WORLD_QIQUE_PATH_ECOLOGY_v0_14.md"
      - ".github/workflows/qi-world-qique-path-ecology-v0-14-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_indra_qi_world_qique_path_ecology_*_v0_14.py"
      - "scripts/check_qi_world_qique_path_ecology_v0_14.py"
      - "manifests/qi_world_qique_path_ecology_v0_14.json"
      - "examples/indra_qi_world_qique_path_ecology_plan_v0_14.json"
      - "docs/KU_INDRA_QI_WORLD_QIQUE_PATH_ECOLOGY_v0_14.md"
      - ".github/workflows/qi-world-qique-path-ecology-v0-14-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile v0.14 runtime
        run: python -m py_compile runtime/kuuos_indra_qi_world_qique_path_ecology_core_v0_14.py runtime/kuuos_indra_qi_world_qique_path_ecology_runtime_v0_14.py scripts/check_qi_world_qique_path_ecology_v0_14.py
      - name: Run v0.14 checks
        run: python scripts/check_qi_world_qique_path_ecology_v0_14.py
