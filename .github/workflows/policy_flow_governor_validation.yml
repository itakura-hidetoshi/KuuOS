name: Policy Flow Governor Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'runtime/kuuos_runtime_daemon_policy_flow_governor_v0_1.py'
      - 'tests/test_policy_flow_governor_v0_1.py'
      - '.github/workflows/policy_flow_governor_validation.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 -m unittest tests.test_policy_flow_governor_v0_1
