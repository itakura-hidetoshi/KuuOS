name: KuuOS Runtime Manifest Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'manifests/kuuos_runtime_manifest_v0_1.json'
      - 'scripts/validate_kuuos_runtime_manifest_v0_1.py'
      - '.github/workflows/kuuos_runtime_manifest_validation.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 scripts/validate_kuuos_runtime_manifest_v0_1.py
