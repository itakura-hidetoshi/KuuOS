name: WORLD Standard Form Modular Flow v0.32 Validation

on:
  push:
    paths:
      - "formal/KUOS/WORLD/StandardFormModularFlowBridgeV0_32.lean"
      - "formal/KUOS.lean"
      - "runtime/kuuos_world_standard_form_modular_flow_bridge_*_v0_32.py"
      - "scripts/check_world_standard_form_modular_flow_bridge_v0_32.py"
      - "manifests/world_standard_form_modular_flow_bridge_v0_32.json"
      - "docs/KU_WORLD_STANDARD_FORM_MODULAR_FLOW_BRIDGE_v0_32.md"
      - "scripts/run_kuuos_runtime_full_check_v0_1.py"
      - ".github/workflows/world-standard-form-modular-flow-v0-32-validation.yml"
  pull_request:
    paths:
      - "formal/KUOS/WORLD/StandardFormModularFlowBridgeV0_32.lean"
      - "formal/KUOS.lean"
      - "runtime/kuuos_world_standard_form_modular_flow_bridge_*_v0_32.py"
      - "scripts/check_world_standard_form_modular_flow_bridge_v0_32.py"
      - "manifests/world_standard_form_modular_flow_bridge_v0_32.json"
      - "docs/KU_WORLD_STANDARD_FORM_MODULAR_FLOW_BRIDGE_v0_32.md"
      - "scripts/run_kuuos_runtime_full_check_v0_1.py"
      - ".github/workflows/world-standard-form-modular-flow-v0-32-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile v0.32 runtime
        run: python -m py_compile runtime/kuuos_world_standard_form_modular_flow_bridge_core_v0_32.py runtime/kuuos_world_standard_form_modular_flow_bridge_runtime_v0_32.py scripts/check_world_standard_form_modular_flow_bridge_v0_32.py
      - name: Run v0.32 checks
        run: python scripts/check_world_standard_form_modular_flow_bridge_v0_32.py
