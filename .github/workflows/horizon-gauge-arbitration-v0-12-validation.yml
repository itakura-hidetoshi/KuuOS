name: Horizon Gauge Arbitration v0.12 Validation

on:
  push:
    paths:
      - "runtime/kuuos_horizon_gauge_arbitration*_v0_12.py"
      - "scripts/*horizon_gauge_arbitration_v0_12*.py"
      - "formal/KUOS/OpenHorizon/HorizonGaugeArbitrationV0_12.lean"
      - ".github/workflows/horizon-gauge-arbitration-v0-12-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_horizon_gauge_arbitration*_v0_12.py"
      - "scripts/*horizon_gauge_arbitration_v0_12*.py"
      - "formal/KUOS/OpenHorizon/HorizonGaugeArbitrationV0_12.lean"
      - ".github/workflows/horizon-gauge-arbitration-v0-12-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile v0.12
        run: python -m compileall -q runtime scripts
      - name: Run v0.12 scenario
        id: checks
        continue-on-error: true
        run: python -c "from scripts.horizon_gauge_arbitration_v0_12_scenario import run_scenario; run_scenario()" > horizon-gauge-v012.log 2>&1
      - name: Upload v0.12 log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: horizon-gauge-v012-log
          path: horizon-gauge-v012.log
      - name: Report v0.12 failure
        if: steps.checks.outcome == 'failure'
        run: |
          tail -n 260 horizon-gauge-v012.log
          exit 1
