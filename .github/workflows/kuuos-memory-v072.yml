name: KuuOS Memory Connection v0.72

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

env:
  MATHLIB_NO_CACHE_ON_UPDATE: '1'

jobs:
  validate-runtime:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile runtime
        run: python3 -m compileall -q runtime scripts/check_kuuos_nonmarkov_memory_v072.py
      - name: Validate runtime
        run: PYTHONPATH=. python3 scripts/check_kuuos_nonmarkov_memory_v072.py
      - name: Validate manifest
        run: python3 -m json.tool manifests/kuuos_nonmarkov_memory_v0_72.json >/dev/null

  validate-formal:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - name: Set up Lean
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve dependencies
        run: lake update
      - name: Verify manifest stability
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib cache
        run: lake exe cache get
      - name: Build aggregate and strict roots
        run: lake -KleanArgs=-DwarningAsError=true -KleanArgs=-DsorryAsError=true build KuuOSFormal KuuOSFormalV0_72
