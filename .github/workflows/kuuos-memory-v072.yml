name: KuuOS Memory Connection v0.72

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  validate-runtime:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile runtime
        run: python3 -m compileall -q runtime scripts/check_kuuos_nonmarkov_memory_v072.py
      - name: Validate runtime
        run: PYTHONPATH=. python3 scripts/check_kuuos_nonmarkov_memory_v072.py
      - name: Validate manifest
        run: python3 -m json.tool manifests/kuuos_nonmarkov_memory_v0_72.json >/dev/null
