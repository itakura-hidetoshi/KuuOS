name: Open-Horizon Telos Genesis v0.1 Validation

on:
  push:
    paths:
      - "runtime/kuuos_open_horizon_telos_genesis_*_v0_1.py"
      - "scripts/check_open_horizon_telos_genesis_v0_1.py"
      - "docs/KUUOS_OPEN_HORIZON_TELOS_GENESIS_v0_1.md"
      - "manifests/kuuos_open_horizon_telos_genesis_v0_1.json"
      - "examples/kuuos_open_horizon_telos_genesis_input_v0_1.json"
      - ".github/workflows/open-horizon-telos-genesis-v0-1-validation.yml"
  pull_request:
    paths:
      - "runtime/kuuos_open_horizon_telos_genesis_*_v0_1.py"
      - "scripts/check_open_horizon_telos_genesis_v0_1.py"
      - "docs/KUUOS_OPEN_HORIZON_TELOS_GENESIS_v0_1.md"
      - "manifests/kuuos_open_horizon_telos_genesis_v0_1.json"
      - "examples/kuuos_open_horizon_telos_genesis_input_v0_1.json"
      - ".github/workflows/open-horizon-telos-genesis-v0-1-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile open-horizon telos runtime
        run: >-
          python -m py_compile
          runtime/kuuos_open_horizon_telos_genesis_core_v0_1.py
          runtime/kuuos_open_horizon_telos_genesis_runtime_v0_1.py
          scripts/check_open_horizon_telos_genesis_v0_1.py
      - name: Run open-horizon telos checks
        run: python scripts/check_open_horizon_telos_genesis_v0_1.py
