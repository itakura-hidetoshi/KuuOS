name: PlanOS v0.5 Validation

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile runtime
        run: python -m compileall -q runtime scripts/check_plan_os_generational_replan_cycle_driver_v0_5.py
      - name: Validate generational cycle
        run: python scripts/check_plan_os_generational_replan_cycle_driver_v0_5.py
