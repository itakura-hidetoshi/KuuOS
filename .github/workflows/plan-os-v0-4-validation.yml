name: PlanOS v0.4 Validation

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile runtime
        run: python -m compileall -q runtime scripts/check_plan_os_closed_loop_replan_intake_adapter_v0_4.py
      - name: Validate closed loop
        run: python scripts/check_plan_os_closed_loop_replan_intake_adapter_v0_4.py
