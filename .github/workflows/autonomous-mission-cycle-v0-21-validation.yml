name: Autonomous Mission Cycle v0.21 Validation

on:
  push:
    paths:
      - "docs/KUUOS_AUTONOMOUS_MISSION_CYCLE_KERNEL_v0_21.md"
      - "manifests/kuuos_autonomous_mission_cycle_kernel_v0_21.json"
      - "runtime/kuuos_autonomous_mission_cycle_types_v0_21.py"
      - "runtime/kuuos_autonomous_mission_cycle_kernel_v0_21.py"
      - "runtime/kuuos_autonomous_mission_cycle_store_v0_21.py"
      - "runtime/v021_autonomous_mission_cycle_kernel.py"
      - "scripts/check_autonomous_mission_cycle_kernel_v0_21.py"
      - "formal/KUOS/OpenHorizon/AutonomousMissionCycleKernelV0_21.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/autonomous-mission-cycle-v0-21-validation.yml"
  pull_request:
    paths:
      - "docs/KUUOS_AUTONOMOUS_MISSION_CYCLE_KERNEL_v0_21.md"
      - "manifests/kuuos_autonomous_mission_cycle_kernel_v0_21.json"
      - "runtime/kuuos_autonomous_mission_cycle_types_v0_21.py"
      - "runtime/kuuos_autonomous_mission_cycle_kernel_v0_21.py"
      - "runtime/kuuos_autonomous_mission_cycle_store_v0_21.py"
      - "runtime/v021_autonomous_mission_cycle_kernel.py"
      - "scripts/check_autonomous_mission_cycle_kernel_v0_21.py"
      - "formal/KUOS/OpenHorizon/AutonomousMissionCycleKernelV0_21.lean"
      - "formal/KUOS.lean"
      - ".github/workflows/autonomous-mission-cycle-v0-21-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile autonomous mission cycle runtime
        run: python -m compileall -q runtime scripts/check_autonomous_mission_cycle_kernel_v0_21.py
      - name: Validate persistent autonomous mission cycle
        run: python -m runtime.v021_autonomous_mission_cycle_kernel > autonomous-mission-cycle-v021.log 2>&1
      - name: Validate check entry point
        run: python scripts/check_autonomous_mission_cycle_kernel_v0_21.py >> autonomous-mission-cycle-v021.log 2>&1
      - name: Upload v0.21 validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autonomous-mission-cycle-v021-log
          path: autonomous-mission-cycle-v021.log
