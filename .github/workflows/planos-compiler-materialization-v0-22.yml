name: PlanOS Compiler Materialization v0.22

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "formal/KUOS/PlanOS/VacuumExpectationCompilerMaterializationV0_22.lean"
      - "formal/KuuOSPlanOSV0_22.lean"
      - "formal/KuuOSFormal.lean"
      - "scripts/check_planos_compiler_materialization_v0_22.py"
      - "manifests/kuuos_planos_compiler_materialization_v0_22.json"
      - "docs/KUUOS_PLANOS_COMPILER_MATERIALIZATION_v0_22.md"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/check_planos_compiler_materialization_v0_22.py
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - run: lake update
      - run: git diff --exit-code -- lake-manifest.json
      - run: lake exe cache get
      - run: lake -KleanArgs=-DwarningAsError=true -KleanArgs=-DsorryAsError=true build KUOS.PlanOS.VacuumExpectationCompilerMaterializationV0_22
      - run: lake -KleanArgs=-DwarningAsError=true -KleanArgs=-DsorryAsError=true build KuuOSFormal
