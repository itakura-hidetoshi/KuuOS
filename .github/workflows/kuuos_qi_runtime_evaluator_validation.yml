name: KuuOS Qi Runtime Evaluator Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'runtime/qi_runtime_binding_v0_1.py'
      - 'tests/test_qi_runtime_binding_v0_1.py'
      - '.github/workflows/kuuos_qi_runtime_evaluator_validation.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 -m pytest tests/test_qi_runtime_binding_v0_1.py
