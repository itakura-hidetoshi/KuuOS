name: KuuOS Qi Process Tensor Example Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'examples/qi_process_tensor_v0_1/raw_state_process_history.json'
      - 'examples/qi_process_tensor_v0_1/evidence.json'
      - 'examples/qi_process_tensor_v0_1/README.md'
      - 'scripts/check_kuuos_qi_process_tensor_example_v0_1.py'
      - '.github/workflows/kuuos_qi_process_tensor_example_validation.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 scripts/check_kuuos_qi_process_tensor_example_v0_1.py
