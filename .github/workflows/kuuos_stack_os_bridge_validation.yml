name: KuuOS Stack OS Bridge Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'specs/kuuos_candidate_output_boundary_os_bridge_v0_1.json'
      - 'scripts/validate_kuuos_candidate_output_boundary_os_bridge_v0_1_min.py'
      - 'specs/kuuos_view_delivery_os_bridge_v0_1.json'
      - 'scripts/validate_kuuos_view_delivery_os_bridge_v0_1_min.py'
      - 'specs/kuuos_view_pack_os_bridge_v0_1.json'
      - 'scripts/validate_kuuos_view_pack_os_bridge_v0_1_min.py'
      - 'specs/kuuos_receipt_registry_os_bridge_v0_1.json'
      - 'scripts/validate_kuuos_receipt_registry_os_bridge_v0_1_min.py'
      - 'specs/kuuos_registry_review_os_bridge_v0_1.json'
      - 'scripts/validate_kuuos_registry_review_os_bridge_v0_1_min.py'
      - 'specs/kuuos_stack_os_bridge_v0_1.json'
      - 'scripts/validate_kuuos_stack_os_bridge_v0_1_min.py'
      - '.github/workflows/kuuos_stack_os_bridge_validation.yml'

permissions:
  contents: read

concurrency:
  group: stack-os-bridge-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate stack bridge chain
        run: |
          python3 scripts/validate_kuuos_candidate_output_boundary_os_bridge_v0_1_min.py
          python3 scripts/validate_kuuos_view_delivery_os_bridge_v0_1_min.py
          python3 scripts/validate_kuuos_view_pack_os_bridge_v0_1_min.py
          python3 scripts/validate_kuuos_receipt_registry_os_bridge_v0_1_min.py
          python3 scripts/validate_kuuos_registry_review_os_bridge_v0_1_min.py
          python3 scripts/validate_kuuos_stack_os_bridge_v0_1_min.py
