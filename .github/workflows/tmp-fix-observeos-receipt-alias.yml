name: Temporary fix ObserveOS receipt alias

on:
  push:
    branches:
      - fix/vacuum-receipt-chain-final

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/vacuum-receipt-chain-final
          fetch-depth: 0

      - name: Fix dependent receipt alias
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("formal/KUOS/ObserveOS/WorldHostEffectObservationReceiptV0_4.lean")
          text = path.read_text(encoding="utf-8")
          old = '''abbrev Receipt := WorldHostEffectObservationReceipt
            K O Intake ObserveBridge VerifyBridge LearnBridge ReplanBridge
              GenerationBridge HandoffBridge SelectionBridge SynthesisBridge
                MaterializationBridge AdmissionBridge AuthorizationBridge
                  InvocationBridge WorldIntakeBridge Bridge
          '''
          new = '''local notation "Receipt" => WorldHostEffectObservationReceipt
            K O Intake ObserveBridge VerifyBridge LearnBridge ReplanBridge
              GenerationBridge HandoffBridge SelectionBridge SynthesisBridge
                MaterializationBridge AdmissionBridge AuthorizationBridge
                  InvocationBridge WorldIntakeBridge Bridge
          '''
          if old not in text:
              raise SystemExit("expected Receipt abbreviation not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Commit repair and remove temporary workflow
        shell: bash
        run: |
          set -euxo pipefail
          rm .github/workflows/tmp-fix-observeos-receipt-alias.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix dependent ObserveOS receipt alias"
          git push origin HEAD:fix/vacuum-receipt-chain-final
