name: WORLD ObserveOS Commit VerifyOS Handoff v0.52

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'README.md'
      - 'ROADMAP.md'
      - 'formal/KUOS/WORLD/VacuumExpectationObserveOSCommitVerifyOSHandoffBridgeV0_52.lean'
      - 'formal/KuuOSFormalV0_52.lean'
      - 'formal/KUOS.lean'
      - 'lakefile.toml'
      - 'manifests/world_observeos_commit_verifyos_handoff_v0_52.json'
      - 'scripts/check_world_observeos_commit_verifyos_handoff_v0_52.py'
      - 'scripts/run_kuuos_runtime_full_check_v0_52.py'
      - 'docs/KU_WORLD_OBSERVEOS_COMMIT_VERIFYOS_HANDOFF_v0_52.md'
      - '.github/workflows/world-observeos-commit-verifyos-handoff-v0-52.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run v0.52 static validation
        run: python3 scripts/check_world_observeos_commit_verifyos_handoff_v0_52.py
      - name: Set up pinned Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve pinned dependencies
        run: lake update
      - name: Verify committed manifest is canonical
        run: git diff --exit-code -- lake-manifest.json
      - name: Fetch Mathlib olean cache
        run: lake exe cache get
      - name: Compile WORLD v0.52 root
        run: >-
          lake -KleanArgs=-DwarningAsError=true
          -KleanArgs=-DsorryAsError=true
          build KuuOSFormalV0_52
