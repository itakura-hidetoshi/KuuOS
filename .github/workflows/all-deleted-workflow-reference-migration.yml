name: Deleted Workflow Reference Migration

on:
  push:
    branches:
      - workflow-repair-audit
    paths:
      - 'scripts/apply_all_deleted_workflow_reference_migrations.py'
      - '.github/workflows/all-deleted-workflow-reference-migration.yml'
  pull_request:
    paths:
      - 'scripts/apply_all_deleted_workflow_reference_migrations.py'
      - '.github/workflows/all-deleted-workflow-reference-migration.yml'

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: workflow-repair-audit
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 scripts/apply_all_deleted_workflow_reference_migrations.py
      - name: Commit migrations
        shell: bash
        run: |
          set -euo pipefail
          git checkout -- .github/workflows
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m 'Repair all deleted workflow references'
          git push origin HEAD:workflow-repair-audit
